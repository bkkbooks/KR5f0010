front:
  text: 墨子卷之一沛一
  hash: sha256:5d7b3d537d065453ca972ddcbcd7a5384cef91b6276acffcd18edc60f677b2b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_HFL_001-001a, image: hfl/0843/0843-004.png}
body:
  text: 親士第一入國而不存其士則亡國矣見賢而不急則緩其君矣非賢無急非士無與慮國緩賢忘士而能以其國存者未曾有也昔者文公出走而正天下桓公去國而霸諸侯越王勾踐遇吳王之醜而尚攝中國之賢君三子之能達名成功於天下也皆於其國抑而大醜也太上無敗其次敗而有以成此之謂用民吾聞之曰非無安居也我無安心也非無足財也我無足心也是故君子自難而易彼衆人自易而難彼君子進不敗其志內究其情雖雜庸民終無怨心彼有自信者也是故為其所難者必得其所欲焉未聞為其所欲而免其所惡者也是故逼臣傷君諂下傷上君必有弗弗之臣上必有詻詻之下分議者延延而支苟者詻詻焉可以長生保國臣下重其爵位而不言近臣則喑遠臣則吟怨結於民心諂諛在側善議障塞則國危矣桀紂不以其無天下之士邪殺其身而喪天下故曰歸國寶不若獻賢而進士今有五錐此其銛銛者必先挫有五刀此其錯錯者必先靡是以甘井近竭招木近伐靈龜近灼神蛇近暴是故比于之殪其抗也孟賁之殺其勇也西施之沈其美也吳起之裂其事也故彼人者寡不死其所長故曰太盛難守也故雖有賢君不愛無功之臣雖有慈父不愛無益之子是故不勝其任而處其位非此位之人也不勝其爵而處其祿非此祿之主也良弓難張然可以及高入深良馬難乘然可以任重致遠良才難令然可以致君見尊是故江河不惡小谷之滿已也故能大聖人者事無辭也物無違也故能為天下器是故江河之水非一源也千鎰之裘非一狐之白也夫惡有同方取不取同而已者乎蓋非兼王之道也是故天地不昭昭大水不潦潦大火不燎燎王德不堯堯者乃千人之長也其直如矢其平如砥不足以覆萬物是故溪陜者速涸逝淺者速竭墝甬者其地不育三者淳澤不出宫中則不能流國矣修身第二君子戰雖有陳而勇為本焉喪雖有禮而哀為本焉士雖有學而行為本焉是故置本不安者無務豐末近者不親無務來遠親戚不附無務外交事無終始無務多業舉物而暗無務傳聞是故先王之治天下也必察邇來遠君子察邇而邇修者也見不修行見毁而反之身者也此以怨省而行修矣譛慝之言無入之耳批扞之聲無出之口殺傷人之孩無存之心雖有詆訐之民無所依矣故君子力事日彊願欲日逾設壯日盛君子之道也貧則見廉富則見義生則見愛死則見哀四行者不可虛假反之身者也藏於心者無以竭愛動於身者無以竭恭出於口者無以竭馴暢之四支接之肌膚華髮隳巔而猶弗舍者其唯聖人乎志不彊者智不達言不信者行不果據財不能以分人者不足與友守道不篤遍物不博辨是非不察者不足與游本不固者末必幾雄而不修者其後必惰原濁者流不清行不信者名必耗名不徒生而譽不自長功成名遂名譽不可虛徦反之身者也務言而緩行雖辨必不聽多力而伐功雖勞必不圖慧者心辨而不繁說多力而不伐功此以名譽揚天下言無務為多而務為智無務為文而務為察故彼智無察在身而情反其路者也善無主於心者不留行莫辨於身者不立名不可簡而成也譽不可巧而立也君子以身戴行者也思利尋焉忘名忽焉可以為士於天下者未嘗有也所染第三子墨子言見染絲者而歎曰染於蒼則蒼染於黃則黃所入者變其色亦變五入必而已則為五色矣故染不可不慎也非獨染絲然也國亦有染舜染於許山伯陽禹染於臯陶伯益湯染於伊尹仲虺武王染於太公周公此四王者所染當故王天下立為天子功名蔽天地舉天下之仁義顯人必稱此四王者夏桀染於干辛推哆殷紂染於崇侯惡來厲王染於厲公長父榮夷終幽王染於傅公夷蔡公穀此四王者所染不當故國殘身死為天下僇舉天下不義辱人必稱此四王者齊桓染於管仲鮑叔晋文染於舅犯高偃椘莊染於孫叔沈尹吳闔閭染於伍貟文義越句踐染於范蠡大夫種此五君所染當故霸諸侯功名傳於後世范吉射染於長栁朔王𦙴中行寅染於籍秦高彊吳夫差染於王孫𨿅太宰嚭知伯搖染於智國張武中山尚染於魏義偃長宋康染於唐鞅胄不禮此六君者所染不當故國家殘亡身為刑戮宗廟破滅絶無後類君臣離散民人流亡舉天下之貪暴苛擾者必稱此六君也凡君之所以安者何也以其行理也行理性於染當故善為君者勞於論人而佚於治官不能為君者傷形費神愁心勞意然國逾危身逾辱此六君者非不重其國愛其身也以不知要故也不知要者所染不當也非獨國有染也士亦有染其友皆好仁義淳謹畏令則家日益身日安名日榮處官得其理矣則假干木禽子傅說之徒是也其友皆好矜奮創作比周則家日損身日危名日辱處官失其理矣則子西易牙堅刁之徒是也詩曰必擇所堪必謹所堪者此之謂也法儀第四子墨子曰天下從事者不可以無法儀無法儀而其事能成者無有雖至士之為將相者皆有法雖至百工從事者亦皆有法百工為方以矩為圜以規直以繩正以縣無巧工不巧工皆以此五者為法巧者能中之不巧者雖不能中放依以從事猶逾己故百工從事皆有法所度今大者治天下其次治大國而無法所度此不若百工辨也然則奚以為治法而可當皆法其父母奚若天下之為父母者衆而仁者寡若皆法其父母此法不仁也法不仁不可以為法當皆法其學奚若天下為學者衆而仁者寡若皆法其學此法不仁也法不仁不可以為法當皆法其君奚若天下之為君者衆而仁者寡若皆法其君此法不仁也法不仁不可以為法故父母學君三者莫可以為治法而可然則奚以為治法而可故曰莫若法天天之行廣而無私其施厚而不德其明久而不衰故聖王法之既以天為法動作有為必度於天天之所欲則為之天所不欲則止然而天何欲何惡者也天必欲人之相愛相利而不欲人之相惡相賊也奚以知天之欲人之相愛相利而不欲人之相惡相賊也以其兼而愛之兼而利之也奚以知天兼而愛之兼而利之也以其兼而有之兼而食之也今天下無小大國皆天之邑也人無幼長貴賤皆天之臣也此以莫不犓羊豢犬猪潔為酒醴粢盛以敬事天此不為兼而有之兼而食之邪天苟兼而有食之夫奚說以不欲人之相愛相利也故曰愛人利人者天必福之惡人賊人者天必禍之日殺不辜者得不祥焉夫奚說人為其相殺而天與禍乎是以天欲人相愛相利而不欲人相惡相賊也昔之聖王禹湯文武兼天下之百姓率以尊天事鬼其利人多故天福之使立為天子天下諸侯皆賓事之暴王桀紂幽厲兼惡天下之百姓率以詬天侮鬼賊其人多故天禍之使遂失其國家身死為僇於天下後世子孫毁之至今不息故為不善以得禍者桀紂幽厲是也愛人利人以得福者禹湯文武是也愛人利人以得福者有矣惡人賊人以得禍者亦有矣七患第五子墨子曰國有七患七患者何城郭溝池不可守而治宫室一患也邊國至境四鄰莫救二患也先盡民力無用之功賞賜無能之人民力盡於無用財寶虛於侍客三患也仕者待祿游者憂反君修法討臣臣懾而不敢拂四患也君自以為聖智而不問事自以為安彊而無守備四鄰謀之不知戒五患也所言不忠所忠不信六患也畜種菽粟不足以食之大臣不足事之賞賜不能喜誅罰不能威七患也以七患居國必無杜稷以七患守城敵至國傾七患之所當國必有殃凡五穀者民之所仰也君之所以為養也故民無仰則君無養民無食則不可事故食不可不務也地不可不力也用不可不節也五穀盡收則五味盡御於主不盡收則不盡御一穀不收謂之饉二穀不收謂之旱三穀不收謂之凶四穀不收謂之餽五穀不收謂之饑歲饉則仕者大夫以下皆損祿五分之一旱則損五分之二凶則損五分之三餽則損五分之四饑則盡無祿禀食而已矣故凶饑存乎國人君徹鼎食五分之五大夫徹縣士不入學君朝之衣不革制諸侯之客四鄰之使雍食而不盛徹驂騑塗不藝馬不食粟婢妾不衣帛此告不足之至也今有負其子而汲者隊其子於井中其母必從而道之今歲凶民饑道餓重其子此疚於隊其可無察邪故時年歲善則民仁且良時年歲凶則民吝且惡夫民何常此之有為者寡食者衆則歲無豐故曰財不足則反之時食不足則反之用故先民以時生財固本而用財則財足故雖上世之聖王豈能使五穀常收而旱水不至哉然而無凍餓之民者何也其力時急而自養儉也故夏書曰禹七年水殷書曰湯五年旱此其離凶餓甚矣然而民不凍餓者何也其生財密其用之節也故食無備粟不可以待凶饑庫無備兵雖有義不能征無義城郭不備全不可以自守心無備慮不可以應卒是若慶忌無去之心不能輕出夫桀無待湯之備故放紂無待武王之備故殺桀紂貴為天子富有天下然而皆滅亡於百里之君者何也有富貴而不為備也故備者國之重也食者國之寶也兵者國之爪也城者所以自守也此三者國之具也故曰以其極賞以賜無功虛其府庫以備車馬衣裘奇怪苦其役徒以治宫室觀樂死又厚為棺槨多為衣裘生時治臺榭死又修墳墓故民苦於外府庫單於內上不厭其樂下不堪其苦故國離寇敵則傷民見凶饑則亡此皆備不具之罪也且夫食者聖人之所寶也故周書曰國無三年之食者國非其國也家無三年之食者子非其子也此之謂國備辭過第六子墨子曰古之民未知為宫時就陵阜而居穴而處下潤濕傷民故聖王作為宫室為宫室之法曰高足以辟潤濕邊足以圉風寒上足以待雪霜雨露宫墻之高足以别男女之禮謹此則止費財勞力不加利者不為也是故聖王作為宫室便於生不以為觀樂也作為衣服帶履便於身不以為辟怪也故節於身誨於民是以天下之民可得而治財用可得而足當今之主其為宫室則與此異矣必厚作斂於百姓暴奪民衣食之財以為宫室臺榭曲直之望青黃刻鏤之飾為宫室若此故左右皆法象之是以其財不足以待凶饑賑孤寡故國貧而民難治也君實欲天下之治而惡其亂也當為宫室不可不節古之民未知為衣服時衣皮帶茭冬則不輕而溫夏則不輕而凊聖王以為不中人之情故作誨婦人治役修其城郭則民勞而不傷以其常正收其租稅民則費而不病民所苦者非此也苦於厚作斂於百姓絲麻棞布絹以為民衣為衣服之法冬則練帛之中足以為輕且凊謹此則止故聖人為衣服適身體和肌膚而足矣非榮耳目而觀愚民也當是之時堅車良馬不知貴也刻鏤文采不知喜也何則其所道之然故民衣食之財家足以待旱水凶饑者何也得其所以自養之情而不感於外也是以其民儉而易治其君用財節而易贍也府庫實滿足以待不然兵革不頓士民不勞足以征不服故霸王之業可行於天下矣當今之王其為衣服則與此異矣冬則輕暖夏則輕凊皆已具矣必厚作斂於百姓暴奪民衣食之財以為錦繡文采靡曼衣之鑄金以為鈎珠玉以為珮女工作文采男工作刻鏤以身服此非云益暖之情也單財勞力畢歸之於無用以此觀之其為衣服非為身體皆為觀好是以其民淫僻而難治其君奢侈而難諫也夫以奢侈之君御好淫僻之民欲用無亂不可得也君實欲天下之治而惡其亂當為衣服不可不節古之民未知為飲食時素食而分處故聖人作誨男耕稼𣗳藝以為民食其為食也是以增氣充虛彊體適腹而已矣故其用財節其自養儉民富國治今則不然厚作斂於百姓以為美食芻豢蒸炙魚鱉大國纍百器小國纍十器前方丈目不能遍視手不能遍操口不能遍味冬則凍冰夏則飾饐人君為飲食如此故左右象之是以富貴者奢侈孤寡者凍餒欲無亂不可得也君實欲天下治而惡其亂當為食飲不可不節古之民未知為舟車時重任不移遠道不至故聖王作為舟車以便民之事其為舟車也全固輕利可以任重致遠其為用財少而為利多是以民樂而利之故法令不急而行民不勞而止足用故民歸之當今之王其為舟車與此異矣全固輕利皆已具必厚作斂於百姓以飾舟車飾車以文采飾舟以刻鏤女子廢其紡織而修文采故民寒男子離其耕稼而修刻鏤故民饑人君為舟車若此故左右象之是以其民饑寒並至故為姦邪多則刑罰深刑罰深則國亂君實欲天下之治而惡其亂當為舟車不可不節凡回於天地之間包於四海之內天壤之情陰陽之和莫不有也雖至聖不能更也何以知其然聖人有傳天地也則曰上下四時也則曰陰陽人情也則曰男女禽獸也則曰牡牝雄雌也真天壤之情雖有先王不能更也雖上世至聖必蓄私不以傷行故民無怨宫無拘女故天下無寡夫內無拘女外無寡夫故天下之民衆當今之君其蓄私也大國拘女纍千小國纍百是以天下之男多寡無妻女多拘無夫男子失時故民少君實欲民之衆而惡其寡當蓄私不可不節凡此五者聖人之所儉節也小人之所淫佚也儉節則昌淫佚則亡此五者不可不節夫婦節而天地和風雨節而五穀熟衣服節而肌膚和三辨第七程繁問於子墨子曰聖王不為樂昔諸侯倦於聽治息於鍾鼓之樂士大夫倦於聽治息於竽瑟之樂農夫春耕夏耘秋斂冬藏息於聆缶之樂今夫子曰聖王不為樂此譬之猶馬駕而不稅弓張而不弛無乃非有血氣者之所不能至邪子墨子曰昔者堯舜有第期者且以為禮且以為樂湯放桀於大水環天下自立以為王事成功立無大後患自作樂命曰九招武王勝殷殺紂環天下自立以為王事成功立無大後患因先王之樂又自作樂命曰象周成王因先生之樂命曰騶虞周成王之治天下也不若武王武王之治天下也不若成湯成湯之治天下也不若堯舜故其樂逾繁者其治逾寡自此觀之樂非所以治天下也程繁曰子曰聖王無樂此亦樂已若之何其謂聖王無樂也子墨子曰聖王之命也多寡之食之利也以知饑而食之者智也因為無知矣今聖有樂而少此亦無也墨子卷之一
