body:
  text: 魯問第四十九魯君謂子墨子曰吾恐齊之攻我也可救乎子墨子曰可昔者三代之聖王禹湯文武百里之諸侯也說忠行義取天下三代之暴王桀紂幽厲讎怨行暴失天下吾願主君之上者尊天事鬼下者愛利百姓厚為皮幣卑辭令函遍禮四鄰諸侯歐國而以事齊患可救也非願無可為者齊將伐魯子墨子謂項子牛曰伐魯齊之大過也昔者吳王東伐越棲諸會稽西伐楚葆昭王於隨北伐齊取國太子以歸於吳諸侯報其讐百姓苦其勞而弗為用是以國為虛戾身為刑戮也昔者智伯伐范氏與中行氏兼三晋之地諸侯報其讐百姓苦其勞而弗為用是以國為虛戾身為刑戮用是也故大國之攻小國也是交相賊也過必反於國子墨子見齊大王曰今有刀於此試之人頭倅然斷之可謂利乎大王曰利子墨子曰多試之人頭倅然斷之可謂利乎大王曰利子墨子曰刀則利矣孰將受其不祥大王曰刀受其利試者受其不祥子墨子曰并國覆軍賊敖百姓孰將受其不祥大王俯仰而思之曰我受其不祥魯陽文君將攻鄭子墨子聞而止之謂陽文君曰今使魯四境之內大都攻其小都大家伐其小家殺其民人取其牛馬狗豕布帛米粟貨財則何若魯陽文君曰魯四境之內皆寡人之臣也今大都攻其小都大家伐其小家奪之貨財則寡人必將厚罰之子墨子曰夫天之兼有天下也亦猶君之有四境之內也今舉兵將以攻鄭天誅亦不至乎魯陽文君曰先生何止我攻鄭也我攻鄭順於天之志鄭人三世殺其父天加誅焉使三年不全我將助天誅也子墨子曰鄭人三世殺其父而天加誅焉使三年不全天誅足矣今又舉兵將以攻鄭曰吾攻鄭也順於天之志譬有人於此其子强梁不材故其父笞之其鄰家之父舉木而擊之曰吾擊之也順於其父之志則豈不悖哉子墨子謂魯陽文君曰攻其鄰國殺其民人取其牛馬粟米貸財則書之於竹帛鏤之於金石以為銘於鐘鼎傳遺後世子孫曰莫若多吾今賤人也亦攻其鄰家殺其人民取其狗豕食糧衣裘亦書之竹帛以為銘於席豆以遺後世子孫曰莫若我多亦可乎魯陽文君曰然吾以子之言觀之則天下之所謂可者未必然也子墨子為魯陽文君曰世俗之君子皆知小物而不知大物今有人於此竊一犬一則謂之不仁竊一國一都則以為義譬猶小視白謂之白大視白則謂之黑是故世俗之君子知小物而不知大物者此若言之謂也魯陽文君語子墨子曰楚之南有啖人之國者橋其國之長子生則鮮而食之謂之宜弟美則以遺其君君喜則賞其父豈不惡俗哉子墨子曰雖中國之俗亦猶是也殺其父而賞其子何以異食其子而賞其父者哉苟不用仁義何以非夷人食其子也魯君之嬖人死魯君為之誄魯人因說而用之子墨子聞之曰誄者道死人之志也今因說而用之是猶以來首從服也魯陽文君謂子墨子曰有語我以忠臣者令之俯則俯令之仰則仰處則靜呼則應可謂忠臣乎子墨子曰令之俯則俯令之仰則仰是似景也處則靜呼則應是似響也君將何得於景與響哉若以翟之所謂忠臣者上有過則微之以諫已有善則訪之上而無敢以告外太祖廟諱上字其邪而入其善尚而無下比以美善在上而怨讐在下安樂在上而憂戚在臣此翟之謂忠臣者也魯君謂子墨子曰我有二子一人者好學一人者好分人財孰以為太子而可子墨子曰未可知也或所為賞興為是也魡者之恭非為魚賜也𧊗鼠以蟲非愛之也吾願主君之合其志功而觀焉魯人有因子墨子而學其子者其子戰而死其父讓子墨子子墨子曰子欲學子之子今學成矣戰而死而子愠是猶欲糶糴讐則愠也豈不費哉魯之南鄙人有吳慮者冬陶夏耕自比於舜子墨子聞而見之吳慮謂子墨子義耳義耳焉用言之哉子墨子曰子之謂所義者亦有力以勞人有財以分人乎吳慮曰有子墨子曰翟嘗計之矣翟慮耕天下而食之人矣盛然後當一農之耕分諸天下不能人得一升粟籍而以為得一升粟其不能飽天下之飢者既可睹矣翟慮織而衣天下之人矣盛然後當一婦人之織分諸天下不能人得尺布籍而為得尺布其不能暖天下之寒者既可睹矣翟慮被堅執鋭救諸侯之患盛然後一夫之戰一夫之戰其不御三軍既可睹矣翟以為不若誦先王之道而求其說通聖人之言而察其辭上說王公大人次匹夫徒步之士王公大人用吾言國必治匹夫徒步之士用吾言行必修故翟以為雖不耕而食飢不織而衣寒功賢於耕而食之織而衣之者也故翟以為雖不耕織乎而功賢於耕織也吳慮謂子墨子曰義耳義耳焉用言之哉子墨子曰籍設而天下不知耕教人耕與教人耕而獨耕者其功孰多吳慮曰教人耕者其功多子墨子曰籍設而攻不義之國鼓而使衆進戰與不鼓而使衆進戰而獨進戰者其功孰多吳慮曰鼓而進衆者其功多子墨子曰天下匹夫徒步之士少知義而教天下以義者功亦多何故弗言也若得鼓而進於義則吾義豈不益進哉子墨子游公尚過於越公尚過說越王越王大悅謂公尚過曰先生苟能使子墨子於越而教寡人請裂故吳之地方五百里以封子墨子公尚過許諾遂為公尚過束車五十乘以迎子墨子於魯曰吾以夫子之道說越王越王大悅謂過曰苟能使子墨子至於越而教寡人請裂故吳之地方五百里以封子子墨子謂公尚過曰子觀越王之志何若意越王將聽吾言用我道則翟將往量腹而食度身而衣自比於羣臣不能以封為哉抑越不聽吾言不用吾道而我往焉則是我以義也鈞之亦於中國耳何必於越哉子墨子游魏越曰既得見四方之君子則將先語子墨子曰凡入國必擇務而從事焉國家昏亂則語之尚賢尚同國家貧則語之節用節葬國家喜音湛湎則語之非樂非命國家淫僻無禮則語之尊天事鬼國家務奪侵凌即語之兼愛非曰擇務而從事焉子墨子曰出曹公子而於宋三年而反睹子墨子曰始吾游於子之門短褐之衣藿羹朝得之則夕弗得祭祀鬼神而以夫子之政家厚於始也有家厚謹祭祀鬼神然而人徒多死六畜不蕃身湛於病吾未知夫子之道之可用也子墨子曰不然夫鬼神之所欲於人者多欲人之處高爵祿則以讓賢也多財則以分貧也夫鬼神豈唯擢季拑肺之為欲哉今子處高爵祿而不以讓賢一不祥也多財而不以分貧二不祥也今子事鬼神唯祭而已矣而曰病何自至哉是猶百門而閉一門焉曰盜何從入若是而求福於有怪之鬼豈可哉魯祝以一豚祭而求百福於鬼神子墨子聞之曰是不可今施人薄而望人厚則人唯恐其有賜於已也今以一豚祭而求百福於鬼神唯恐其以牛羊祀也古者聖王事鬼神祭而已矣今以豚祭而求百福則其富不如其貧也彭輕生子曰往者可知來者不可知子墨子曰籍設而親在百里之外則遇難焉期以一日也及之則生不及則死今有固車良馬於此又有奴馬四隅之輪於此使子擇焉子將何乘對曰乘良馬固車可以速至子墨子曰焉在矣來孟山譽王子閭曰昔白公之禍執王子閭斧𨱆鉤要直兵當心謂之曰為王則生不為王則死王子閭曰何其侮我也殺我親而喜我以楚國我得天下而不義不為也又況於楚國乎遂而不為王子閭豈不仁哉子墨子曰難則難矣然而未仁也若以王為無道則何故不受而治也若以白公為不義何故不受王誅白公然而反王故曰難則難矣然而未仁也子墨子使勝綽事項子牛項子牛三侵魯地而勝綽三從子墨子聞之使高孫子請而退之曰我使綽也將以濟驕而正嬖也今綽也祿厚而譎夫子夫子三侵魯而綽三從是鼓鞭於馬靳也翟聞之言義而弗行是犯明也綽非弗之知也祿勝義也昔者楚人與越人舟戰於江楚人順流而進迎流而退見利而進見不利則退其難越人迎流而進順流而退見利進見不利則其退速越人因此若執函敗楚人公輸子曰自魯南游楚焉始為舟戰之器作為鉤强之備退者鈎之進者强之量其鈎强之長而制為之兵楚之兵節越之兵不節楚人因此若執函敗越人公輸子善其巧以語子墨子曰我舟戰有鈎强不知子之義亦有鈎强乎子墨子曰我義之鉤强賢於子舟戰之鈎强我鈎强我鈎之以愛揣之以恭弗鈎以愛則不親弗揣以恭則速狎而不親則速離故交相愛交相恭猶若相利也今子鈎而止人人亦鈎而止子子强而距人人亦强而距子交相鈎交相强猶若相害也故我義之鈎强賢子舟戰之鈎强公輸子削竹木以為䧿成而飛之三日不下公輸子自以為至巧子墨子謂公輸子曰子之為䧿也不如翟之為車轄須臾劉三寸之木而任五十石之重故所為巧利於人謂之巧不利於人謂之拙公輸子謂子墨子曰吾未得見之時我欲得宋自我得見之後于我宋而不義我不為子墨子曰翟之未得見之時也子欲得宋自翟得見子之後豫子宋而不義子弗為是我豫子宋也子務為義翟又將與子天下公輪第五十公輸盤為楚造雲梯之械成將以攻宋子墨子聞之起於齊行十日十夜而至於郢見公輸盤公輸盤曰夫子何命焉為子墨子曰北方有侮臣願藉子殺之公輸盤不說子墨子曰請獻十金公輸盤曰吾義固不殺人子墨子起再拜曰請說之吾從北方聞子為梯將以攻宋宋何罪之有荆國有餘於地而不足於民殺所不足而爭所有餘不可謂智宋無罪而攻之不可謂仁知而不爭不可謂忠爭而不得不可謂强義不殺少而殺衆不可謂知類公輸盤服子墨子曰然乎不已乎公輸盤曰不可吾既已言之王矣子墨子曰胡不見我於王公輸盤曰諾子墨子見王曰今有人於此舍其文軒鄰有短褐而欲竊之舍其粱肉鄰有糠糟而欲竊之此為何若人王曰必為竊疾矣子墨子曰荆之地方五千里此猶文軒之與敝輿也荆有雲夢犀兕麋鹿滿之江漢之魚鱉黿鼉為天下富宋所為無雉兔狐狸者也此猶粱肉之與糠糟也荆有長松文梓梗柟豫章宋無長木此猶錦繡之與短褐也臣以三事之攻宋也為與此同類王曰善哉雖然公輸盤為我為雲梯必取宋於是見公輸盤子墨子解帶為城以牒為械公輸盤九設攻城之機變子墨子九距之公輸盤之攻械盡子墨子之守圉有餘公輸盤詘而曰吾知所以距子矣吾不言子墨子亦曰吾知子之所以距我吾不言楚王問其故子墨子曰公輸子之意不過欲殺臣殺臣宋莫能守可攻也然臣之弟子禽滑釐等三百人已持臣守圉之器在宋城上而待楚寇矣雖殺臣不能絶也楚曰善哉吾請無攻宋矣子墨子歸過宋天雨庇其閭中守閭者不內也故曰治於神者衆人不知其功爭於明者衆人知之墨子卷之十三
