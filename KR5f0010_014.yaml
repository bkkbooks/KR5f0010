body:
  text: 備城門第五十二禽滑釐問於子墨子曰由聖人之言鳳鳥之不出諸侯畔殷周之國甲兵方起於天下大攻小强執弱吾欲守小國爲之柰何子墨子曰何攻之守禽滑釐對曰今之世常所以攻者臨鈎衝梯堙水宂窚空洞蟻傳轒輼軒車服問守此十二者奈何子墨子曰我城池修守器具推粟足上下相親又得四鄰諸侯之救此所以持也且守者雖善則若不可以守也若君用之守者又必能乎守者不能而君用之則猶若不可以守也然則守者必善而君尊用之然後可以守也故凡守城之法備城門爲縣沉機長二丈廣八尺爲之兩相如問扁數令相接三寸施士扁上無過二寸塹中深丈五廣比扇塹長以力爲度塹之未爲之縣可容一人所容至諸門户皆令鑿而慕孔孜之各爲二幕二一鑿而繫繩長四尺救車火爲姻矢射火城門上鑿扇上爲棧塗之持水麻升草盆救之門扇薄植皆鑿半尺一寸一淥弋弋長二寸見一寸相去七寸厚塗之以備火城門上所鑿以救門火者各一垂水火三石以上小大相雜門植關必環錮以錮金若鐵鍱之門關再重鍱之以鐵必堅梳關關二尺梳關一莧封以守印時令人行貌封及視關人桓淺深門者皆無得挾斧斤鑿鋸椎城上二步一渠渠立程丈三尺冠長十尺辟長六尺二步一答廣九尺表十二尺二步置連挺長斧長椎各一物槍二十枚周置二步中二步一木弩必射五十步以上及多爲矢節毋以竹箭楛趙𢱋榆可蓋求齊鐵夫播以射𧗹及攏樅二步積石石重中鈞以上者五百枚毋百以亢疾犁壁皆可善方二步積苙大一圍長丈二十枚五步一罌盛水有奚奚蠡大容一斗五步積狗屍五百枚狗屍長三尺喪以弟瓮亦端堅約弋十步積搏大二圍以上長八尺者二十枚二十五步一竈有鐵鐟容石以上者一戒以爲湯及持沙毋下千石三十步置坐候樓樓出於堞四尺廣三尺廣四尺板周三面密傳之夏蓋亦上五十步一藉車藉車必爲鐵纂五十步一井屏周垣之高八尺五十步一方方尚必爲關籥守之五十步積薪毋下三百石善蒙塗毋令外火能傷也百步一攏摐起地高五丈三層下廣前面八尺後十三尺亦上稱議衰殺之百步一木樓樓廣前面九尺高七尺樓𨋊居出城十二尺百步再再十壅以木爲繫連水器容四斗到六什者百百步一積雜秆大二圍以上者五十枚百步爲櫓櫓廣四尺高八尺爲衝術百步爲幽𦢌廣三尺高四尺者千二百步一立樓城中廣二丈五尺二長二丈出樞五尺城上廣三步到四步乃可以爲使鬪俾倪廣三尺高二尺五寸陛高二尺五廣長各三尺遠唐各六尺城上四隅童異高五尺四尉舍焉城上七尺一渠長丈五貍三尺去堞五寸夫長丈二尺臂長六尺半植一鑿内後長五寸夫雨鑿渠夫前端下堞四寸而適貍渠鑿坎覆以瓦冬日以馬夫寒皆待命若以瓦爲坎城上千步一表長丈棄水者操表摇之五五十步一厠與下同圂之厠者不得操城上三十步一藉車當隊者不用城上五十步一道陛高二尺五寸長十步城上五十步一樓𢪬𢪬勇勇必重士樓百步一外門發樓左右渠之爲樓加藉慕殘上出之以救外城上皆毋得有室若也可依匿者盡除去之城下州道内百步一積籍毋下三千石以上善塗之城上十人一什長屬一吏士一帛尉百步一亭高垣丈四尺厚四尺爲閨門兩扇令各可以自閈亭尉尉必取有序忠信可任事者二舍共一井爨灰康粃杯馬夫皆謹收藏之城上之備渠譫籍車行棧行樓到頶臯連挺長斧長椎長兹距飛衝縣批屈樓五十步一堞下爲爵内三尺而一爲薪臯二圍長四尺半必有潔瓦石重二升以上上城上涉五十步一積竈置鐵錯焉與涉同處木大二圍長丈二尺以上善耿卞本名曰長從五十步三十木橋長三丈毋下五十後使辛急爲壘壁以蓋瓦後之用瓦木罌容十升以上者五十步而十盛水且用之五十二者十步而二城四面四隅皆爲高磨使重室乎子居卞上候適視卞㑷狀與卞進左右所移處失候斬適人爲内而來我函使穴師選本匝而穴之爲之且内弩以應之民室杵木瓦石可以蓋城之備者蓋上之不從令者斬昔築七尺一居屬五步一壘五築有銻長斧柄長八尺十步一長鎌柄長八尺十步一鬪長椎柄長六尺頭長尺斧亦兩端三步一凡守圍城之法厚以高壕也深以廣樓撕揗守備繕利薪食足以交三月以上人衆以選吏尺和大臣有功勞於上者多主信以義萬民樂之無窮不然父母墳墓在焉不然山林草澤之饒足利不然地形之難攻而易守也不然則有深怨於適而有大功於上不然則賞明可信而罰嚴足畏也城下里中家人各葆亦左右前後如城上城小人衆葆離鄕老弱國中及也大城㓂至度必攻主人先削城編唯勿燒㓂在城下時换吏卒署而毋换亦養養毋得上城㓂在城下牧諸盆罋耕積之城下百步一積積五百城門内不得有室爲周官桓吏四尺爲倪行棧内閈二關一堞除城場外去池百步墻垣樹木小大盡壞代除去之㓂所從來若昵道傒近若城場皆爲扈樓立竹箭天中守堂下爲大樓高臨城堂下周散道中應客客待見時召三老左葆官中者與計事得爲之奈何子墨子曰問穴士之守邪備穴者城内爲高樓以謹此十四者具則民亦不宜上矣然後城可守十四者無一則雖善者不能守矣守法五十步丈夫十人丁女二十人老小十人計之五十步四百人城下樓本率一步一人二十步二十人城小大以此率之乃足以守圍宕馮面而蛾傅之主人則先之知主人利客適客攻以遂十萬物之衆攻無過四隊者上術廣五百步中術三百步下術五十步諸不盡百五步者主人利而客病廣五百步之隊大夫千人丁女子二千人老小千人凡千人而足以應之此守術之數也使老小不事者守於城上不當術者城持出必爲明填令吏民皆智知之從一人百人以上持出不操填章從人非亦故人乃亦稹章也千人之將以上止之勿令得行行及吏卒從之皆斬具以聞於上此守城之重禁之夫姦之所生也不可不審也候望適人適人爲變築垣聚土非常者若彭有水濁非常者此穴土也急壍城内内亦土直之穿井城内五步一井傅城足高地丈五尺地得泉三尺而止令陶者爲罌容四十斗以上固順之以薄輅革置井中使聰耳者伏罌而聽之審知穴之所在鑿内迎之令陶者爲月明長二尺五寸六圍中判之合而施之内中偃一覆一柱之外善周塗亦傳柱者勿燒柱者勿燒柱善塗亦竇際勿令泄兩旁皆如此與内俱前下迫地置康若疾亦中勿滿疾康長五竇左右俱雜相如也穴内口爲竈令如窯令容七八貟艾右左竇皆如此竈用四橐穴且愚以頡臯衝之疾鼓橐熏之必令明翟橐事者勿令離竈口連版以穴高下廣陜爲度令穴者與版俱前鑿亦版令容予參分亦疏數令可以救竇穴則遇以攸當之以予救竇勿令塞竇竇則塞弓版而郄過一竇而塞之鑿亦竇通亦煙煙通疾鼓橐以熏之徒穴内聽穴之左右急絶亦前勿令得行若集客穴塞之以柴塗令無可燒板也然則内士之攻敗矣斬艾與此長尺乃置窯竈中先壘窯壁迎穴爲連鑿井傅城足三丈一視外之廣陜而爲鑿井慎勿失城卑内高從内難鑿井城上爲三四井内新𣂩井中伏而聽之審之知穴之所在穴而迎之穴且遇爲頡臯必以堅杖爲夫以利斧施之命有力者三人用頡臯衝之灌以不潔十餘石趣狀此井中置艾亦上七分盆蓋井口毋令煙上泄旁亦橐口疾鼓之以車輪輼一束樵梁麻索塗中以束之鐵鎖縣正當㓂内口鐵鎖長三丈端環一端鈎儠穴高七尺五寸廣柱間也尺二尺一柱柱下傅舄二柱共一貟十一兩柱同質橫貟士柱大二圍半必固亦貟士無柱與柱交者穴二窯皆爲穴月屋爲置吏舍人各一人必置水塞穴門以車兩走爲蒀塗亦上以穴高下廣陳爲度令人穴中四五尺維置之當内者客争伏門轉而塞之爲窯客三貟艾者令亦穸人伏尺伏付穸一旁以二橐守之勿離内予以鐵長四尺半大如鐵服說即刃之二予内去竇尺邪鑿之上穴當心亦予長七尺穴中爲環利率穴二鑿井城上俟亦身井且通居版上而鑿亦一徧已而移版鑿一徧頡臯爲兩夫而旁貍亦植而敷鈎亦兩端諸作穴者五十人男女相半城上爲爵穴下堞三尺廣亦外五步一爵穴大容苴高者六尺下者三尺疏數自適爲之塞外塹去格七尺爲縣梁城莚陜不可塹者勿塹城上三十步一聾竈入壇苣長五節冠在城下聞鼓音燔苣復鼓内苣爵穴中照外諸藉車皆鐵什藉車之柱長丈七尺亦貍者四尺夫長三丈以上至三丈五尺馬頰長二尺八寸試藉車之力而爲之困失四分之三在上藉車夫長三尺四二三在上馬頰在三分中馬頰長二尺八寸夫長二十四尺以下不用治困以大車輪籍車桓長丈二尺半諸藉車皆鐵什復車者在之㓂𨶻池來爲作水甬深四尺堅慕貍之十尺一覆以月而待令以木大圍長二尺四分而早鑿之置炭火亦中而合慕之而以藉車投之爲疾犁投長二尺五寸大二圍以上涿代代長七寸我間六寸剡亦未狗走廣七寸長尺八寸蚤長四寸犬耳施之子墨子曰守城之法必數城中之木十人之所舉爲十挈五人之所舉爲五挈凡輕重以挈爲人數爲薪藮挈壯者有挈弱者有挈皆稱亦任凡挈輕重所爲吏人各得亦任城中無食則爲大殺去城門五步大塹之高地三丈下地至施賊亦中上爲發梁而機巧之比傅薪土使可道行旁有溝壘毋可踰越而出佻且比適人遂人引機發梁適人可禽適人恐懼而有疑心因而離備高臨第五十三禽子再拜再拜曰敢問適人積土爲高以臨吾城薪土俱上以爲羊黔蒙櫓俱前遂屬之城兵弩俱上爲之奈何子墨子曰子問羊黔者將之拙者也足以勞本不足以害城守爲臺城以臨羊黔左右出巨各二十尺行城三十尺强弩之技機藉之奇器之然則羊黔之攻敗矣備矣臨以連弩之車杖大方一方一尺長稱城之薄厚兩軸三輪輪居筐中重下上筐左右旁二植左右有𢖍植𢖍植左右皆圜内内徑四寸左右縛弩皆於植以弦鈎弦至於大弦弩臂前後與筐齊筐高八尺弩軸去下筐三尺五寸連弩機郭同銅一石三十斤引弦鹿長奴筐大三圍半左右有鈎距方三寸輪厚尺二寸銅距臂博尺四寸厚七寸長六尺横臂齊筐外蚤尺五寸有距傳六寸厚三寸長如筐有儀有詘勝可上下爲武重一石以材大圍五寸矢長十尺以繩矢端如如戈射以𢉳廬卷牧矢高弩臂三尺用弩無數出入六十枚用小矢無留十人主此車遂具㓂爲高樓以射道城上以答羅矢備梯第五十六禽滑釐子事子墨子三年手足胼胝面目黧黑役身給使不敢問欲子墨子其哀之及管酒槐脯寄于大山昧葇坐之以樵禽子禽子再拜而嘆子墨子曰亦何欲乎禽子再拜再拜曰敢問守道子墨子曰姑亡姑亡古有亦術者内不親民外不約治以少間衆以弱輕强身死國亡爲天下笑子亦慎之恐爲身薑禽子再拜頓首願遂問守道曰敢問客衆而勇烟資吾池軍卒並進雲梯既施攻備已具武士又多争土吾城爲之奈何子墨子曰問雲梯之邪雲梯者重器也亦動移甚難守爲行城雜樓相見以環亦中以適廣陜爲度環中藉慕毋廣亦處行城之法高城二十尺上加堞廣十尺左右出巨各二十尺高廣如行城之法爲爵穴煇儠施答亦外機衝錢城廣與隊等雜亦間以鎸劔持衝十人執劔五人皆以有力者令案目者視適以鼓發之夾而射之重而射披機藉之城上繁下矢石沙炭以雨之薪火水湯以濟之審賞行罰以静爲故從之以急毋使生慮若此則雲梯之攻敗矣守爲行堞堞高六尺而一等施劔亦面以機發之衝至則去之不至則施之爵穴三尺而一蒺藜投必遂而立以車推引之𥚑城外去城十尺𥚑厚十尺伐𥚑小大盡本斷之以十尺爲傳雜而深埋之堅築毋使可拔二十步一殺殺有一鬲鬲厚十尺殺有兩門門廣五尺𥚑門一施淺埋勿築令易拔城希𥚑門而直桀縣火四尺一鈎樴五步一竈門有鑪炭令適人盡入煇火燒門縣火次之出載而立亦廣終隊兩載之間載之門一火皆立而持鼓而撚火即具發之適人除火而復攻縣火復下適人甚病故引兵而去則令吾死左右出穴門擊遺師令賁士主將皆聽城鼓之音而出又聽城鼓之音而入因素出兵施休夜半城上四面鼓噪適人必或有此必破軍殺將以白衣爲服以號相得若也則雲梯之攻敗矣備水第五十八城内塹外周道廣八步備水謹度四旁高下城地中徧下令耳亦内及下地地深穿之令漏泉置則瓦井中視外水深丈以上鑿城内水耳並船以爲十臨臨三十人人擅弩計四有方必善以船爲轒輼二十船爲一隊選材士有力者三十人共船亦二十人人擅有方劔甲鞮瞀十人擅苗先養材士爲異舍食亦父母妻子以爲質視水可決以臨轒輼決外隄城上爲射㩘疾佐之備突第六十一城百步一突門突門各爲窯竈竇入門四五尺爲亦門上瓦屋毋令水潦能入門中吏主塞突門用車兩輪以木束之塗亦上維置突門内使度門廣狹令之入門中四五尺置窯竈門旁爲槀充竈狀柴艾寇即入下輔而塞之鼓槀而熏之備穴第六十二禽子再拜再拜曰敢問古人有善攻者穴土而入縳柱施火以壤吾城城壞或中人大鋌前長尺蚤長五寸兩鋌交之置如平不如平不利兌亦兩末穴隊若衝隊必審如攻隊之廣狹而令雅穿亦穴令亦廣必夷客隊䟽束樹木令足以爲柴搏毋前面樹長丈七尺一以爲外面以柴搏從橫施之外面以强塗毋令土漏令亦廣厚能任三丈五尺之城以上以柴木土稍杜之以急爲故前面之長短豫蚤接之令能任塗足以爲堞善塗亦外令毋可燒拔也大城丈五爲閨門廣四尺爲郭門郭門在外爲衡以兩木當門鑿亦木維敷上堞爲斬縣梁𨠎穿斷城以板橋邪穿外以板次之倚殺如城報城内有傳壤因以内壤爲外鑿亦間深丈五尺室以樵可燒之以待適令耳屬城爲再重樓下鑿城外堞内深丈五廣丈二樓若今耳皆令有力者主敵善射者主發佐皆廣矢治𥚑諸延堞高六尺部廣四尺皆爲兵弩簡格轉射機機長六尺狸一尺兩杖合而爲之輼輼長二尺中鑿夫之爲道臂臂長至桓二十步一令善射之者佐一人皆勿離城上百步一樓樓四植植皆爲通舄下高丈上九尺廣喪各丈六尺皆爲寧三十步一突九尺廣十尺高八尺鑿廣三尺表二尺爲寧城上爲攢火夫長以城高下爲度置火亦未城上九尺一弩一戟一椎一斧一艾皆積參石蒺藜渠長丈六尺夫長丈臂長六尺亦狸者三尺樹渠毋偞堞三尺藉莫長八尺廣七尺亦木也廣五尺中藉苴爲之橋索亦端適攻一令人下上之勿離城上二十步一藉車當隊者不用此數城上三十步一竈傅火者必以布麻什革盆十步一柄長八尺什大容二什以上到三十敝裕新布長六尺中拙柄長丈十步一必以大繩爲箭城上十步一水缻容三石以上小大相雜盆蠡各二財爲卒乾飯人二斗以備陰雨面使積燥處令使守爲城内堞外行餐置器備殺沙礫鐵皆爲坏斗令陶者爲薄缻大容一斗以上至二斗即用取三祕合束堅爲斗城上隔棧高丈二剡亦一未爲閨門閨門兩扇令可以各自閉也救闉池者以火與争鼓槀馮埴外内以柴爲燔靈丁三丈一火耳施之十步一人居柴内弩弩半爲狗犀者環之墻七步而一㓂至吾城急非常也謹備穴穴疑有應㓂急穴穴未得慎毋追凡殺以穴攻者二十步一置穴穴高十尺鑿十尺鑿如前步下三尺十步擁穴左右横行高廣各十尺殺俚兩罌深平城置板亦上𧵡板以井聽五步一密用𢲚若松爲穴户户穴有兩蒺藜皆長極亦户户爲環壘石外𡎋高七尺加堞亦上勿爲陛與石以縣陛上下出入具鑪槀槀以牛皮鑪有兩缻以橋鼓之百十每亦熏四十什然炭杜之滿鑪而蓋之毋令氣出適人疾近五百穴穴高若下不至吾穴即以伯鑿而求通之穴中與適人遇則皆圍而毋逐且戰北以須鑪火之然也即去而入壅穴殺有儠竄爲之户及關籥獨順得往來行亦中穴壘之中各一狗狗吠即有人也五十人攻内爲傳士之口受六參約枲繩以牛亦下可提而與投已則穴七人守退壘之中爲大廡一藏穴具亦中難穴取城外池脣木月散之什斬亦穴深到界難近穴爲鐵鈇金與扶林長四尺財自足客即穴亦穴而應之爲鐵鈎鉅長四尺者財自足穴微以鈎客穴者爲矩矛短戟短弩䖟矢財自足穴徹以鬪以金劔爲難長五尺爲𨥲木杘杘有慮枚以左客穴戒持罌客三十斤以上狸穴中丈一以聽穴者聲爲穴高八尺廣善爲傅置具全牛交槀皮及𡊛衛穴二蓋陳靃及艾穴徹熏之以斧金爲斫杘長三尺衛穴四爲壘衛穴四十屬四爲斤斧鋸鑿钁財自足爲鐵校衛穴四爲中櫓高十丈半廣四尺爲横穴八櫓具槀枲財自足以燭穴中蓋持醯客即熏以救目救目分方䥢穴以益盛醯置穴中丈盆毋少四斗即熏以自臨醯上及以沺目備蛾傅第六十三禽子再拜再拜曰敢問敵人强弱遂以傅城後上先斷以爲𣳬程斬城爲基掘下爲室前止不止後射既疾爲之奈何子墨子曰子問蛾傅之守邪蛾傅者將之忽者也守爲行臨射之校機藉之擢之太汜迫之燒答覆之沙石雨之然則蛾傅之攻敗矣備蛾傅爲縣脾以木板厚二寸前後三尺旁廣五尺高五尺而折爲下磨車轉徑尺六寸令一人操二丈四方刃其兩端居縣脾中以鐵璅敷縣二脾上衡爲之機令有力四人下上之勿難施縣脾大數二十步一攻隊所在六步一爲纍答廣從丈各二尺以木爲上𢖍以麻索大徧之染其索塗中爲鐵鏁鈎其兩端之縣客則蛾傅城燒答以覆之連䈕抄大皆救之以車兩走軸間廣大以圉犯之其兩端以束輪徧徧塗其上室中以榆若蒸以棘爲旁命曰火捽一曰傅湯以當隊客則乘隊燒傅湯斬維而下之令勇士隨而擊之以爲勇士前行城上輒塞壞城城下足爲下說鑱找長五尺大圉半以上皆剡其末爲五行行間廣三尺狸三尺大耳樹之爲連殳長五尺大十尺挺長二尺大六寸索長二尺椎柄長六尺首長尺五寸斧柄長六尺刃必利皆其一後答廣丈二尺丈六尺垂前𢖍四寸兩端接尺相覆勿令魚鱗三著其後行中央木繩一長二丈六尺答樓不會者以牒塞數暴乾答爲格令風上下堞惡疑壞者先貍木十尺一枚一節壞鄧植以押慮盧薄於木盧薄表八尺廣七寸經尺一數施一擊而下之爲上下而鄧之經一鈞禾樓羅石縣答植内毋植外杜格貍四尺高者十尺木長短相雜兑其上而外内厚塗之爲前行行棧縣答隅爲樓樓必曲裏土五步一毋其二十畾爵穴十尺一下壤三尺廣其外轉𦛸城上樓及散與池革盆若轉攻卒擊其後煖失治車革火凡殺蛾傅而攻者之法置薄城外去城十尺薄厚十尺伐操之法大小盡木斷之以十尺爲斷離而深貍堅築之毋使可拔二十步一殺有𡑾厚十尺殺有兩門廣五步薄門板梯貍之築令易拔城上希薄門而置搗縣大四尺一椅五步一竈竈門有鑪炭傳令敵人盡人車火燒門縣火次之載而立其廣終隊兩載之間一火皆立而侍鼓音而燃即俱發之敵人辟火而復攻縣火復下敵人甚病敵引哭而榆則令吾死士左右出穴門擊遺師令賁士主將皆聽城鼓之音而出又聽城鼓之音而入因素出兵將施伏夜半而城上四面鼓噪敵之必或破軍殺將以衣爲服以號相得墨子卷之十四
