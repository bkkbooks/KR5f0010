front:
  text: 墨子卷之四
  hash: sha256:bcca2d86f84c72f5b9ba6203ae64e5583afae408eaf306dac7e48b71f8e58c04
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_SBCK_004-1a}
body:
  text: 兼愛上第十四聖人以治天下爲事者也必知亂之所自起焉能治之不知亂之所自起則不能治譬之如醫之攻人之疾者然必知疾之所自起焉能攻之不知疾之所自起則弗能攻治亂者何獨不然必知亂之所自起焉能治之不知亂之所自起則弗能治聖人以治天下爲事者也不可不察亂之所自起當察亂何自起起不相愛臣子之不孝君父所謂亂也子自愛不愛父故虧父而自利弟自愛不愛兄故虧兄而自利臣自愛不愛君故虧君而自利此所謂亂也雖父之不子兄之不弟君之不臣此亦天下之所謂亂也父自愛也不愛子故虧子而自利兄自愛也不愛弟故虧弟而自利君自愛也不愛臣故虧臣而自利是何也皆起不相愛雖至天下之爲盜賊者亦然盜愛其室不愛其異室故異室以利其室賊愛其身不愛人故賊人以利其身此何也皆遂不相愛雖至大夫之相亂家諸侯之相攻國者亦然大夫各愛家不愛異家故亂異家以利家諸侯各愛其國不愛異國故攻異國以利其國天下之亂物具此而巳矣察此何自起皆起不相愛使天下兼相愛人愛其身惡施不孝猶有不者乎視子弟與臣其身惡施不不孝亡猶有盜賊乎故視人之室其室誰視人身其身誰賊故盜賊有亡猶有大夫之相亂家諸侯之相攻國者乎視人家其家誰亂視人國其國誰攻故大夫之相亂家諸侯之相攻國者有亡若使天下兼相愛國與國不相攻家與家不相亂盜賊無有君臣父子皆能孝此則天下治故聖人以治天下爲事者惡得不禁惡而勸愛故天下兼相愛則治相惡則亂故子墨子曰不可以不勸愛人者此也兼愛中第十五子墨子言曰仁人之所以爲事者必興天下之利除去天下之害以此爲事者也然則天下之利何也天下之害何也子墨子言曰今國之與國之相攻家之與家之相簒人之與人之相賊君臣不惠忠父子不孝兄弟不和調則此天下之害也然則崇此害亦何用生哉以不相愛生耶子墨子言以不相愛生今諸侯獨知愛其國不愛人之國是以不憚舉其國以攻人之國今家主獨知愛其家而不愛人之家是以不憚舉其家以簒人之家今人獨知愛其身不愛人之身是以不憚舉其身以賊人之身是故諸侯不相愛則必野戰家主不相愛則必相簒人與人不相愛則必相賊君臣不相愛則不惠忠父子不相愛則不孝兄弟不相愛則不和調天下之人皆不相愛強必執弱富必侮貧貴必敖賤詐必欺愚凡天下禍怨恨其所以起者以不相愛生也是以仁者非之既以非之何以易之子墨子言曰以兼相愛交相利之法易之然則兼相愛交相利之法將奈何哉子墨子言視人之國視其國視人之家視其家視人之身若視其身是故諸侯相愛則不野戰家主相愛則不相簒人與人相愛則不相賊貴不敖賤詐不欺愚凡天下禍簒怨恨可使毋起者以仁者譽之然而今天下之士君臣相愛則惠忠父子相愛則慈孝兄弟相愛則和調天下之人皆相愛強不執弱衆不劫寡富不侮貧子墨子曰然乃兼則善矣雖然天下之難物于故也子墨子言曰天下之士君子特不識其利辯其故也今夫政城野戰殺身爲名此天下百姓之所皆難也苟君說之則士衆能爲之況於兼相愛交相利則與此異夫愛人者人必從而愛之利人者人必從而利之惡人者人必從而惡之害人者人必從而害之此何難之有特上弗以爲政士不以爲行故也昔者晋文公好士之惡衣故文公之臣皆䍧羊之裘韋以帶錢練帛之冠入以見於君出以踐朝是其故何也君說之故臣爲之也昔者楚靈王好士細腰故靈王之臣皆以一飯爲節肱息然後帶扶墻然後起比期年朝有黧黒之危是其故何也君說之故臣能之也昔越王勾踐好士之勇教馴其臣和合之焚舟失火試其士曰越國之寶盡在此越王親自鼓其士而進之曰士聞鼓音破碎亂行蹈火而死者左右百人有餘越王擊金而退之是故子墨子言曰乃夫少食惡衣殺身而爲名此天下百姓之所皆難也苟君說之則衆能爲之況兼相愛交相利與此異矣夫愛人者人亦從而愛之利人者人亦從而利之惡人者人亦從而惡之害人者人亦從而害之此何難之有焉特上不以爲政而士不以爲行故也然而今天下之士君子曰然乃兼則善矣雖然不可行之物也譬挈太山越河濟也子墨子言是非其譬也夫挈太山而越河濟可謂畢劫有力矣自古及今未有能行之者也況乎兼相愛交相利則與此異古者聖王行之何以知其然古者禹治天下西爲西河漁竇以泄渠孫皇之水北爲防原注后之邸嘑池之竇洒爲底柱鑿爲龍門以利燕代胡貉與西河之民東方漏之陸防蓋諸之澤灑爲九澮以揵東土之水以利冀州之民南爲江漢淮汝東流之注五湖之處以利楚荆越與南夷之民此言禹之事吾今行兼矣昔者文王之治西土日月乍光于四方于西土不爲大國侮小國不爲衆庶侮鰥寡不爲奪穡人稷狗天屑臨文王慈是以老而無子者有所得終其壽連獨無兄弟者有所雜於生人之間少失其父母者有所放依而長此文王之事則吾今行兼矣昔者武王將事㤗山隧傳曰㤗山有道曾孫周王有事大事既仁人尚作以祗商夏蠻夷醜貉雖有周親不仁人萬方有罪維予一人此言武王之事吾今行兼矣是故子墨子言曰今天下之君子忠實欲天下之士富而惡其貧欲天下之治而惡其亂當兼相愛交相利此聖王之法天下之治道也不可不務爲也兼愛下第十六子墨子言曰仁人之事者必務求興天下之利除天下之害然當今之時天下之害孰爲大曰大國之攻小國也大家之亂小家也強之劫弱衆之寡詐之謀愚貴之敖賤此天下之害也人與爲人君者之不惠也臣者之不忠也父者之不慈也子者之不孝也此又天下之害也又與今人之賤人執其兵刄毒藥水火以交相虧賊此又天下之害也姑甞本原若衆害之所自此胡自生此自愛人利人生與即必曰非然也必曰從惡人賊人生分名乎天下惡人而賊人者兼與别與即必别也然即之交别者果生天下之大害者與是故别非也子墨子曰非人者必有以易之若非人而無以易之譬之猶以水救火也其說將必無可焉是故子墨子曰兼以易别然即兼之可以易别之故何也曰藉爲人之國爲其國夫誰獨舉其國以攻人之國者哉爲彼者由爲巳也爲人之都若爲其都夫誰獨舉其都以伐人之都者哉爲彼猶爲巳也爲人之家爲其家夫誰獨舉其家以亂人之家者哉爲彼猶爲巳也然即國都不相攻伐人家不相亂賊此天下之害與天下之利與即必曰天下之利也姑甞本原衆利之所自生此胡自生此自惡人賊人生與即必曰非然也必曰從愛人利人生分名乎天下愛人而利人者别與兼與即必曰兼也然即之交兼者果生天下之大利者與是故子墨子曰兼是也且鄕吾本言曰仁人之事者必務求興天下之利除天下之害今吾本原兼之所生天下之大利者也吾本原別之所生天下之大害者也是故子墨子曰别非而兼是者出平方也今吾將正求與天下之利而取之以兼爲正是以聰耳明目相爲視乎是以股肱畢強相爲動爲宰乎而有道肆相教誨是以老而無妻子者有所侍養以終其壽㓜弱童之無父母者有所放依以長其身今唯毋以兼爲正即其利也不識天下之事所以皆聞兼而非者其故何也然而天下之士非兼者之言猶未止也曰即善矣雖然豈可用哉子墨子曰用而不可難哉亦將非之且焉有善而不可用者姑嘗兩而進之誰以爲二士使其一士者執別使其一士者執兼是故別士之言曰吾豈能爲吾友之身爲吾身爲吾友之親爲吾親是故退睹其友饑即不食寒即不衣疾病不侍養死䘮不葬埋别士之言此行此兼士之言不然行亦不然曰吾聞爲高士於天下者必爲其友之身爲其身爲其友之親若爲其親然後可以爲高士天下是故退睹其友饑則食之寒則衣之疾病侍養之死䘮葬埋之兼士之言此行此之二者言相非而行相反與當使二士者言必信行必果使言行之合猶合符節也無言而不行也然即敢問今有平原廣野於此甲嬰胄將徃戰死生之權未可識也又有君大夫之逺使於巴越齊荆徃來及否未及否未可識也然即敢問不識將惡也家室奉承親戚提挈妻子而託之不識於兼之有是乎於别之有是乎哉以爲當其於此也天下無愚夫愚婦雖非兼之人必託之於兼之有是也此言而非兼擇即取兼即此言兼費也不識天下之士所以皆聞兼而非之者其故何也然而天下之士非兼者之言猶未止也曰意可以擇士而不可以擇君子姑嘗兩而進之誰以爲二君使其一君者執兼使其一君者執別是故別君之言曰吾惡能爲吾萬民之身爲吾身此㤗非天下之情也人之生乎地上之無幾何也譬之猶駟馳而過也是故退睹其萬民饑即不食寒即不衣疾病不侍養死䘮不葬埋別君之言此行此兼君之言不然行亦不然曰吾聞爲明君於天下者必萬萬民之身後爲其身然後可以爲明君於天下是故退睹萬民饑即食之寒即衣之疾病侍養之死䘮葬埋之兼君之言此行此然即交若之二君者言相非而行相反與常使二君者言必信行必果使言行之合猶合符節也無言而不行也然即敢問今歲有癘疫萬民多有勤苦凍餒轉死溝壑中者既巳衆矣不識將擇之二君者將何從也我以爲當其於此也天下無愚夫愚婦雖非兼君必從兼君是也言而非兼擇即此言行拂也不識天下所以皆聞兼而非之者其故何也然而天下之士非兼者之言也獨未止也曰兼即仁矣義矣雖然豈可爲哉吾譬兼之不可爲也猶挈㤗山以超江河也故兼者願之也夫豈可爲之物哉子墨子曰夫挈㤗山以超江河自古之及今生民而來未甞有也今夫兼相愛交相利此自先聖六王者親行之何知先聖六王之親行之也子墨子曰吾非與之並世同時親聞其聲見其色也以其所書於竹帛鏤於金石於槃盂傳遺後世子孫者知之㤗誓曰文王日月乍照光于四方于西土即此言文王之兼愛天下之博大也譬之日月兼照天下之無有也即此文王兼也雖子墨子之所謂兼者於文王取法焉且不唯㤗誓爲然雖禹誓即亦猶是也禹曰濟濟有衆咸聽朕言非惟小子敢行稱亂蠢兹有苗用天之罰若予既率爾群對諸群以征有苗禹之征有苗也非以求以重富貴干福禄樂耳目也以求興天下之利除天下之害即此禹兼也雖子墨子之所謂兼者於禹求焉且不唯禹誓爲然雖湯說即亦猶是也湯曰惟予小子履敢用玄牡告于上天后曰今天大旱即當朕身履未知得罪于上下有善不敢蔽有罪不敢赦簡在帝心萬方有罪即當朕身朕身有罪無及萬方即此言湯貴爲天子富有天下然且不憚以身爲犧牲以祠說于上帝神即此湯兼也雖子墨子之所謂兼者於湯取法焉且不唯誓命與湯說爲然周詩即亦猶是也周詩曰王道蕩蕩不偏不黨王道平平不黨不偏其矢其易若底君子之所履小人之所視吾言非語道之謂也古者文武爲正均分賞賢罰勿有親戚弟兄之所阿即此文武兼也雖子墨子之所謂兼者於文武取法焉不識天下之人所以皆聞兼而非之者其故何也然而天下之非兼者之言猶未止曰意不忠親之利而害爲孝乎子墨子曰姑甞本原之孝子之爲親度者吾不識孝子之爲親度者亦欲人愛利其親與意欲人之惡賊其親與以說觀之即欲人之愛利其親也然即吾惡先從事即得此我先從事乎愛利人之親然後人報我愛利吾親乎意我先從事乎惡人之親然後人報我以愛利吾親乎即必吾先從事乎愛利人之親然後人報我以愛利吾親也然即之交孝子者果不得巳乎毋先從事愛利人之親者與意以天下之孝子爲遇而不足以爲正乎姑甞本原之先王之所書大雅之所道曰無言而不讐無德而不報投我以桃報之以李即此言愛人者必見愛也而惡人者必見惡也不識天下之士所以皆聞兼而非之者其故何也意以爲難而不可爲邪甞有難此而可爲者昔荆靈王好小腰當靈王之身荆國之士飯不踰乎一固據而後興扶垣而後行故約食爲其難爲也然後爲而靈王說之未踰於世而民可移也即求以鄕其上也昔者越王句踐好勇教其士臣三年以其知爲未足以知之也焚舟失火鼓而進之其士偃前列伏水火而死有不可勝數也當此之時不鼓而退也越國之士可謂顫矣故焚身爲其難爲也然後爲之越王說之未踰於世而民可移也即求以鄕上也昔者晋文公好苴服當文公之時晋國之士大布之衣䍧羊之裘練帛之冠且苴之屨入見文公出以踐之朝故苴服爲其難爲也然後爲而文公說之未踰於世而民可移也即求以鄕其上也是故約食焚舟苴服此天下之至難爲也然後爲而上說之未踰於世而民可移也何故也即求以鄕其上也今夫兼相利此其有利且易爲也不可勝計也我以爲則無有上說之者而巳矣苟有上說之者勸之以賞譽威之以刑罰我以爲人之於就兼相愛交相利也譬之猶火之就上水之就下也不可防止於天下故兼者聖王之道也王公大人之所以安也萬民衣食之所以足也故君子莫審兼而務行之爲人君必惠爲人臣必忠爲人父必慈爲人子必孝爲人兄必友爲人弟必悌故君子莫若欲爲惠君忠臣父孝子友兄悌弟當兼之不可不行也此聖王之道而萬民之大利也墨子卷之四終
