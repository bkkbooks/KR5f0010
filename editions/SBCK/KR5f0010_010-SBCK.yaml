  text: 墨子卷之十
  hash: sha256:76ee70fa93d3688025cde66e083cc73c6a4cb8073c42729bae7b444065ee8c17
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_SBCK_009-23b}
body:
  text: 經上第四十故所得而後成也止以乆也體分於兼也必不巳也知材也平同高也慮求也同長以缶相盡也知接也中同長也明也厚有所大也仁體愛也日中缶南也義利也參也禮敬也圜一中同長也行爲也方柱隅四讙也實榮也倍爲二也忠以爲利而強低也端體之無序而最前者也孝利親也有間中也信言合於意也間不及旁也佴自作也纑間虛也作嗛也盈莫不有也㢘作非也堅白不相外也令不爲所作也攖相得也任士損巳而益所爲也似有以相攖有不相攖也勇志之所以敢也次無間而不攖攖也力刑之所以奮也法所若而然也生刑與知處也佴所然也卧知無知也所以明也夣卧而以爲然也攸不可兩不可也平知無欲惡也辯爭攸也辯勝當也利所得而喜也爲窮知而懸於欲也害所得而惡也巳成亡治求得也使謂故譽明美也名達誹明惡也謂移舉加舉擬實也知間親名實合爲言出舉也聞博親且且言然也見體盡君臣萌通約也合缶宜必功利民也欲缶權利且惡缶權害賞上報下之功也爲存亡易蕩治化罪犯禁也同重體合罰上報下之罪也異二體不合不同異而俱於之一也同異交得放有無乆彌異時也守彌異所也聞耳之聰也窮或有前不容尺也循所聞而得其意心也察也盡莫不然也言口之利也始當時也執所言而意得見心之辯也化徴易也諾不一利用損偏去也服執誽音利巧轉則求其故大益儇秪法同則觀其同庫易也法異則觀其宜動或從也止因以别道讀此書旁行缶無非經下第四十一止以行人在同所存與者於存與孰存駟異推之難在之大小五行毋常勝在宜物盡同名二與闘愛食與招白與視麗與夫與履一偏棄之謂而固是也在因不可偏去而二在見與俱一與二廣與循無欲惡之爲益損也在宜不能而不害在害損而不害在餘異不吡在量知而不以五路在乆偏去莫加少在故必在頓假必誖在不然知其所以不知在以名取物之所以然與所以知之與所以使人知之不必同在病無不必待有在所謂疑在逄循遇過擢慮不疑在有無合與一或復否在拒且然不可正而不害用工在宜歐物一體也在俱一惟是均之絕不在所均宇或從在長宇乆尭之義也生於今而處於古而異時在所義二臨鑑而立景到多而若少在寡區狗犬也而殺狗非殺犬也可在重鑑位量一小而易一大而缶在中之外内使殷美在使鑑團景一不堅白在荆之大其沈淺也在具無乆與宇堅白在因以檻爲博於以爲無知也在意在諸其所然未者然在於是推之意未可知在可用過仵景不從在改爲一少於二而多於五在建住景二在重非半弗則不動在端景到在午有端與景長在端可無也有之而不可去在嘗然景迎曰在博缶而不可擔在景之小大在地缶逺近宇進無近在敷天而必缶在得行循以乆在先後貞而不撓在勝一法者之相與也盡若方之相召也在方契與枝板在薄狂舉不可以知異在有不可牛馬之非牛與可之同在兼者不可正在剃循此循此與彼此同在異推之必徃在廢材唱和同患在功買無貴在仮其賈聞所不知若所知則兩知之在告賈宜則讐在盡以言爲盡誖誖在其言無而懼在弗心惟吾謂非名也則不可在仮或過名也在實無窮不害兼在盈否知知之否之足用也諄在無以也不知其數而知其盡也在明者謂辯無勝必不當在辯不知其所處不害愛之在䘮子者無不讓也不可在始仁義之爲外内也内在仵顔於一有知焉有不知焉在存學之益也在誹者有指於二而不可逃在以二絫誹之可否不以衆寡在可非所知而弗能指在春也逃臣狗犬貴者非誹者諄在弗非知狗而自謂不知犬過也在重物箕不甚在若是通意後對在不知其誰謂也取下以求上也在澤是是與是同在不州經上第四十二故小故有之不必然無之必不然體也若有端大故有之必無然若見之成見也體若二之一尺之端也知材知也者所以知也而必知若明慮慮也者以其知有求也而不必得之若睨知知也者以其知過物而能貌之若見恕恕也者以其知論物而其知之也著若明仁愛巳者非爲用巳也不若愛馬著若明義志以天下爲芬而能能利之不必用禮貴者公賤者名而俱有敬僈焉等異論也行所爲不善名行也所爲善名巧也若爲盗實其志氣之見也使人如巳不若金聲玉服忠不利弱子亥足將入止容孝以親爲芬而能能利親不必得信不以其言之當也使人視城得金佴與人遇人衆遁涓爲是爲是之台彼也弗爲也㢘巳惟爲之知其也諰也所令非身弗行任爲身之所惡以成人之所急勇以其敢於是也命之不以其不敢於彼也害之力重之謂下與重舊也生楹之生商不可必也卧夣平惔然利得是而喜則是利也其害也非是也害得是而惡則是害也其利也非是也治吾事治矣人有治南北譽之必其行也其言之忻使人督之誹必其行也其言之忻譽告以文名舉彼實也故言也者諸口能之出民者也民若畫俿也言也謂言猶石致也且自前曰且自後曰巳方然亦且若石者也君以若名者也功不待時若衣裘功不待時若衣裘賞罪不在禁惟害無罪殆姑上報下之功也罰上報下之罪也侗二人而俱見是楹也若事君今乆古今且莫宇東西家南北窮或不容尺有窮莫不容尺無窮也盡但止動始時或有乆或無乆始當無乆化若鼃爲鶉損偏也者兼之禮也其體或去存謂其存者損儇昫民也庫區穴若斯貌常動偏從者戸樞免瑟止無乆之不止當牛非馬若夫過楹有乆之不止當馬非馬若人過梁必謂臺孰者也若弟兄一然者一不然者必不必也是非必也同捷與狂之同長也心中自是徃相若也厚惟無所大圜規寫攴也方矩見攴也倍二尺與尺但去一端是無同也有聞謂夾之者也聞謂夾者也尺前於區穴而後於端不夾於端與區内及及非齊之及也纑虛也者兩木之間謂其無木者也盈無盈無厚於尺無所徃而不得得二堅異處不相盈相非是相外也攖尺與尺俱不盡端無端但盡尺與或盡或不盡堅白之攖相盡體攖不相盡端仳兩有端而后可次無厚而厚可法意規貟三也俱可以爲法佴然也者民若法也彼凡牛樞非牛兩也無以非也辯或謂之牛或謂之非牛是爭彼也是不俱當不俱當必或不當不若當犬爲欲其指智不知其害是智之罪也若智之慎文也無遺於其害也而猶欲之則離之是猶食脯也騷之利害未知也欲而騷是不以所疑止所欲也廧外之利害未可知也趨之而得力則弗趨也是以所疑止所欲也觀爲窮知而懸於欲之理脯而非也指而非愚也所爲與不所與爲相疑也非謀也巳爲衣成也治病亡也使令謂謂也不必成濕故也必待所爲之成也名物逹也有實必待文多也命之馬也若實也者必以是名也命之臧也是名也止於是實也聲出口俱有名若姓宇灑謂狗犬命也狗犬舉也叱狗加也知傳受之聞也方不㢓也身觀焉親也所以謂名也所謂實也名實耦合也志行爲也聞或告之傳也身觀焉親也見時者體也二者盡也古兵立反中志工正也臧之爲宜也非彼必不有必也聖者用而勿必必也者可勿疑仗者兩而勿偏爲早臺存也病亡也買鬻易也霄盡蕩也順長治也鼃買化也同二名一實重同也不外於兼體同也俱處於室合同也有以同同也異二必異二也不連屬不體也不同所不合也不有同不也同異交得於福家良恕有無也比度多少也免虭還園去就也鳥折用桐堅柔也劔早死生也處室子子母長少也兩絕勝白黒也中央旁也論行行行學實是非也難宿成未也兄弟俱適也身處志徃存亡也霍爲姓故也賈宜貴賤也諾超城貟止也相從相去先知是可五色長短前後輕重援執服難成言務成之九則求執之法法取同觀巧傳法取此擇彼問故觀宜以人之有黒者有不黒者也止黒人與以有愛於人有不愛於人心愛人是孰宜心彼舉然者以爲此其然也則舉不然者而問之若聖人有非而不非正五諾皆人於知有過五諾若貟無直無用五諾若自然矣經下第四十三止彼以此其然也是其然也我以此其不然也疑是其然也謂四足獸與生鳥與物盡與大小也此然是必然則俱爲麋同名俱闘不俱二三與闘也包肝肺子愛也橘茅食與抬也白馬多白視馬不多視白與視也爲麗不必麗不必麗與也爲非以人是不爲非若爲夫勇不爲夫爲屨以買衣爲屨夫與屨也二與一亡不與一在偏去未有文實也而後謂之無文實也則無謂也不若敷與美謂是則是固美也謂也則是非美無謂則報也見不見離一二不相盈廣循堅白舉不重不與箴非力之任也爲握者之倍非智之任也若耳目異木與夜孰長智與粟孰多爵親行賈四者孰貴麋與霍孰高麋與霍孰霍虭與瑟孰瑟偏俱一無變假假必非也而後假狗假霍也猶氏霍也物或傷之然也見之智也吉之使智也疑爲務則士爲牛廬者夏寒也舉之則輕廢之則重非有力也沛從削非巧也若石羽楯也闘者之敝也以飲酒若以曰中是不可智也愚也智與以巳爲然也與愚也俱俱一若牛馬四足惟是當牛馬數牛數馬則牛馬二數牛馬則牛馬一若數指指五而五一長宇徙而有處宇宇南北在且有在莫宇徙乆無堅得白必相盈也在尭善治自今在諸古也自古在之今則堯不能治也景光至景亡若在盡古息景二光夾一光一光者景也景光之人煦若射下者之人也高高者之人也下足蔽下光故成景於止首蔽上光故成景於下在逺近有端與於光故景庫内也景日之光反燭人則景在日與人之間景木杝景短大木正景長小大小於木則景大於木非獨小也逺近臨正鑒景寡貌能白黒逺近杝正異於光鑒景當俱就去當俱俱用北鑒者之臭於鑒無所不鑒景之臭無數而必過正故同處其體俱然鑒分鑒中之内鑒者近中則所鑒大景亦大逺中則所鑒小景亦小而必正起於中縁正而長其也中之外鑒者近中則所鑒大景亦大逺中則所鑒小景亦小而必易合於而長其也鑒鑒者近則所鑒大景亦大亦逺所鑒小景亦小而必正景過正故招衡木如重焉而不撓極勝重也右校交繩無加焉而撓極不勝重也衡加重於其一旁必捶權重相若也相衡則本短標長兩加焉重相若則摽必下標得權也挈有力也引無力也不心所挈之止於施也繩制挈之也若以錐刺之挈長重者下短輕者上上者愈得下下者愈亡繩權重相若則心矣收上者愈䘮下者愈得上者權重盡則遂挈兩輪高兩輪爲輲車梯也重其前弦其前載弦其前載弦其軲而縣重於其前是梯挈且挈則行凡重上弗挈下弗收旁弗劫則下扡或害之也㳅者不得也今也廢尺於平地重不下無䠙也若夫繩之引軲也是猶自舟中引横也倍拒堅䠳焉則不正誰石絫石耳夾者法也方石去地尺關石於其下縣絲於其上使適至方石不下柱也膠絲去石挈也絲絕引也未變而名易收也買刀糴相爲賈刀輕則糴不貴刀重則糴不易王刀無變糴有變歲變糴則歲變刀若鬻子賈盡也者盡去其以不讐也其所以不讐去則讐缶賈也宜不宜缶欲不欲若敗鬻室嫁子無子在軍不必其死生聞戰亦不必其生前也不懼今也懼或知是之非此也有知是之不在此也然而謂此南北過而以巳爲然始也謂此南方故今也謂此南方智論之非智無以也謂所謂非同也則異也同則或謂之狗其或謂之犬也異則或謂之牛牛或謂之馬也俱無勝是不辯也辯也者或謂之是或謂之非當者勝也無讓者酒未讓始也不可讓也於石一也堅白二也而在石故有智焉有不智焉可有指子智是有智是吾所先舉重則子智是而不智吾所先舉也是一謂有智焉有不智焉也若智之則當指之智告我則我智之兼指之以二也衡指之參之也若曰必獨指吾所舉毋舉吾所不舉則者固不能獨指所欲相不傳意若未校且其所智是也所不智是也則是智是之不智也惡得爲一謂而有智焉有不智焉所春也其執固不可指也逃臣不智其處狗犬不智其名也遺者巧弗能兩也智智狗重智犬則過不重則不過通問者曰子智乎應之曰何謂也彼曰施則智之若不問何謂徑應以弗智則過且應必應問之時若應長應有深淺天常中在兵人長所室堂所存也其子存者也據在者而問室堂惡可存也主室堂而問存者孰存也是一主存者以問所存一主所存以問存者五合水土火火離然火鑠金火多也金靡炭金多也合之府木木離木若識麋與魚之數惟所利無欲惡傷生損壽以少連是誰愛也嘗多粟或者欲不有能傷也若酒之於人也且人利人愛也則惟弗治也損飽者去餘適足不害能害飽若傷麋之無脾也且有損而后益智者若病之之於也智以目見而目以火見而火不見惟以五路智乆不當以目見若以火見火謂火也非以火之我有若視曰智雜所智與所不智而問之則必曰是所智也是所不智也取去俱能之是兩智之也無若無焉則有之而后無無天䧟則無之而無擢疑無謂也臧也今死而春也得文文死也可且猶是也且且必然且巳必巳且用工而後巳者必用工後巳均髮均縣輕而髪絕不均也均其絕也莫絕尭霍或以名視人或以實視人舉友富商也是以名視人也指是臛也是以實視人也尭之義也是聲也於今所義之實處於古若殆於城門與於臧也狗狗犬也謂之殺大可若兩使令使也我使我我不使亦使我殿戈亦使殿不美亦使殿荆沉荆之貝也則沈淺非荆淺也若易五之一以楹之搏也見之其於意也不易先智意相也若楹輕於秋其於意也洋然叚椎錐俱事於履可用也成繪屨過椎與成椎過繪屨同過件也一五有一焉一有五焉十二焉非半進前取也前則中無爲半猶端也前後取則端中也必半毋與非半不可也可無也巳給則當給不可無也乆有窮無窮正九無所處而不中縣搏也傴宇不可偏舉字也進行者先敷近後敷逺行者行者必先近而後逺逺脩近脩也先後乆也民行脩必以乆也一方貌盡俱有法而異或木或石不害其方之相台也盡貌猶方也物俱然牛狂與馬惟異以牛有齒馬有尾牛之非馬也不可是俱有不偏有偏無有曰之與馬不用牛角馬無角是不同也若舉牛有角馬無角以是爲之不同也是狂舉也猶牛有齒馬有尾或不非牛而非牛也可則或非牛或牛而牛也可故曰牛馬非牛也未可牛馬牛也未可則或可或不可而曰牛馬牛也未可亦不可且牛不二馬不二而牛馬二則牛不非牛馬不非馬而牛馬非牛非馬無難彼正名者彼此彼此可彼彼止於彼此此止於此彼此不可彼且此也彼此亦可彼此止於彼此若是而彼此也則彼亦且此此也唱無過無所周若粺和無過使也不得巳唱而不和是不學也智少而不學必寡和而不唱是不教也智而不教功適息使人奪人衣罪或輕或重使人予人酒或厚或薄聞在外者所不知也或曰在室者之色若是其色是所不智若所智也猶白若黒也誰勝是若其色也若白者必白今也智其色之若白也故智其白也夫名以所明正所不智不以所不智疑所明若以尺度所不智長外親智也室中智也以誖不可也出入之言可是不誖則是有可也之人之言不可以當必不審惟謂是霍可而猶之非夫霍也謂彼是是也不可謂者毋惟乎其謂彼猶惟乎其謂則吾謂不行彼若不惟其謂則不行也無南者有窮則可盡無窮則不可盡有窮無窮未可智則可盡不可盡不可盡未可智人之盈之否未可智而必人之可盡不可盡亦未可智而必人之可盡愛也誖人若不盈先窮則人有窮也盡有窮無難盈無窮則無窮盡也盡有窮無難不二智其數惡智愛民之盡文也或者遺乎其問也盡問人則盡愛其所問若不智其數而智愛之盡文也無難仁仁愛也義利也愛利此也所愛所利彼也愛利不相爲内外所愛利亦不相爲外内其爲仁内也義外也舉愛與所利也是狂舉也若左目出右目入學也以爲不知學之無益也故告之也是使智學之無益也是教也以學爲無益也教誖論誹誹之可不可以理之可誹雖多誹其誹是也其理不可非雖少誹非也今也謂多誹者不可是猶以長論短不誹非巳之誹也不非誹非可非也不可非也是不非誹也物甚長甚短莫長於是莫短於是是之是也非是也者莫甚於是取高下以善不善爲度不若山澤處下善於處上下所請上也不是是則是且是焉今是文於是而不於是故是不文是不文則是而不文焉今是不文於是而文於是故文與是不文同也墨子卷之十終
