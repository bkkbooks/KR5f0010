front:
  text: 墨子卷之十五
  hash: sha256:d57536dbefd4820c2cacb43673c1c51156d7b16661a67b494e64cea5311d74bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_SBCK_014-25b}
body:
  text: 迎敵祠第六十八敵以東方來迎之東壇壇高八尺堂宻八年八十者八人主青旗青神長八尺者八弩八八而止將服必青其牲以鷄敵以南方來迎之南壇壇高七尺堂宻七年七十者七人主赤旗赤神長七尺者七弩七七而止將服必赤其牲以狗敵以西方來迎之西壇壇高九尺堂宻九年九十者九人主白旗素神長九尺者九弩九九而止將服必白其牲以羊敵以北方來迎之北壇壇高六尺堂宻六年六十者六人主黒旗黒神長六尺者六弩六六發而止將服必黒其牲以從外宅諸名大祠靈巫或禱焉給禱牲凡望氣有大將氣有小將氣有徃氣有來氣有敗氣能得明此者可知成敗吉凶舉巫醫有所長具藥宫之善爲舎巫必近公社必敬神之巫以請守守獨智巫望之氣請而巳其出入爲流言驚駭恐吏民謹微察之斷罪不赦望氣舎近守官牧賢大夫及有方技者工弟之舉屠酤者置厨給事弟之凡守城之法縣師受事出葆循溝防築薦通塗脩城百官共財百工即事司馬視城脩卒伍設守門三人掌右閹二人掌左閹四人掌閉百甲坐之城上歩一甲一㦸其賛三人五歩有五長十歩有什長百歩有百長旁有大率中有大將皆有司吏卒長城上當階有司守之移中中處澤急而奏之士皆有職城之外矢之所還壞其墻無以爲客菌三十里之内薪蒸水皆入内狗豚鷄食其肉斂其骸以爲醢腹病者以起城之内薪蒸廬室矢之所還皆爲之涂菌令命昏緯狗纂馬掔緯静夜聞鼓聲而謲所以閹客之氣也所以固民之意也故時謲則民不疾矣祝史乃告於望四山川社稷先於戎乃退公素服誓于太廟曰其人爲不道不脩義詳唯乃是王曰予必懷亡爾社稷㓕爾百姓二參子尚夜自厦以勤寡人和心比力兼左右各死而守既誓公乃退食舎於中太廟之右祝史舎于社百官具御乃斗鼓于問右置旂左置旌于隅練名射參發告勝五兵咸備乃下出挨升望我郊乃命鼓俄升役司馬射自門右矢射之茅參弩繼之校自門左先以揮木石繼之祝史宗人告社覆之以甑旗幟第六十九守城之法木爲蒼旗火爲赤旗薪樵爲黄旗石爲白旗水爲黒旗食爲菌旗死士爲倉英之旗竟士爲雩旗多卒爲雙兎之旗五尺男輕重分數各有請主慎道路者有經亭尉各爲幟竿長二丈五帛長丈五廣半幅者大㓂傳攻前池外㢘城上當隊鼓三舉一幟到水中周鼓四舉二幟到藩鼓五舉三幟到馮垣鼓六舉四幟到女垣鼓七舉五幟到六城鼓八舉六幟乘六城半以上鼓無休夜以火如此數㓂郤解輙部幟如進數而無鼓城爲隆長五十尺四四門將長四十尺其次三十尺其次二十五尺其次二十尺其次十五尺高無下四十五尺城上吏卒置之背卒於頭上城下吏卒置之眉在他於左眉中軍置之各一鼓中軍一三毎鼓三十撃之諸有鼓之吏謹以次應之當應鼓而不應不當應而應鼓主者斬道廣三十歩於城下夾階者各二其井置鐡罐於道之外爲屏三十歩而爲之圜高丈爲民圂垣高十二尺以上巷術周道者心爲之門門二人守之非有信符勿行不從令者斬城中吏卒民男女皆葕異衣章微令男女可知諸守牲格者三出適守以令召賜食前予大旗署百戸邑他人財物建旗其署令皆明白知之曰某子旗牲格内廣二十五歩外廣十歩表以地形爲度靳卒中教解前後左右卒勞者更休之號令第七十安國之道道任地始地得其任則功成地不得其任則勞而無功人亦如此備不先具者無以安主吏卒民多心不一者皆在其將長諸行賞罰及有治者必出於功王數使人行勞賜守城塞備蠻夷之勞苦者舉其守率之財用有餘不足地形之當守者其噐備常多者縣邑視其樹木惡則少用田不辟少食無大屋草蓋少用桒多財民好食爲内牒内行棧置噐備其上城上吏卒養皆爲舎道内各當其隔部養什二人爲符者曰養吏一人辨護諸門門者及有守禁者皆無令無事者得稽留心其旁不從令者戮敵人但至千丈之城必郭近之主人利不盡千丈者勿迎也視敵之居曲衆少而應之此守城之大體也其不在此中者皆心術與人事參之凡守城者以函傷敵爲上其延日持乆以待救之至明於守者也不能此乃能守城守城之法敵去邑百里以上城將如今盡召五官及百長以富人重室之親舎之官符謹令信人守衛之謹宻爲故乃傳城守城將營無下三百人四四門之將必選擇之有功勞之臣及死事之後重者從卒各百人門將并守他門他之上必夾爲高樓使善射者居焉女郭馮垣一人一人守之使重字子五十歩一撃因城中里爲八部部一吏吏各從四人以行衝術及里中里中父老小不舉守之事及㑹計者分里以爲四部部一長以苛徃來不以時行行而有他異者以得其姦吏從卒四人以上有分者大將必與爲信符大將使人行守操信符信不合及號不相應者伯長以上輙止之以聞大將當止不止及從吏卒縱之皆斬諸有罪自死罪上皆還父母妻子同産諸男女有守於城上者什六弩四兵丁女子老少人一矛卒有驚事中軍疾撃鼓者三城上道路里中巷街皆無得行行者斬女子到大軍令行者男子行左女子行右無並行皆就其守不從令者斬離守者三日而一徇而所以備姦也里缶與皆守宿里門吏行其部至里門缶與開門内吏與行父老之守及窮巷間無人之處姦民之所謀爲外心罪車裂缶與父老及吏主部者不得皆斬之除又賞之黄金人二鎰大將使使人行守長夜五循行短夜三循行四之吏亦皆自行其守如大將之行不從令者斬諸竈火爲井火突高出屋四尺慎無敢失火失火者斬其端失火以爲事者車裂伍人不得斬得之除救火者無敢讙譁及離守絕巷救火者斬其缶及父老有守此巷中部吏皆得救之吏部函令人謁之大將大將使信人將左右救之部吏失不言者斬諸女子有死罪及坐失火皆無有所失逮其以火爲亂事者如法圍城之重禁敵人卒而至嚴令吏民無敢讙三最並行相視坐泣流涕視舉手相探相指相呼相曆相踵相投相撃相靡以身及衣訟駮言語及非令也而視敵動移者斬伍人不得斬得之除伍人踰城歸敵伍人不得斬與伯歸敵隊吏斬與吏歸敵隊將斬歸敵者父母妻子同産皆車裂先覺之除當術需敵離地斬伍人不得斬得之除其疾闘却敵於術敵下終不能復上疾闘者隊二人賜上奉而勝圍城周里以上封城將三十里地爲關内侯輔將如今賜上卿丞及吏比於丞者賜爵五大夫官吏豪傑與計堅者守十人及城上吏比五官者皆賜公乗男子有守者爵人二級女子賜錢五千男女老小先分守者人賜錢千復之三歲無有所與不租稅此所以勸吏民堅守勝圍也吏卒侍大門中者曹無過二人勇敢爲前行伍坐令各知其左右前後擅離署戮門尉三閱之莫鼓撃門閉一閱守時令人參之上逋者名鋪食皆於署不得外食守必謹微察視謁者執盾中㳙及婦人侍前者志意顔色使令言語之請及上飮食必令人嘗皆非請也撃而請故守有所不恱謁者執盾中㳙及婦人待前者守曰斷之衝之縛之不如令及後縛者皆斷必時素誡之諸門下朝夕立坐各令以年少長相次旦夕就位先估有功有能其餘皆以次立五日官各上喜居處不莊好侵侮人者一諸人士外使者來必合有以執將出而還行縣必使信人先戒舎室乃岀迎門守乃入舎爲人下者常司上之隨而行松上不隨下必須隨客卒守主人及以爲守衛主人亦守客卒城中戍卒其邑或以下㓂謹備之數録其署同邑者勿令共所守與階門吏爲符符合人勞符不合牧守言上城者衣服他不如令者鼓在守大門中莫令使者操節閉城者皆以執毚昏鼓鼓十諸門亭皆閉之行者斷必擊問行故乃行其罪晨見掌文鼓縱行者諸城門吏各入請籥開門巳輙復上籥有符節不用此令㓂至樓鼓五有周鼓雜小鼓乃應之小鼓五後從軍斷命必足畏賞必足利令必行令出輒人隨省其可行不行號夕有號失號斷爲守備程而署之曰某程置署街街衢階門令徃來者皆視而放諸吏卒民有謀殺傷其將長者與謀反同罪有能捕告賜黄金二十斤謹罪非其分職而擅之取非其所當治而擅治爲之斷諸吏卒民非其部界而擅入他部界輒牧以屬都司空以聞守不牧而擅縱之斷能捕得謀反賣城踰城敵者一人以令爲除死罪二人城旦四人反城事父母去者去者之父母妻子悉舉民室材木凡藺石數署長短小大當舉不舉吏有罪諸卒民居城上者各葆其左右左右有罪而不智也其次伍有罪能身捕罪人告之吏皆構之非伍而先知他伍之罪皆倍其構賞城外令任城内守任令丞尉亡得入當滿十人以上令丞尉奪爵各二級百人以上令丞尉免以卒戍諸取當者必取㓂虜乃之募民欲財物粟米以貿易凡噐者卒以賈予邑人知識昆弟有罪雖不在縣中而欲爲贖以粟米錢金布帛他財物免出者令許之傳言者十歩一人稽留言及乏傳者斷諸可以便事者函以䟽傳言守吏卒民欲言事者函爲傳言請之吏稽留不言諸者斷縣各上其縣中豪傑若謀士居大夫重厚口數多少官府城下吏卒民皆前後左右相傳保火火自燔燔曼延燔人斷諸以衆彊凌弱少及彊姦人婦女以讙譁者皆斷諸城門若亭謹視徃來徃者符符傳疑無符皆詣縣延言請問其所使其有符傳者善舎官府其有知識兄弟欲見之爲召勿令里巷中三老守閭令厲繕夫爲答他以事者微者不得入里中三老不得入家人傳令里中有以羽羽在三所差家人各令其官中失令稽留令者斷家有守者治食吏卒民無符節而擅入里巷官府吏三老守閭者失苛心皆斷諸盗守噐械財物及相盜者直一錢以上皆斷吏卒民各自大書於傑著之其署同守案其署擅入者斷城上曰壹席蓐令相錯有匿不言人所挾藏在禁中者斷吏卒民死者輒召其人與次司空葬之勿令得坐泣傷甚者令歸治病家善養予醫給藥賜酒日二升肉二斤令吏數行閭視病有瘳輒造事上詐爲自賊傷以辟事者族之事巳守使吏身行死傷家臨戸而悲哀之㓂去事巳塞禱守以令益邑中豪傑力闘諸有功者必身行死傷者家以吊哀之身見死事之後城圍罷主函使者徃勞舉有功及死傷者數使爵禄守身尊寵明白貴之令其怨結於敵城上卒吏各保其左右苦欲以城爲外謀者父母妻子同産皆斷左右知不捕告皆與同罪城下理中家人皆相葆苦城上之數有能捕告之者封之以千家之邑非其左右乃他伍捕告者封之二千家之邑城禁使卒民不欲㓂微職和旌者斷不從令者斷非擅出令者斷失令者斷㦸縣不城上下不與衆等者斷無應而妄讙呼者斷總失者斷譽客内毀者斷離署而聚語者斷聞城鼓聲而伍後上署者斷人自大書版著之其署䣓守必自謀其先後非其署而妄入之者斷離署左右共入他署左右不捕挾書行請謁及爲行書者釋守事而治家事卒民相盗家室嬰兒皆斷無赦人舉而藉之無符節而横行軍中者斷客在城下因數易其署而無易其養譽敵少以爲衆亂以爲治敵攻拙以爲巧者斷客主人無得相與言及相藉客射以書無得譽外示内以善無得應不從令者皆斷禁無得舉矢書以書射㓂犯令者父母妻子皆斷身梟城上有能捕告之者賞之黄金二十斤非時而行者唯守及摻太守之節而使者守人臨城必謹問父老吏大夫請有怨仇讐不相解者召其人明白爲之解之守必自異其入而藉之狐之有以怨害城吏事者父母妻子皆斷其以城爲外謀者三族有能得捕告者以其所守邑小大封之守還授其印尊寵官之令吏大夫及卒民皆明知之豪傑之外多交諸侯常請之令上通知之善屬之所居之吏上數選具之令無得擅出入連質之術鄕長者父老豪傑之親戚父母妻子必尊寵之貧人食不能自給食者上食之及勇士父母親戚妻子皆時酒肉必敬之舎之必近太守守樓臨質宫而善周必宻塗樓令下無見上上見下下無知上有人無人守之所親舉吏貞廉忠信無害可任事者其飲食酒肉勿禁錢金布帛財物各自守之慎勿相盜葆宫之墻必三重墻之垣守者皆累瓦釜墻上門有吏主者門里筦閉必須太守之節葆衛必取戍卒有重厚者請擇吏之忠信者無害可任事者令將衛自築十尺之垣周還墻門閨者非令衛司馬門望氣者舎必近太守巫舎必近公社必敬神之巫祝史與望氣者必以善言告民以請報守上守獨知其請而巳無與望氣妄爲不善言驚恐民斷勿赦度食不足食民各自占家五種石升數爲期其在蓴害吏與雜訾期盡匿不占占悉令吏卒欵得皆斷有能捕告賜什三牧粟米布錢金出内畜産皆爲平直其賈與主人劵書之事巳皆各以其賈倍償之又用其賈貴賤多少賜爵欲爲吏者許之其不欲爲吏而欲以受賜賞爵禄贖士親戚所知罪人者以令許之其受構賞者令葆官見以與其親欲以復佐上者皆倍其爵賞某縣某里某子家食口二人積粟六百石某里某子家食口十人積粟百石出粟米有期日過期不出者王公有之有能得告之賞之什三愼無令民知吾粟米多少守入城先以候爲始得輙宫養之勿令知吾守衛之備候者爲異官父母妻子皆同其宫賜衣食酒信吏善待之來若復就間守宫三難外環隅爲之樓内環爲樓樓入葆宫丈五尺爲復道葆不得有室三日一席蓐略視之布茅宫中厚三尺以上必使鄕邑忠信善重士有親戚妻子厚奉資之必重候爲養其親妻子爲異舎無與貟同所給食之酒肉遣他候奉資之如前候反相參審信厚賜之候三三信重賜之不欲受賜而欲爲吏者許之二百石之吏守珮授之印其不欲爲吏而欲受構賞禄皆如前有能入深至主國者問之審信賞之倍他其不欲受賞而欲爲利者許之三石之候扞士受賞賜者守必身自致之其親之其親之所見其見守之任其欲復以佐上者其構賞爵禄罪人倍之士無過十里居高便所樹表表三人守之北至城者三表與城上燧相望晝則舉夜則舉火聞㓂所從來審知㓂形必攻論小城不自守通者盡葆其老弱粟米畜産遣卒者無過五十人客至堞去之慎無厭建候者曹無過三百人日暮出之爲微職空隊要塞之人所徃來者令可迹者無下里三人平而迹各立其表城上應之出越陳表遮坐郭門之外内立其表令卒之少居門内令其少多無知可也節有驚見㓂越陳表城上以麾指之迹坐撃缶期以戰備從摩所指望舉一垂入竟舉二垂狎郭舉三垂入舉四垂狎城舉五垂夜以火皆如此去郭百歩墻垣樹木小大盡伐除之外空井盡窒之無可得汲也外空窒盡發之木盡伐之諸可以攻城者盡内城中令其人各有以記之事以各其記取之事爲之劵書其枚數當遂枚木不能盡内旣燒之無令客得而用之人自大書版著之其署忠有司出其所治則從之法其罪射務色謾缶淫不靜當路尼衆舎事後就踰時不寧其罪射讙駴衆其罪殺非上不諌次主凶言其罪殺無敢有樂噐弊騏軍中有則其罪射非有司之令無敢有車馳人趨有則其罪射無敢散牛馬軍中有則其罪射飲食不時其罪射無敢歌哭於軍中有則其罪射令各執罰盡殺有司見有罪而不誅同罰或逃之亦殺凡將率闘其衆失法殺凡有司不使去卒吏民聞誓令伐之服罪凡戮人於市死上目行謁者侍令門外爲二曹夾門坐鋪食更無空門下謁者一長守數令人中視其亡者以督門尉與其官長及亡者入中報四人夾令門内坐二人夾散門外坐客見持兵立前鋪食更上侍者名守室下高樓候者望見乗車卒道外來者及城中非常者輒言之守守以順城上城門及邑吏來告其事者以驗之樓下人受者言以報守中㳙二人夾散門内坐門常閑鋪食更中㳙一長者環守宫之術衢置屯道各垣其兩旁高丈爲埤立雞足置夾挾視葆食而扎書得必謹案視參食者節不法正請之屯陳垣外術衢街皆樓高臨里中樓一鼓聾竈即有物故鼓吏至而正夜以火指鼓所城下五十歩一厠厠與上同圂請有罪過而可無斷者令杼厠利之雜守第七十一禽子問曰客衆而勇輕意見威以駭主人薪土俱上以爲羊坽積土爲高以臨民䝉櫓俱前遂屬之城兵弩俱上爲之柰何子墨子曰子問羊坽守耶羊坽者攻之拙者也足以勞卒不足以害城羊坽之政遠攻則逺害近城則近害不至城矢石無休左右趣射蘭爲柱後望以固厲吾銳卒慎無使顧守者重下攻者輕云養勇高奮民心百倍多執數少乃不殆作士不休不能禁禦遂屬之城以禦雲梯之法應之凡待煙衝雲梯臨之法必廣城以禦之曰不足則以木椁之左百歩右百歩繁下失石沙炭以之薪火水湯以濟之選厲銳卒慎無使顧賞審行罰以静爲故從之以急無使主慮恚高憤民心百倍多執數賞卒不乃怠衝臨梯皆以衝衝之渠長丈五尺其理者三尺矢長丈二尺渠廣丈六尺其弟丈二尺渠之垂者四尺樹渠無傳葉五寸梯渠十丈一梯渠答大數里二百五十八渠答百二十九諸外道可要塞以難㓂其甚害者爲築三亭亭三隅織女之令能相救諸詎阜山林溝瀆丘陵阡陌郭門閻術可要塞及爲微職可以迹知徃來者少多及所伏藏之處葆民先舉城中官府民宅室署小大調處葆者或欲從兄弟知者許之外宅粟米畜産財物諸可以佐城者送入城中事即急則使積門内無過五十㓂至隨葉去唯弇逮民獻粟米布帛金錢牛馬畜産皆爲置平賈與主劵書之使人各得其所長天下事當鈞其分職天下事得皆其所喜天下事備彊弱有數天下事具矣築缷亭者圜之高三丈以上令侍殺爲辟梯梯兩臂長三尺連門三尺報以繩連之槧再雜爲縣梁聾竈亭一鼓㓂驚亂傳火以次應之至主國正其事急者引而上下之火以舉輒五鼓傳又以又屬之言㓂所從來者少多旦弇還去來屬次勿罷望見㓂舉一入境舉二射妻舉三一藍郭㑹舉四二藍城㑹舉五五藍夜以火如此數守者事急日暮出之令皆爲微職距阜山林皆令可以迹平明而迹無迹各立其表下城之應候出置田表斥坐郭内外立旗幟卒半在内令多少無可知即有驚舉孔表見㓂舉牧表城上以麾指之斥歩鼓整旗旗以備戰從麾所指田者男子以戰備從斥女子函走入即見放到傳到城正守表者三人更立捶表而望守數令吏行旁視有以知爲所爲其曹一鼓望見㓂鼓傳到城止升食終歲三十六石參食終二十四石四食終歲十八石五食終歲十四石升六食終歲十二石升食食五升參食食二升四食食二升半五食食二升六食食一升大半日再食救死之時日二升者二十日日三升者三十日日四升者四十日如是而民免於九十日之約矣㓂近函收諸雜鄕食噐銅鐵及他可以左守事者先舉縣官室居官府不急者材之大小長短及凡數即急先㓂薄屋伐木雖有請謁勿入柴勿積魚鱗簮當隊令易取也材木不能盡入者燔之無令㓂得用之積木各以長短小大惡美形相從城四外各積其内諸木大者皆以爲鼻乃積聚之城守司馬以上父母昆弟妻子有質在主所乃可以堅守署都司空大城四人候二人縣一亭尉次司空亭一人吏侍守所者財足廉信父母昆弟妻子有在葆宫中者乃得爲侍吏諸吏必有質乃得任事守大門者二人夾門而立令行者趣其外各四㦸夾門立而其人坐其下吏曰五閱之上逋者名池水廉有要有害必爲疑人令徃來行夜者射之謀其䟽者墻外水中爲竹箭尺廣二歩剪於下水五寸雜長短前外廉三行外外鄕内亦内鄕三十歩一弩廬廬廣十尺袤丈二尺隊有急極急其近者徃佐其次襲其處守節出入使主節必䟽書置其情令其事而須其還報以劒驗之節出使所出門者輒言節出時摻者名百歩一隊閤通守舎相錯穿室治復道爲築墉墉善其上先行德計謀合乃入葆葆入守無行城無離舎諸守者審知卑城淺池而錯守焉晨暮卒歌以爲度用人少易守取䟽令民家有三年畜食以備湛旱歲不爲常令縣豫種畜芫芸烏喙祩葉外宅溝井可寘塞不可置此其中安則示以危危示以安㓂至諸門戸令皆鑿而竅之各爲二一鑿而屬繩繩長四尺大如指㓂至先殺牛羊鷄狗烏鴈牧其支革筋角脂羽皆剥之吏橝桐卣爲鐡錍厚簡爲衡枉事急卒不可逺令掘外宅林謀多少治城元本空爲撃三隅之重五斤巳上諸林木渥水中無過一茷茅屋積薪者厚五寸巳上吏各舉其歩界中財物可以左守備者上有讒人有利人有惡人有善人有長人有謀士有勇士有巧士有使士有内人者外人者有善人者有善門人者守必察其所以然者應名乃内之民相惡苦議吏吏所解皆禮書藏之以須告之至以參驗之睨者小五尺不可卒者爲署吏令給事官府舎藺石厲矢諸林噐用皆謹部各有積分數爲解車以枱城矣以軺車輪軲廣十尺轅長丈爲三輻廣六尺爲板箱長與轅等四高尺善蓋上治中令可載矢子墨子曰凡不守者有五城大人少一不守者城小人衆二不守也人衆食寡三不守也市去城遠四不守也畜積在外富人在虛五不守也率萬家而城方三里墨子卷之十五終
