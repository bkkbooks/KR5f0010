front:
  text: 墨子卷之八
  hash: sha256:aed84a00e073eef9a226de92238d1cfc150484eb5d89bd7b33469181637c910d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_SBCK_008-1a}
body:
  text: 明上第二十九闕明中第三十闕明下第三十一子墨子言曰逮至昔三代聖王既没天下失義諸侯力正是以存夫爲人君臣上下者之不惠忠也父子弟兄之不慈孝弟長貞良也正長之不強於聽治賤人之不強於從事也民之爲淫冦盗賊以兵刃毒藥水火退無罪人乎道路率徑奪人車馬衣裘以自利者並作由此始是以天下亂此其故何以然也則皆以疑惑神之有與無之别不明乎神之能賞賢而罰也今使天下之人借信神之能賞賢而罰暴也則夫天下豈亂哉今執無者曰神者固無有旦暮以爲教誨乎天下之疑天下之衆使天下之衆皆疑惑乎神有無之别是以天下亂是故子墨子曰今天下之王公大人士君子實將欲求興天下之利除天下之害故當神之有與無之别以爲將不可以明察此者也既以神有無之别以爲不可不察已然則吾爲明察此其說將奈何而可子墨子曰是與天下之所以察知有與無之道者必以衆之耳目之實知有與亡爲儀者也請惑聞之見之則必以爲無是何不嘗入一鄕一里而問之自古以及今生民以來者亦有嘗見神之物聞神之聲則神何謂無乎莫聞莫見則神可謂有乎今執無者言曰夫天下之爲聞見神之物者不可勝計也亦孰爲聞見神有無之物哉子墨子曰以衆之所同見與衆之所同聞則昔者杜伯是也周宣王殺其臣杜伯而不辜杜伯曰吾君殺我而不辜以死者爲無知則止矣死而有知不出三年必使吾君知之其三年周宣王合諸侯而用於圃田車數百乘從數千人滿野日中杜伯乘白馬素車朱衣冠執朱挾朱矢追周宣王射入車上中心折殪車中伏㢭而死當是之時周人從者莫不見逺者莫不聞著在周之春秋爲君者以教其臣爲父者以䜘其子曰戒之愼之凡殺不辜者其得不祥神之謀此之㦧遫以書之說觀之則神之有豈可疑哉非惟書之說爲然昔者鄭穆公當晝日中處乎廟有神入門而左鳥身素服三絕靣狀正方鄭穆公見之乃恐懼犇帝享女明德使子錫女壽十年有九使國家蕃昌子孫茂毋失鄭穆公再拜稽首曰敢問神曰予爲句芒以鄭穆公之所身見爲儀則神之有豈可疑哉非惟書之說爲然也昔者燕簡公殺其臣荘子儀而不辜荘子儀曰吾君王殺我而不辜死人毋知亦巳死人有知不出三年必使吾君知之期年燕將馳祖燕之有祖當齊之社稷宋之有桒林楚之有雲夣也此男女之所屬而觀也日中燕簡公方將馳於祖塗莊子儀荷朱杖而擊之殪之車上當是時燕人從者莫不見逺者莫不聞著在燕之春秋諸侯傳而言之曰凡殺不辜者其得不祥神之誅此其㦧遫也以書之觀之則神之有豈可疑哉非惟書之爲然也昔者宋文君鮑之時有臣曰觀辜固嘗從事於厲株子杖揖出與言曰觀辜是何陸璧之不滿度量酒醴粢盛之不净潔也犧牲之不全肥春秋冬夏選失時豈女爲之與意鮑爲之與觀辜曰鮑㓜弱在荷繈之中鮑何與識焉官臣觀辜特爲之株子舉揖而槀之殪之壇上當是宋人從者莫不見逺者莫不聞著在宋之春秋諸侯傳而語之曰諸不敬愼祭祀者神之誅至此其㦧遫以書之觀之神之有豈可疑哉非惟書之爲然也昔者齊莊君之有所謂王里國中里徼者此二子者訟三年而獄不斷齊君由謙殺之恐不辜猶謙釋之恐失有罪乃使之人共一羊盟齊之神社二子許諾於是泏洫羊而漉其血讀王里國之辭既巳終矣讀中里徼之辭未半也羊起而觸之折其脚祧神之而槀之殪之盟所當是時齊人從者莫不見逺者莫不聞著在齊之春秋諸侯傳而語之曰請品先不以其請者神之誅至此其㦧遫也以書之觀之神之有豈可疑哉是故子墨子言曰雖有深谿博林幽澗毋人之所施行不可以不董見有神視之今執無者曰夫衆人耳目之請豈足以斷疑哉奈何其欲爲高君子於天下而有復信衆之耳目之請哉子曰以衆之耳目之請以爲不足信也不以斷疑不識昔者三代聖王堯舜禹湯文武者足以爲法乎故於此乎自中人以上皆曰昔者三代聖王足以爲法矣苟昔者三代聖王足以爲法然則姑嘗上觀聖王之事昔者武王之攻殷誅紂也使諸侯分其曰使親者受内祀疏者受外祀故武王必以神爲有是故攻殷誅紂使諸侯分其祭神無有則武王何分哉非爲武王之事爲然也故聖王其賞也必於祖其僇也必於社賞於祖者何也告分之均也僇於社者何也告之中也非惟書之爲然也且惟昔者虞夏商周三代之聖王其始建國營都日必擇國之正壇置以爲宗廟必擇木之脩茂者立以爲菆位必擇國之父兄慈孝貞良者以爲祝宗必擇六畜之勝腯肥倅毛以爲犧牲珪璧宗璜稱財爲度必擇五榖之芳黃以爲酒醴粢盛故酒醴粢盛與歲上下也故古聖王治天下也故必先神而後人者此也故曰官府選効必先噐服畢藏於府祝宗有司畢立於朝犧牲不與昔聚群故古者聖王之爲政此古者聖王必以神爲其務神厚矣又恐後世子孫不能知也故書之竹帛傳遺後世子孫咸恐其腐蠧絕滅後世子孫不得而記故琢之盤盂鏤之金石以重之有恐後世子孫不能敬莙以取羊故先王之書聖人一尺之帛一篇之書語數神之有也重有重之此其故何則聖王務之今執無者曰神者固無有則此反聖王之務反聖王之務則非所以爲君子之道也今執無者之言曰先王之書愼無一尺之帛一篇之書語數神之有重有重亦何書之亦何書有之哉子墨子曰周書大雅有之大雅曰文王在上於昭于天周雖舊其命維新有周不顯帝命不時文王陟降在帝左右穆穆文王令問不巳神無有則文王既死彼豈能在帝之左右哉此吾所以知周書之也且周書獨而商書不則未足以爲法也然則姑嘗止觀乎商書曰嗚呼古者有夏方未有禍之時百獸貞蟲及飛鳥莫不比方矧住人靣胡敢異心山川神亦莫敢不寧能共允住天下之合下土之葆察山川神之所以莫敢不寧者以佐謀禹也此吾所以知商周之也且禹書獨而夏書不則未足以爲法也然則姑嘗止觀乎夏書禹誓曰大戰于甘王乃命左右六人下誓于中軍曰有扈氏威侮五行怠棄三正天用勦絕其命有曰日中今予與有扈氏爭一日之命且爾卿大夫庶人予非爾田野葆士之欲也予共行天之罰也左不共于左右不共于右不共命御非爾馬之政不共命是以賞於祖而僇於社賞於祖者何也言分命之均也僇於社者何也言獄之事也故古聖王必以神爲賞賢而罰是故賞必於祖而僇必於社此吾所以知夏書之也故尚書夏書其次商周之書語數神之有也重有重之此其故何也則聖王務之以書之觀之則神之有豈可疑哉於古曰吉日丁周代祝社方歲于社考以延年壽無神彼豈有所延年壽哉是故子墨子曰嘗神之能賞賢如罰也蓋本施之國家施之萬民實所以治國家利萬民之道也以爲不然是以吏治官府之不潔廉男女之爲無别者神見之民之爲淫冦亂盗賊以兵刃毒藥水火退無罪人乎道路奪人車馬衣裘以自利者有神現之是以吏治官府不敢不潔廉見善不敢不賞見不敢不罪民之爲淫冦亂盗賊以兵刃毒藥水火退無罪人乎道路奪車馬衣裘以自利者由此止是以莫放幽間擬乎神之明顯明有一人畏上誅罰是以天下治故神之明不可爲幽間廣澤山林深谷神之明必知之神之罰不可富貴衆強勇力強武堅甲利兵神之罰必勝之以爲不然昔者夏王桀貴爲天子富有天下上詬天侮下殃傲天下之萬民祥上帝伐元山帝行故於此乎天乃使湯至明罰焉湯以車九兩鳥陣鴈行湯乘大賛犯遂下衆人之遂王乎禽推哆大戱故昔夏王桀貴爲天子富有天下有勇之推哆大戱主别兕虎指畫殺人人民之衆兆億侯盈厥澤然不能以此圉神之誅此吾所謂神之罰不可爲富貴衆強勇力強武堅甲利兵者此也且不惟此爲然昔者殷王紂貴爲天子富有天下上詬天侮下殃傲天下之萬民播棄老賊誅孩子楚毒無罪刳剔孕婦庶舊鰥寡號咷無告也故於此乎天乃使武王至明罰焉武王以擇車百兩虎賁之卒四百人先庶國節窺戎與殷人戰乎牧之野王乎禽費中惡來衆畔百走武王逐奔入宮萬年梓株折紂而繫之赤環載之白旗以爲天下諸侯僇故昔者殷王紂貴爲天子富有天下有勇力之人費中惡來崇侯虎指寡殺人人民之衆兆億侯盈厥澤然不能以此圉神之誅此吾所謂神之罰不可爲富貴衆強力勇強武堅甲利兵者此也且禽艾之道之曰得璣無小㓕宗無大則此言神之所賞無小必賞之神以所罰無大必罰之今執無者曰意不忠親之利而害爲孝子乎子墨子曰古之今之爲非他也有天亦有山水神者亦有人死而爲者今有子先其父死弟先其兄死者矣意雖使然然而天下之陳物曰先生者先死是則先死者非父則母非兄而姒也今潔爲酒醴粢盛以敬愼祭祀使神請有是得其父母姒兄而飲食之也豈非厚利哉使神請亡是乃費其所爲酒醴粢盛之財耳自夫費之特注之汙壑而棄之也内者宗族外者鄕里皆得如具飲食之雖使神請亡此猶可以合驩聚衆取親於鄕里今執無者言曰神者固請無有是以不共其酒醴粢盛犧牲之財吾非乃今愛其酒醴粢盛犧牲之財乎其所得者臣將何哉此上逆聖王之書内逆民人孝子之行而爲上士於天下此非所以爲上士道是故子墨子曰今吾爲祀也非直注之汙壑而棄之也上以交之福下以合驩聚衆取親乎鄕里神有則是得吾父母弟兄而食之也則此豈非天下利事也哉是故子墨子曰今天下之王公大人士君子中實將欲求興天下之利除天下之害當神之有也將不可不尊明也聖王之道也非樂上第三十二子墨子言曰仁之事者必務求興天下之利除天下之害將以爲法乎天下利人乎即爲不利人乎即止且夫仁者之爲天下度也非爲其目之所美耳之所樂口之所甘身體之所安以此虧奪民衣食之財仁者弗爲也是故子墨子之所以非樂者非以大鍾鳴鼓琴瑟竽笙之聲以爲不樂也非以刻鏤華文章之色以爲不美也非以犓豢煎炙之味以爲不甘也非以高臺厚榭䆳野之居以爲不安也雖身知其安也口知其甘也目知其美也耳知其樂也然上考之不中聖王之事下度之不中萬民之利是故子墨子曰爲樂非也今王公大人雖無造爲樂噐以爲事乎國家非掊潦水折壤坦而爲之也將必厚措歛乎萬民以爲大鍾鳴鼓琴瑟竽笙之聲譬之聖王之爲舟車也即我弗敢非也古者聖王亦嘗厚措歛乎萬民以爲舟車既巳成矣曰吾將惡許用之曰舟用之水車用之陸君子息其足焉小人休其肩背焉故萬民出財齎而予之不敢以爲慼恨者何也以其反中民之利也然則樂噐反中民之利亦此即我弗敢非也然則當用樂噐民有三患饑者不得食寒者不得衣勞者不得息三者民之巨患也然即當爲之撞巨鍾擊鳴鼓彈琴瑟吹竽笙而揚干戚民衣食之財將安可得乎即我以爲未必然也意舎此今有大國即攻小國有大家即伐小家強刼弱衆寡詐欺愚貴傲賤冦亂盗賊並興不可禁止也然即當爲之撞巨鍾擊鳴鼓彈琴瑟吹竽笙而揚干戚天下之亂也將安可得而治與即我未必然也是故子墨子曰姑嘗厚措歛乎萬民以爲大鍾鳴鼓琴瑟竽笙之聲以求興天下之利除天下之害而無也是故子墨子曰爲樂非也今王公大人惟毋處高臺厚榭之上而視之鍾猶是延也弗撞擊將何樂得焉哉其將必撞擊之惟勿撞擊將必不使老與遲者老與遲者耳目不聰明股肱不畢強聲不和調明不轉朴將必使當年因其耳目之聰明股肱之畢強聲之和調眉之轉朴使丈夫爲之廢大夫耕稼樹藝之時使婦人爲之廢婦人紡績織絍之事今王公大人惟毋爲樂虧奪民衣食之時以拊樂如此多也是故子墨子曰爲樂非也今大鍾鳴鼓琴瑟竽笙之聲既巳具矣大人鏽然奏而獨之將何樂得焉哉其將必與賤人不與君子之廢君子治與賤人之廢賤人之從事今王公大人惟毋爲樂虧奪民之衣食之財以拊樂如此多也是故子墨子曰爲樂非也昔者齊康公興樂萬萬人不可衣短不可食糠糟曰食飲不美目顔色不足視也衣服不美身體從容醜羸不足觀也是以食必肉衣必文繡此掌不從事乎衣食之財而掌食乎人者也是故子墨子曰今王公大人惟無爲虧奪民衣食之財以拊樂如此多也是故子墨子曰爲樂非也今人固與禽獸麋鹿蜚鳥貞蟲異者也今之禽獸麋鹿蜚鳥貞蟲因其羽毛以爲衣裘因其蹄蚤以爲絝屨因其水草以爲飲食故唯使䧺不耕稼樹藝雌亦不紡績織絍衣食之財固巳具矣今人與此異者也頼其力者主不頼其力者不主君子不強治即刑政亂賤人不強從事即財用不足今天下之士君子以吾言不然然即姑嘗數天下分事而觀樂之害王公大人蚤朝晏退獄治政此其分事也士君子竭股肱之力亶其思慮之智内治官府外收歛市山林澤梁之利以實倉府庫此其分事也農夫蚤出暮入耕稼樹藝多聚升粟此其分事也婦人夙興夜寐紡績織絍多治麻絲緒細布縿此其分事也今惟毋在乎王公大人樂而之即必不能蚤朝晏退獄治政是故國家亂而社稷危矣今惟毋在乎士君子樂而之即必不能竭股肱之力亶其思慮之智内治官府外收歛市山林澤梁之利以實倉府庫是故倉府庫不實今惟毋在乎農夫樂而之即必不能蚤出暮入耕稼樹藝多聚升粟不足今惟毋在乎婦人樂而之即不必夙興夜寐紡績織絍多治麻絲緒細布縿是故布縿不興曰孰爲大人之治而廢國家之從事曰樂也是故子墨子曰爲樂非也何以知其然也曰先王之書湯之官刑有之曰其桓舞于宫是謂巫風其刑君子出絲二衞小人否似二伯黃徑乃言曰嗚呼舞佯佯黃言孔章上帝弗常九有以亡上帝不順降之日其家必懷䘮察九有之所以亡者徒從飾樂也於武觀曰啓乃淫溢康樂野于飲食將將銘莧磬以力湛濁于酒渝食于野萬舞翼翼章聞于大天用弗式故上者天弗戒下者萬民弗利是故子墨子曰今天下士君子請將欲求興天下之利除天下之害當在樂之爲物將不可不禁而止也墨子卷之八終
