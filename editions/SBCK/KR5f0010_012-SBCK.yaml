front:
  text: 墨子卷之十二
  hash: sha256:e995421de8dcbd888fd20368e520fdbbbf32116c3229153d886fbb21597478a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_SBCK_012-1a}
body:
  text: 貴義第四十七子墨子曰萬事莫貴於義今謂人曰予子冠履而斷子之手足子爲之乎必不爲何故則冠履不若手足之貴也又曰予子天下而殺子之身子爲之乎必不爲何故則天下不若身之貴也爭一言以相殺是貴義於其身也故曰萬事莫貴於義也子墨子自魯齊即過故人謂子墨子曰今天下莫爲義子獨自苦而爲義子不若巳子墨子曰今有人於此有子十人一人耕而九人處則耕者不可以不益急矣何故則食者衆而耕者寡也今天下莫爲義則子如勸我者也何故止我子墨子南游於楚見楚獻惠王獻惠王以老辭使穆賀見子墨子子墨子穆賀穆賀大謂子墨子曰子之言則成善矣而君王天下之大王也毋乃曰賤人之所爲而不用乎子墨子曰唯其可行譬若藥然草之本天子食之以順其疾豈曰一草之本而不食哉今農夫入其稅於大人大人爲酒醴粢盛以上帝神豈曰賤人之所爲而不享哉故雖賤人也上比之農下比之藥曽不若一草之本乎且主君亦嘗聞湯之乎昔者湯將徃見伊尹令彭氏之子御彭氏之子半道而問曰君將何之湯曰將徃見伊尹彭氏之子曰伊尹天下之賤人也君若欲見之亦令召問焉彼受賜矣湯曰非女所知也今有藥此食之則耳加聰目加明則吾必而強食之今夫伊尹之於我國也譬之良醫善藥也而子不欲我見伊尹是子不欲吾善也因下彭氏之子不使御彼茍然然後可也子墨子曰凡言凡動利於天百姓者爲之凡言凡動害於天百姓者舎之凡言凡動合於三代聖王尭舜禹湯文武者爲之凡言凡動合於三代王桀紂幽厲者舎之子墨子曰言足以遷行者常之不足以遷行者勿常以遷行而常之是蕩口也子墨子曰必去六辟嘿則思言則誨動則事使者三代御必爲聖人必去喜去怒去樂去悲去愛而用仁義手足口鼻耳從事於義必爲聖人子墨子謂二三子曰爲義而不能必無排其道譬若匠人之斵而不能無排其繩子墨子曰世之君子使之爲一彘之宰不能則辭之使爲一國之相不能而爲之豈不悖哉子墨子曰今瞽曰鉅者白也黔者墨也雖明目者無以易之兼白黒使瞽取焉不能知也故我曰瞽不知白墨者非以其名也以其取也今天下之君子之名仁也雖禹湯無以易之兼仁與不仁而使天下之君子取焉不能知也故我曰天下之君子不知仁者非以其名也亦以其取也子墨子曰今事之用身不若商人之用一布之慎也商人用一布布不敢繼茍而讐焉必擇良者今士之用身則不然意之所欲則爲之厚者入刑罰薄者毀醜則士之用身不若商人之用一布之慎也子墨子曰世之君子欲其義之成而之脩其身則愠是猶欲其墻之成而人之築則愠也豈不悖哉子墨子曰古之聖王欲傳其道於後世是故書之竹帛鏤之金石傳遺後世子孫欲後世子孫法之也金聞先王之遺而不爲是廢先王之傳也子墨子南遊使衛中載書甚多弦唐子見而怪之曰吾夫子教公尚過曰揣曲直而巳今夫子載書甚多何有也子墨子曰昔者周公旦朝讀書百篇夕見十士故周公旦佐相天子其脩至於今翟上無君上之事下無耕農之難吾安敢廢此翟聞之同歸之物信有誤者然而民不鈞是以書多也今若過之心者數逆於精微同歸之物既巳知其要矣是以不教以書也而子何怪焉子墨子謂公良桓子曰衛小國也處於齊之間猶貧家之處於富家之間也貧家而學富家之衣食多用則速亡必矣今簡子之家飾車數百乗馬食菽粟者數百匹婦人衣文繡者數百人吾取飾車食馬之費與繡衣之財以畜士必千人有餘若有患難則使百人處於前數百於後與婦人數百人處前後孰安吾以爲不若畜士之安也子墨子仕於衛所仕者至而反子墨子曰何故反對曰與我言而不當曰待女以千盆授我五百盆故去之也子墨子曰授子過千盆則子去之乎對曰不去子墨子曰然則非爲其不審也爲其寡也子墨子曰世俗之君子視義士不若粟者今有人於此粟息於路側欲起而不能君子見之無長少貴賤必起之何故也曰義也今爲義也君子奉承先王之道以語之縱不而行又從而非毀之則是世俗之君子之視義士也不若視粟者之子墨子曰商人之四方市賈信徙雖有梁之難盗賊之危必爲之今士坐而言義無梁之難盗賊之危此爲信徙不可勝計然而不爲財士之計利不若商人之察也子墨子北之齊遇日者日者曰帝以今日殺黒龍於北方而先生之色黒不可以北子墨子不遂北而反爲日者曰我謂先生不可以北子墨子曰南之人不得北北之人不得南其色有黒者有白者何故皆不遂也且帝以甲乙殺青龍於東方以丙丁殺赤龍於南方以庚辛殺白龍於西方以壬癸殺黒龍於北方若用子之言則是禁下行者也是圍心而虛天下也子之言不可用也子墨子曰吾言足用矣舎言革思者是猶舎穫而攗粟也以其言非吾言者是猶以卵投石也盡天下之卵其石猶是也不可毀也公孟第四十八公孟子謂子墨子曰君子共巳以待問焉則言不問焉則止譬若鍾然扣則鳴不扣則不鳴子墨子曰是言有三物焉子乃今知其一身也又未知其所謂也若大人行淫於國家進而諌則謂之不遜因左右而獻諌則謂之言議此君子之所疑惑也若大人爲政將因於國家之難譬若機之將也然君子之必以諌然而大人之利若此者雖不扣必鳴者也若大人舉不義之異行雖得大巧之經可行於軍旅之事欲攻伐無罪之國有之也君得之則必用之矣以廣辟土地著稅僞材出必見辱所攻者不利而攻者亦不利是兩不利也若此者雖不扣必鳴者也且子曰君子共巳待問焉則言不問焉則止譬若鍾然扣則鳴不扣則不鳴今未有扣子而言是子之謂不扣而鳴邪是子之所謂非君子邪公孟子謂子墨子曰實爲善人孰不知譬若良玉處而不出有餘精譬若美女處而不出人爭求之行而自衒人莫知取也今子徧從人而之何其勞也子墨子曰今夫世亂求美女者衆美女雖不出人多求之今求善者寡不強人人莫之知也且有二生於此善星一行爲人筮者與處而不出者其精孰多公孟子曰行爲人筮者其精多子墨子曰仁義鈞行人者其功善亦多何故不行人也公孟子義章甫搢儒服而以見子墨子曰君子服然後行乎其行然後服乎子墨子曰行不在服公孟子曰何以知其然也子墨子曰昔者齊桓公高冠愽帶金劔木盾以治其國其國治昔者晋文公大布之衣䍧羊之裘韋以帶劔以治其國其國治昔者楚莊王鮮冠組纓絳衣博以治其國其國治昔者越王句踐剪髮文身以治其國其國治此四君者其服不同其行猶一也翟以是知行之不在服也公孟子曰善吾聞之曰宿善者不祥請舎易章甫復見夫子可乎子墨子曰請因以相見也若不將舎易章甫而後相見然則行果在服也公孟子曰君子必古言服然後仁子墨子曰昔者商王紂卿士費仲爲天下之人箕子微子爲天下之聖人此同言而或仁不仁也周公旦爲天下之聖人叔爲天下之人此同服或仁或不仁然則不在古服與古言矣且子法周而未法夏也子之古非古也公孟子謂子墨子曰昔者聖王之列也上聖立爲天子其次立爲卿大夫今孔子博於詩書察於禮樂詳於萬物若使孔子當聖王則豈不以孔子爲天子哉子墨子曰夫知者必尊天事愛人用節合焉爲知矣今子曰孔子博於詩書察於禮樂詳於萬物而曰可以爲天子是數人之齒而以爲富公孟子曰貧富壽夭齰然在天不可損益又曰君子必學子墨子曰教人學而執有命是猶命人葆而去亦冠也公孟子謂子墨子曰有義不義無祥不祥子墨子曰古者聖王皆以神爲神明而爲禍福執有祥不祥是以政治而國安也自桀紂以下皆以神爲不神明不能爲禍福執無祥不祥是以政亂而國危也故先王之書子亦有之曰亦傲也出於子不祥此言爲不善之有罰爲善之有賞子墨子謂公孟子曰䘮禮君與父母妻後子死三年䘮服伯父叔父兄弟期族人五月姑姊舅甥皆有數月之䘮或以不䘮之間誦詩三百弦詩三百歌詩三百舞詩三百若用子之言則君子何日以治庻人何日以從事公孟子曰國亂則治之治則爲禮樂國治則從事國富則爲禮樂子墨子曰國之治治之廢則國之治亦廢國之富也從事故富也從事廢則國之富亦廢故雖治國勸之無饜然後可也今子曰國治則爲禮樂亂則治之是譬猶噎而穿井也死而求醫也古者三代王桀紂幽厲薾爲聲樂不顧其民是以身爲刑僇國爲戾虚者皆從此道也公孟子曰無神又曰君子必學祀子墨子曰執無而學禮是猶無客而學客禮也是猶無魚而爲魚也公孟子謂子墨子曰子以三年之䘮爲非子之三日之䘮亦非也子墨子曰子以三年之䘮非三日之䘮是猶倮謂撅者不恭也公孟子謂子墨子曰知有賢於人則可謂知乎子墨子曰愚之知有以賢於人而愚豈可謂知矣哉公孟子曰三年之䘮學吾之慕父母子墨子曰夫嬰兒子之知獨慕父母而巳父母不可得也然號而不止此亦故何也即愚之至也然則儒者之知豈有以賢於嬰兒子哉子墨子曰問於儒者何故爲樂曰樂以爲樂也子墨子曰子未我應也今我問曰何故爲室曰冬避寒焉夏避暑焉室以爲男女之别也則子告我爲室之故矣今我問曰何故爲樂曰樂以樂也是猶曰何故爲室曰室以爲室也子墨子謂程子曰儒之道足以䘮天下者四政焉儒以爲不明以爲不神天不此足以䘮天下又厚葬乆䘮重爲棺槨多爲衣衾送死若徙三年哭泣扶後起杖後行耳無聞目無見此足以䘮天下又弦歌鼓舞習爲聲樂此足以䘮天下又以命爲有貧富壽夭治亂安危有極矣不可損益也爲上者行之必不治矣爲下者行之必不從事矣此足以䘮天下程子曰甚矣先生之毀儒也子墨子曰儒固無此各四政者而我言之則是毀也今儒固有此四政者而我言之則非毀也告聞也程子無辭而出子墨子曰迷之反後坐進復曰鄉者先生之言有可聞者焉若先生之言則是不譽禹不毀桀紂也子墨子曰不然夫應孰辭稱議而爲之敏也厚攻則厚吾薄攻則薄吾應孰辭而稱議是猶荷轅而擊蛾也子墨子與程子辯稱於孔子程子曰非儒何故稱於孔子也子墨子曰是亦當而不可易者也今鳥聞旱之憂則高魚聞旱之憂則下當此雖禹湯爲之謀必不能易矣鳥魚可謂愚矣禹湯猶云因焉今翟曽無稱於孔子乎有游於子墨子之門者謂子墨子曰先生以爲神明知能爲禍人哉有游於子墨子之門者身體強良思慮徇通欲使隨而學子墨子曰姑學乎吾將仕子勸於善言而學其年而責仕於子墨子子曰不仕子子亦聞夫魯語乎魯有昆弟五人者亦父死亦長子嗜酒而不葬亦四弟曰子無我葬當爲子沽酒勸於善言而葬巳葬而責酒於其四弟四弟曰吾未予子酒矣子葬子父我葬吾父豈獨吾父哉子不葬則人將子故勸子葬也今子爲義我亦爲義豈獨我義也哉子不學則人將子故勸子於學有游於子墨子之門者子墨子曰盍學乎對曰吾族人無學者子墨子曰不然夫好美者豈曰吾族人莫之好故不好哉夫欲富貴者故不欲哉好美欲富貴者不視人猶強爲之福爲善者富之者禍之今吾事先生乆矣而福不至意者先生之言有不善乎神不明乎我何故不得福也子墨子曰雖子不得福吾言何遽不善而神何遽不明子亦聞乎匿徒之刑之有刑乎對曰未得之聞也子墨子曰今有人於此什子子能什譽之而一自譽乎對曰不能有人於此百子子能終身譽亦善而子無一乎對曰不能子墨子曰匿一人者猶有罪今子所匿者若此亦多將有厚罪者也何福之求子墨子有疾跌鼻進而問曰先生以神爲明能爲禍福善者賞之爲不善者罰之今先生聖人也何故有疾意者先生之言有不善乎神不明知乎子墨子曰雖使我有病何遽不明人之所得於病者多方有得之寒暑有得之勞苦百門而一門焉則盗何遽無從夫義天下之大噐也何以視人必強爲之二三子有復於子墨子學射者子墨子曰不可夫知者必量亦力所能至而從事焉國士戰且扶人猶不可及也今子非國士也豈能成學又成射哉二三子復於子墨子曰告子曰言義而行甚惡請棄之子墨子曰不可稱我言以毀我行愈於亡有人於此翟甚不仁尊天事愛人甚不仁猶愈於亡也今告子言談甚辯言仁義而不吾毀告毀子猶愈亡也二三子復於子墨子曰告子勝爲仁子墨子曰未必然也告子爲仁譬猶跛以爲長隱以爲廣不可乆也告子謂子墨子曰我治國爲政子墨子曰政者口言之身必行之今子口言之而身不行是子之身亂也子不能治子之身惡能治國政子姑亡子之身亂之矣墨子卷之十二終
