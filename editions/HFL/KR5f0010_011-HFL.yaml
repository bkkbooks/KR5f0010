body:
  text: 大取第四十四天之愛人也薄於聖人之愛人也其利人也厚於聖人之利人也大人之愛小人也薄於小人之愛大人也其利小人也厚於小人之利大人也以臧爲其親也而愛之非愛其親也以臧爲其親也而利之非利其親也以樂爲利其子而爲其子欲之愛其子也以樂爲利其子而爲其子求之非利其子也於所體之中而權輕重之謂權權非爲是也非非爲非也權正也斷指以存利之中取大害之中取小也害之中取小也非取害也取利也其所取者人之所執也遇盗人而斷指以免身利也其遇盗人害也斷指與斷腕利於天下相若無擇也死生利若一無擇也殺一人以存天下非殺一人以利天下也殺已以存天下是殺已以利天下於事爲之中而權輕重之謂求求爲之非也害之中取小求爲義非爲義也爲暴人語天之爲是也而性爲暴人歌天之爲非也諸陳執既有所爲而我爲之陳執執之所爲因吾所爲也若陳執未有所爲而我爲之陳執陳執因吾所爲也暴人爲我爲天之以人非爲是也而性不可正而正之利之中取大非不得已也害之中取小不得已也所未有而取焉是利之中取大也於所既有而棄焉是害之中取小也義可厚厚之義可薄薄之謂倫列德行君上老長親戚此皆所厚也爲長厚不爲幼薄親厚厚親薄薄親至薄不至義厚親不稱行而顧行爲天下厚禹爲禹也爲天下厚愛禹乃爲禹之人愛也厚禹之加於天下而厚禹不加於天下若惡盗之爲加於天下而惡盗不加於天下愛人不外已已在所愛之中已在所愛愛加於已倫列之愛已愛人也聖人惡疾病不惡危難正體不動欲人之利也非惡人之害也聖人不爲其室臧之故在於臧聖人不得爲子之事聖人之法死亡親爲天下也厚親分也以死亡之體渴興利有厚薄而毋倫列之興利爲已語經語經也非白馬焉執駒焉說求之舞說非也漁大之舞大非也三物必具然後足以生臧之愛已非爲愛已之人也厚不外已愛無厚薄舉已非賢也義利不義害志功爲辯有有於秦馬有有於馬也智來者之馬也愛衆衆世與愛寡世相若兼愛之有相若愛尚世與愛後世一若今之世人也鬼非人也兄之鬼兄也天下之利驩聖人有愛而無利視日之言也乃客之言也天下無人子墨子之言也猶在不得已而欲之非欲之非欲之也非殺臧也專殺盗非殺盗也凡學愛人小圜之圜與大圜之圜同方至尺之不至也與不至鍾之至不異其不至同者遠近之謂也是璜也是玉也意楹非意木也意是楹之木也意指之人也非意人也意獲也乃意禽也志功不可以相從也利人也爲其人也富人非爲其也人有爲也以富人富人也治人有爲鬼焉爲賞譽利一人非爲賞譽利人也亦不至無貴於人智親之一利未爲孝也亦不至於智不爲已之利於親也智是之世之有盗也盡愛是世智是室之有盗也不盡是室也智其一人之盗也不盡是二人雖其一人之盜苟不智其所在盡惡其弱也諸聖人所先爲人欲名實名實不必名苟是石也白敗是石也盡與白同是石也唯大不與大同是有便謂焉也以形貌命者必智是之某也焉智某也不可以形貌命者唯不智是之某也智某可也諸以居運命者苟人於其中者皆是也去之因非也諸以居運命者若鄕里齊荆者皆是諸以形貌命者若山丘室廟者皆是也智與意異重同具同連同同類之同同名之同丘同鮒同是之同然之同同根之同有非之異有不然之異有其異也爲其同也爲其同也異一曰乃是而然二曰乃是而不然三曰遷四曰强子深其深淺其淺益其益尊其尊察次山比因至優指復次察聲端名因請復正夫辭惡者人右以其請得焉諸所遭執而欲惡生者人不必以其請得焉聖人之拊𣿦也仁而無利愛利愛生於慮昔者之慮也非今日之慮也昔者之愛人也非今之愛人也愛獲之愛人也生於慮獲之利非慮臧之利也而愛臧之愛人也乃愛獲之愛人也去其愛而天下利弗能去也昔之知墻非今日之知墻也貴爲天子其利人不厚於正夫二子事親或遇熟或遇凶其親也相若非彼其行益也非加也外執無能厚吾利者藉藏也死而天下害吾特養臧也萬倍吾愛臧也不加厚長人之異短人之同其貌同者也故同指之人也與首之人也異人之體非一貌者也故異將劍與挺劍異劍以形貌命者也其形不一故異楊木之木與桃木之木也同諸非以舉量數命者敗之盡是也故一人指非一人也是一人之指乃是一人也方之一面非方也方木之面方木也以故生以理長以類行也者立辭而不眀於其所生忘也今人非道無所行唯有强股肱而不明於道其困也可立而待也夫辭以類行者也立辭而不明於其類則必困矣故浸淫之辭其類在於鼓栗聖人也爲天下也其類在於追迷或壽或卒其利天下也指若其類在譽石一日而百萬生愛不加厚其類在惡害愛二世有厚薄而愛二世相若其類在蛇文愛之相若擇而殺其一人其類在阬下之鼠小仁與大仁行厚相若其類在申凡興利除害也其類在漏雍厚親不稱行而類行其類在江上井不爲已之可學也其類在獵走愛人非爲譽也其類在逆旅愛人之親若愛其親其類在官苟兼愛相若一愛相若一愛相若其類在死也小取第四十五夫辯者將以明是非之分審治亂之紀明同異之處察名實之理處利害決嫌疑焉摹略萬物之然論求群言之比以名舉實以辭抒意以說出故以類取以類予有諸已不非諸人無諸已不求諸人或也者不盡也假者今不然也效者爲之法也所效者所以爲之法也故中效則是也不中效則非也此效也辟也者舉也物而以明之也侔也者比辭而俱行也援也者曰子然我奚獨不可以然也推也者以其所不取之同於其所取者予之也是猶謂也者同也吾豈謂也者異也夫物有以同而不率遂同辭之侔也有所至而正其然也有所以然也同其所以然不必同其取之也有以取之其取之也同其所以取之不必同是故辟侔援推之辭行而異轉而危遠而失流而離本則不可不審也不可常用也故言多方殊類異故則不可偏觀也夫物或乃是而然或是而不然或一害而一不害或一是而一不是也不可常用也故言多方殊類異故則不可偏觀也非也白馬馬也乘白馬乘馬也驪馬馬也乘驪馬乘馬也獲人也愛獲愛人也臧人也愛臧愛人也此乃是而然者也獲之視人也獲事其親非事人也其弟美人也愛弟非愛美人也車木也乘車非乘木也船木也人船非人木也盗人人也多盗非多人也無盗非無人也奚以明之惡多盗非惡多人也欲無盗非欲無人也世相與共是之若若是則雖盗人人也愛盗非愛人也不愛盗非不愛人也殺盗人非殺人也無難盗無難矣此與彼同類世有彼而不自非也墨者有此而非之無故也焉所謂内膠外閉與心毋空乎内膠而不解也此乃是而不殺者也且夫讀書非好書也且闘雞非雞也好闘雞好雞也且入井非入井也止且入井止入井也且出門非出門也止且出門止出門也若若是且夭非夭也壽夭也有命非命也非執有命非命也無難矣此與彼同世有彼而不自非也墨者有此而罪非之無也故焉所謂内膠外閉與心毋空乎内膠而不解也此乃是而然者也愛人待周愛人而後爲愛人不愛人不待周不愛人不失周愛因爲不愛人矣乘馬待周乘馬然後爲乘馬也有乘於馬因爲乘馬矣逮至不乘馬待周不乘馬而後不乘馬而後不乘馬此一周而一不周者也居於國則爲居國有一宅於國而不爲有國桃之實桃也棘之實非棘也問人之病問人也惡人之病非惡人也人之鬼非人也兄之鬼兄也祭之鬼非祭人也祭兄之鬼乃祭兄也之馬之目盼則爲之馬盼之馬之目大而不謂之馬大之牛之毛黄則謂之牛黄之牛之毛衆而不謂之牛衆一馬馬也二馬馬也馬四足者一馬而四足也非兩馬而四足也一馬馬也馬或自者二馬而或白也非一馬而或白此乃一是而一非者也耕柱第四十六子墨子怒耕柱子耕柱子曰我毋俞於人乎子墨子曰我將上大行駕驥與羊我將誰歐耕柱子曰將歐驥也子墨子曰何故歐驥也耕柱子曰驥足以責子曰我亦以子爲足以責巫馬子謂子墨子曰鬼神孰與聖人明智子墨子曰鬼神之明智於聖人猶聰耳明目之與聾瞽也昔者夏后開使蜚廉折金於山川而陶鑄之於昆吾是使翁難卜於白苦之毚曰鼎成三足而方不炊而自烹不舉而自臧不遷而自行以祭於昆吾之墟上鄕人言兆之由曰饗矣逢逢白雲一南一北一西一東九鼎既成遷於三國夏后氏失之殷人受之殷人失之周人受之夏后殷周之相受也數百歲矣使聖人聚其良臣與其桀相而諫豈能智數百歲之後哉而鬼神智之是故曰鬼神之明智於聖人也猶聰耳明目之與聾瞽也治徒娛縣子碩問於子墨子曰爲義孰爲大務子墨子曰譬若築墻然能築者築能實壤者實壤能欣者欣然後墻成也爲義猶是也能談辯者談辯能說書者說書能從事者從事然後義事成也巫馬子謂子墨子曰子兼愛天下未云利也我不愛天下未云賊也功皆未至子何獨自是而非我哉子墨子曰今有燎者此於一人奉水將灌之一人摻火將益之功皆未至子何貴於二人巫馬子曰我是彼奉水者之意而非夫摻火者之意子曰吾亦是吾意而非子之意也子墨子游荆耕柱子於楚二三子過之食之三升客之不厚二二子復於子墨子曰耕柱子處楚無益矣二三子過之食之三升客之不厚子墨子曰未可智也毋幾何而遺十金於子墨子曰後生不敢死有十金於此願夫子之用也子墨子曰果未可智也巫馬子謂子墨子之爲義也人不見而耶鬼不見而富而子爲之有狂疾子墨子曰今使子有二臣於此其一人者見子從事不見子則不從事其一人者見子亦從事不見子亦從事子誰貴於此二人巫馬子曰我貴其見我亦從事不見我亦從事者子墨子曰然則是子亦貴有狂疾也子夏之徒問於子墨子曰君子有闘乎子墨子曰君子無闘子夏之徒曰狗狶猶有闘惡有士而無闘矣子墨子曰傷矣哉言則稱於湯文行則譬於狗狶傷矣哉巫馬子謂子墨子曰舍今之人而譽大王是譽槁骨也譬若匠人然智槁木也而不智生木子墨子曰天下之所以生者以大王之道教也今譽大王是譽天下之所以生也可譽而不譽仁也子墨子曰和氏之璧隋侯之珠三棘六異此諸侯之所謂良寳也可以富國家衆人民治刑政安社稷乎曰不可所爲貴良寳者爲其可以利也而和氏之璧隋侯之珠三棘六異不可以利人是非天下之良寳也今用義爲政於國家人民必衆刑政必治社稷必安所爲貴良寳者可以利民也而義可以利人故曰義天下之良寳也葉公子高問政於仲尼曰善爲政者若之何仲尼對曰善爲政者遠者近之而舊者新之子墨子聞之曰葉公子高未得其問也仲尼亦未得其所以對也葉公子高豈不知善爲政者之遠者近也而舊者新是哉問所以爲之若之何也不以人之所不智告人所以智告之故葉公子高未得其問也仲尼亦未得其所以對也子墨子謂魯陽文君曰大國之攻小國譬猶童子之爲馬也童子之爲馬足用而勞今大國之攻小國也攻者農夫不得耕婦人不得織以守爲事攻人者亦農夫不得耕婦人不得織以攻爲事故大國之攻小國也譬猶童子之爲馬也子墨子曰言足以復行者常之足以舉行者勿常不足以舉行而常之是蕩口也子墨子使管黔𣷫游高石子於衛衛君致禄甚厚設之於鄕高石子三朝必盡言而言無行者去而之齊見子墨子曰衛君以夫子之故致禄甚厚設我於鄉石三朝必盡言而言無行是以去之也衛君無乃以石爲狂乎子墨子曰去之苟道受狂何傷古者周公旦非關叔辭三公東處於商盖人皆謂之狂後世稱其德揚其名至今不息且翟聞之爲義非避毁譽就去之道苟受狂何傷高石子曰石去之焉敢不道也昔者夫子有言曰天下無道仁士不處厚焉今衛君無道而貪其禄爵則是我爲苟陷人長也子墨子說而召子禽子曰姑聽此乎夫倍義而鄕禄者我常聞之矣倍禄而鄕義者於高石子焉見之也子墨子曰世俗之君子貧而謂之富則怒無義而謂之有義則喜豈不悖哉公孟子曰先人有則三而已矣子墨子曰孰先人而曰有則三而已矣子未智人之先有後生有反子墨子而反者我豈有罪哉吾反後子墨子曰是猶三軍北失後之人求賞也公孟子曰君子不作術而已子墨子曰不然人之其不君子者古之善者不誅今也善者不作其次不君子者古之善者不遂已有善則作之欲善之自已出也今誅而不作是無所異於不好遂而作者矣吾以爲古之善者則誅之今之善者則作之欲善之益多也巫馬子謂子墨子曰我與子異我不能兼愛我愛鄒人於越人愛魯人於鄒人愛我鄉人於魯人愛我家人於鄉人愛我親於我家人愛我身於吾親以爲近我也擊我則疾擊彼則不疾於我我何故疾者之不拂而疾不者之拂故有我有殺彼以我無殺我以利子墨子曰子之義將匿耶意將以告人乎巫馬子曰我何故匿我義吾將以告人子墨子曰然則一人說子一人欲殺子以利已十人說子十人欲殺子以利已天下說子天下欲殺子以利已一人不說子一人欲殺子以子爲施不祥言者也十人不說子十人欲殺子以子爲施不祥言者也天下不說子天下欲殺子以子爲施不祥言者也說子亦欲殺子不說子亦欲殺子是所謂經者口也殺常之身者也子墨子曰子之言惡利也若無所利而不言是蕩口也子墨子謂魯陽文君曰今有一人於此羊牛㹖㹖維人但割而和之食之勝食也見人之生餅則還然竊之曰舍余食不知日月安不足乎其有竊疾乎魯陽文君曰有竊疾也子墨子曰楚三意之田曠蕪而不可勝辟𧦝靈數千不可勝見宋鄭之間邑則還然竊之此與彼異乎魯陽文君曰是猶彼也實有竊疾也子墨子曰季孫紹與孟伯常治魯國之政不能相信而祝於禁社曰苟使我和是猶弇其目而視於禁社也苟使我皆視豈不繆哉子墨子謂駱滑氂曰我聞子好勇駱滑氂曰然我聞其鄕有勇士焉吾必從而殺之子墨子曰天下莫不欲與其所好度其所惡今子聞其鄉有勇士焉必從而殺之是非好勇也是惡勇也墨子卷之十一
