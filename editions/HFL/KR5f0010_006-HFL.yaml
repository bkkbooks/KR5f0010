front:
  text: 墨子卷之六
  hash: sha256:6b899d6eee55f27c4e7913ad1c05e50eb68c7a929f6a222649b2fbc6cd45ce25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_HFL_006-001a, image: hfl/0843/0843-146.png}
body:
  text: 節用上第二十聖人爲政一國一國可倍也大之爲政天下天下可倍也其倍之非外取地也因其國家去其無足以倍之聖王爲政其發令興事便民用財也無不加用而爲者是故用財不費民德不勞其興利多矣其爲衣裘何以爲冬以圉寒夏以圉暑凡爲衣裳之道冬加温夏加凊者芉䱉不加者去之其爲宫室何以爲冬以圉風寒夏以圉暑雨有盜賊加固者芉䱉不加者去之其爲甲盾五兵何以爲以圉㓂亂盗賊若有寇亂盜賊有甲盾五兵者勝無有不勝是故聖人作爲甲盾五兵凡爲甲盾五兵加輕以利堅而難折者芉䱉不加者去之其爲舟車何以爲車以行陵陸舟以行川谷以通四方之利凡爲舟車之道加輕以利者芉䱉不加者去之凡其爲此物也無加用而爲者是故用財不費民德不勞其興利多有去大人之好聚珠玉鳥獸犬馬以益衣裳宫室甲盾五兵舟車之數於數倍乎若則不難故孰爲難倍唯人爲難倍然人有可倍也昔聖王爲法曰丈夫年二十不敢毋處家女子年十五毋敢不事人此聖王之法也聖王既没於民次也其欲蚤處家者有所二十年處家其欲晚處家者有所四十年處家以其蚤與其晚相踐後聖王之法十年若純三年而宇子生可以二三年矣此不惟使民蚤處家而可以倍與且不然已今天下爲政者其所以寡人之道多其使民勞其籍斂厚民財不足凍餓死者不可勝數也且大人惟毋與師以攻伐鄰國久者終年速者數月男女久不相見此所以寡人之道也與居處不安飲食不時作疾病死者有與侵就援橐攻城野戰死者不可勝數此不令爲政者所以寡人之道數術而起與聖人爲政特無此不聖人爲政其所以衆人之道亦數術而起與故子墨子曰去無用之聖王之道天下之大利也節用中第二十一子墨子言曰古者明王聖人所以王天下正諸侯者彼其愛民謹忠利民謹厚忠信相連又示之以利是以終身不饜殁二十而不卷古者明王聖人其所以王天下正諸侯者此也是故古者聖王制爲節用之法曰凡天下羣百工輪車鞼匏陶冶梓匠使各從事其所能曰凡足以奏給民用諸加費不加民利則止古者聖王制爲飲食之法曰足以充虛繼氣强股肱耳目聰眀則止不極五味之調芬香之和不致遠國珍恢異物何以知其然古者堯治天下南撫交阯北降幽都東西至日所出入莫不賓服建至其厚愛黍稷不二羹胾不重飲於土塯啜於土形斗以酌俛仰周旋威儀之禮聖王弗爲古者聖王制爲衣服之法曰冬服紺緅之衣輕且暖夏服絺綌之衣輕且清則止諸加費不加於民利者聖王弗爲古者聖王爲猛禽狡獸暴人害民於是教民以兵行日帶劔爲刺則入擊則斷旁擊而不拆此劔之利也甲爲衣則輕且利動則兵且從此甲之利也車爲服重致遠乘之則安引之則利安以不傷人利以速至此車之利也古者聖王爲大川廣谷之不可濟於是利爲舟楫足以將之則止雖止者三公諸侯至舟楫不易津人不飾此舟之利也古者聖王制爲節葬之法曰衣三領足以朽肉棺三寸足以朽骸堀穴深不通於泉流不發洩則止死者既葬生者毋久喪用哀古者人之始生未有宫室之時因陵丘堀穴而處焉聖王慮之以爲堀穴曰冬可以辟風寒建夏下潤濕上重烝恐傷民之氣於是作爲宫室而利然則爲宫室之法將奈何哉子墨子言曰其旁可以圉風寒上可以圉雪霜雨露其中蠲潔可以祭祀宫墻足以爲男女之别則止諸加費不加民利者聖王弗爲節用下第二十二闕節葬上第二十三闕節葬中第二十四闕節葬下第二十五子墨子言曰仁者之爲天下度也辟之無以異乎孝子之爲親度也今孝子之爲親度也將奈何哉曰親貧則從事乎富之人民寡則從事乎衆之衆亂則從事乎治之當其於此也亦有力不足財不贍智不智然後已矣無敢舍餘力隱謀遺利而不爲親爲之者矣若三務孝子之爲親度也既若此矣雖仁者之天下度亦猶此也曰天下貧則從事乎富之人民寡則從事乎衆之衆而亂則從事乎治之當其於此亦有力不足財不贍智不智然後已矣無敢舍餘力隱謀遺利而不爲天下爲之者矣若三務者此仁者之爲天下度既若此矣今逮至昔者三代聖王既没天下失義後世之君子或以厚葬久喪以爲仁也義也孝子之事也或以厚葬久喪以爲非仁義非孝子之事也曰二子者言則相非行即相反皆曰吾上祖述堯舜禹湯文武之道者也而言即相非行即相反於此乎後世之君子皆疑惑乎二子者言也若苟疑惑乎之二子者言然則姑嘗傳而爲政乎國家萬民而觀之計厚葬久喪奚當此三利者我意若使法其言用其謀厚葬久喪實可以富貧衆寡定危治亂乎此仁也義也孝子之事爲人謀者不可不勸也仁者將求興天下誰霸而使民譽之終勿廢也意亦使法其言用其謀厚葬久喪實不可以富貧衆寡定危治亂乎此非仁非義非孝子之事也爲人謀者不可不勸也仁者將興之天下誰賈而使民譽之終勿廢也意亦使法其言用其謀厚葬久喪實不可以富貧衆寡定危理亂乎此非仁非義非孝子之事也爲人謀者不可不沮也仁者將求除之天下相廢而使人非之終身勿爲且故興天下之利除天下之害今國家百姓之不治也自古及今未嘗之有也何以知其然也今天下之士君子將猶多皆疑惑厚葬久喪之爲中是非利害也故子墨子言曰然則姑嘗稽之今雖毋法執厚葬久喪者言以爲事乎國家此存乎王公大人有喪者曰棺槨必重葬埋必厚衣衾必多文繡必繁丘隴必巨存乎正夫賤人死者殆竭家室焉諸侯死者虚車府然後金玉珠璣比乎身印組節約車馬藏乎壙又必多爲屋幕鼎鼓綋挻壼濫戈劔羽旄齒革寢而埋之滿意若殉從曰天子殺殉衆者數百寡者數十將軍大夫殺殉衆者數十寡者數人處喪之法將奈何哉曰哭泣不秩聲翁縗絰垂涕處倚廬寢苫枕由又相率强不食而爲飢薄衣而爲寒使面目䧟𨼥顔色黧黑耳目不聰明手足不勁强不可用也又曰上士之操喪也必扶而能起杖而能行以此共三年若法若言行若道使王公大夫行此則必不能蚤朝五官六府辟草木實倉廪使農夫行此則必不能蚤出夜入耕稼樹藝使百工行此則必不能修舟車爲器皿矣使婦人行此則必不能夙興夜寐紡績織絍細計厚葬爲多埋賦之財者也計久喪爲久禁從事者也財以成者扶而埋之後得生者而久禁之以此求富此譬猶禁耕而求穫也富之說無可得焉是故以求富家而既已不可矣欲以衆人民意者可邪其說又不可矣今惟無以厚葬久喪者爲政君死喪之三年父母死喪之三年妻與後子死者五皆喪之三年然後伯父叔父兄弟孽子其族人五月姑姊甥舅皆有月數則毁瘠必有制矣使面目䧟𨼥顔色黧黑耳目不聰明手足不勁强不可用也又曰上士操喪也必扶而能起杖而能行以此共三年若法若言行若道苟其飢約又若此矣是故百姓冬不仞寒夏不仞暑作疾病死者不可勝計也此其爲敗男女之交多矣以此求衆譬猶使人負劍而求其壽也衆之說無可得焉是故求以衆人民而既以不可矣欲以治刑政意者可乎其說又不可矣今惟無以厚葬久喪者爲政國家必貧人民必寡刑政必亂若法若言行若道使爲上者行此則不能聽治使爲下者行此則不能從事上不聽治刑政必亂下不行從事衣食之財必不足若苟不足爲人弟者求其兄而不得不弟弟必將怨其兄矣爲人子者求其親而不得不孝子必是怨其親矣爲人臣者求之君而不得不忠臣必且亂其上矣是以僻淫邪行之民出則無衣也入則無食也内續奚吾並爲淫暴而不可勝禁也是故盜賊衆而治者寡先衆盜賊而寡治者以此求治譬猶使人三睘而毋負己也治之說無可得焉是故求以治刑政而既已不可矣欲以禁止大國之攻小國也意者可邪其說又不可矣是故昔者聖王既没天下失義諸侯力征南有楚越之王而北有齊晋之君此皆砥礪其卒伍以攻伐并兼爲政於天下是故凡大國之所以不攻小國者積委多城郭修上下調和是故大國不耆攻者無積委城郭不修上下不調和是故大國者攻之今惟毋以厚葬久喪者爲政國家必貧人民必寡刑政必亂若苟貧是無以爲積委也若苟寡是城郭溝渠者寡也若苟亂是出戰不克入守不固此求禁止大國之攻小國也而既已不可矣欲以干上帝鬼神之福意者可邪其說又不可矣今惟無以厚葬久喪者爲政國家必貧人民必寡刑政必亂若苟貧是粢盛酒醴不浄潔也若苟寡是事上帝鬼神者寡也若苟亂是祭祀不時度也今又禁止事上帝鬼神爲政若此上帝鬼神始得從上撫之曰我有是人也與無是人也孰愈曰我有是人也與無是人也無擇也則惟上帝鬼神降之罪厲之禍罰而棄之則豈不亦乃其所哉故古聖王制爲葬埋之法曰棺三寸足以朽體衣衾三領足以覆惡以及其葬也下毋及泉上毋通臭壟若參耕之畝則止矣死者既以葬矣生者必無久哭而疾而從事人爲其所能以交相利也此聖王之法也今執厚葬久喪者之言曰厚葬久喪雖使不可以富貧衆寡定危治亂然此聖王也以道也子墨子曰不然昔者堯北教乎八狄道死葬蛩山之陰衣衾三領穀木之棺葛以緘之既𣳜而後哭滿塪無封已葬而牛馬乘之舜西教乎七戎道死葬南已之巿衣衾三領穀木之棺葛以緘之已葬而市人乘之禹東教乎九夷道死葬會稽之山衣衾三領桐棺三寸葛以緘之絞之不合道之不塪土地之深下毋及泉上毋通臭既葬收餘壤其上壟若參耕之畝取止矣若以此若三聖王者觀之則厚葬久喪果非聖王之道故三王者皆貴爲天子富有天下豈憂財用之不足哉以爲如此葬埋之法今王公大人之爲葬埋則異於此必大棺中棺革闠三操璧玉即具戈劍鼎鼓壺濫文繡素練大鞅萬領輿馬女樂皆具曰必捶𡌘差通壟雖凡山陵此爲輟民之事靡民之財不可勝計也其爲毋用若此矣是故子墨子曰鄕者吾本言曰意亦使其言用其謀計厚葬久喪請可以富貧衆寡定危治亂乎則仁也義也孝子之事也爲人謀者不可不勸也意亦使法其言用其謀若人厚葬久喪實不可以富貧衆寡定危治亂乎則非仁也非義也非孝子之事也爲人謀者不可不沮也是故求以富國家甚得貧焉欲以衆人民甚得寡焉欲以治刑政甚得亂焉求以禁止大國之攻小國也而既已不可矣欲以干上帝鬼神之福又得禍焉上稽之堯舜禹湯文武之道而政逆之下稽之桀紂幽厲之事猶合節也若以此觀則厚葬久喪其非聖王之道也今執厚葬久喪者言曰厚葬久喪果非聖王之道夫胡說中國之君子爲而不已操而不擇哉子墨子曰此所謂便其習而義其俗者也昔者越之東有沐之國者其長子生則解而食之謂之宜弟其大父死負其大母而棄之曰鬼妻不可與居處此上以爲政下以爲俗爲而不已操而不擇則此豈實仁義之道哉此所謂便其習而義其俗者也楚之南有炎人國者其親戚死朽其肉而棄之然後埋其骨乃成爲孝子秦之西有儀秉之國者其親戚死聚柴薪而焚之燻上謂之登遐然後成爲孝子此上以爲政下以爲俗爲而不已操而不擇則此豈實仁義之道哉此所謂便其習而義其俗者也若以此若三國者觀之則亦猶薄矣若中國之君子觀之則亦猶厚矣如彼則大厚如此則大薄然則葬埋之有節矣故衣食者人之生利也然且猶尚有節葬埋者人之死利也夫何獨無節於此乎子墨子制爲葬埋之法曰棺三寸足以朽骨衣三領足以朽肉掘地之深下無菹漏氣無發洩於上壟足以期其所則止矣哭徃哭來反從事乎衣食之財佴乎祭祀以致孝於親故曰子墨子之法不失死生之利者此也故子墨子言曰今天下之士君子中謂將欲爲仁義求爲上士上欲中聖王之道下欲中國家百姓之利故當若節喪之爲政而不可不察者此也墨子卷之六
