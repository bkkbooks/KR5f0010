front:
  text: 墨子卷之五沛五
  hash: sha256:c69a7ed39363511e73a4537ce5c6526f5ddc67a2ea950bfbe005d169751097aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_HFL_005-001a, image: hfl/0843/0843-122.png}
body:
  text: 非攻上第十七今有一人入人園圃竊其桃李衆聞則非之上爲政者得則罰之此何也以虧人自利也至攘人犬豕雞豚者其不義又甚入人園圃竊桃李是何故也以虧人愈多其不仁兹甚罪益厚至入人欄廐取人馬牛者其不仁義又甚攘人犬豕鷄豚此何故也以其虧人愈多苟虧人愈多其不仁兹甚罪益厚至殺不辜人也杝其衣裘取戈劔者其不義又甚入人欄廐取人馬牛此何故也以其虧人愈多苟虧人愈多其不仁兹甚矣罪益厚當此天下之君皆知而非之謂之不義今至大爲攻國則弗知非從而譽之謂之義此何謂知義與不義之别乎殺一人謂之不義必有一死罪矣若以此說徃殺十人十重不義必有十死罪矣殺百人百重不義必有百死罪矣當此天下之君子皆知而非之謂之不義今至大爲不義攻國則弗之而非從而譽之謂之義情不知其不義也故書其言以遺後世若知其不義也夫奚說書其不義以遺後世哉今有人於此少見黑曰黑多見黑曰白則以此人不知白黑之辯矣少嘗苦曰苦多嘗苦曰甘則必以此人爲不知甘苦之辯矣今小爲非則知而非之大爲非攻國則不知而非從而譽謂之之義此可謂知義與不義之辯乎是以知天下之君子也辯義與不義之亂也非攻中第十八子墨子言曰古者王公大人爲政於國家者情欲譽之審賞罰之當刑政之不過失是故子墨子曰古者有語謀而不得則以徃知來以見知隱謀若此可得而知矣今師徒唯毋興起冬行恐寒夏行恐暑此不可以冬夏爲者也春則廢民耕稼樹藝秋則廢民獲歛今唯毋廢一時則百姓飢寒凍餒而死者不可勝數今嘗計軍上竹箭羽旄幄幕甲盾撥劫住而靡弊腑冷不及者不可勝數又與矛㦸戈劔乘車其列住碎折靡弊而不及者不可勝數與其牛馬肥而徃瘠而反往死亡而不反者不可勝數與其涂道之脩遠粮食輟絶雨不繼百姓死者不可勝數也與其居處之不安食飯之不時飢飽之不節百姓之道疾病而死者不可勝數喪師多不可勝數喪師盡不可勝計則是鬼神之喪其主后亦不可勝數國家發政奪民之用廢民之利若此甚衆然而何爲爲之曰我貪伐勝之名及得之利故爲之子墨子言曰計其所自勝無所可用也計其所得反不如所喪者之多今攻三里之城七里之郭攻此不用銳且無殺而徒得此然也殺人多必數於萬寡必數於千然後三里之城七里之郭且可得也今萬乘之國虛數於千不勝而人廣衍數於萬不勝而辟然則土地者所有餘也王民者所不足也今盡王民之死嚴下上之患以争虚城則是棄所不足而重所有餘也爲政若此非國之務者也飾攻戰者也言南則荆吴之王北則齊晋之君始封於天下之時其土地之方未至有數百里也人徒之衆未至有數十萬人也以攻戰之故土地之博至有數千里也人徒之衆至有數百萬人故當攻戰而不可爲也子墨子言曰雖四五國則得利焉猶謂之非行道也譬若醫之藥人之有病者然今有醫於此和合其祝藥之于天下之有病者而藥之萬人食此若醫四五人得利焉猶謂之非行藥也故孝子不以食其親忠臣不以食其君古者封國於天下尚者以耳之所聞近者以目之所見以攻戰亡者不可勝數何以知其然也東方有莒之國者其爲國甚小間於大國之間不敬事於大夫國亦弗之從而愛利是以東者越人夾削其壤地西者齊人兼而有之計莒之所以亡於齊越之間者以是攻戰也雖南者陳蔡其所以亡於吴越之間者亦以攻戰雖北者且一不著何其所以亡於燕代胡貊之間者亦以攻戰也是故子墨子言曰古者王公大人情欲得而惡失故安而惡危故當攻戰而不可不非飾攻戰者之言曰彼不能收用彼衆是故亡我能收用我衆以此攻戰於天下誰敢不賓服哉子墨子言曰子雖能收用子之衆子豈若古者吴闔閭哉古者吴闔閭教七年奉甲執兵奔三百里而舍焉次注林出於冥隘之徑戰於柏舉中楚國而朝宋與及魯至夫差之身比而攻齊舍於汶上戰於艾陵大敗齊人而葆之大山東而攻越濟三江五湖而葆之會稽九夷之國莫不賓服於是退不能賞孤施舍群萌自恃其力伐其功譽其智怠於教遂築姑蘇之臺七年不成及若此則吴有離罷之心越王句踐視吴上下不相得收其衆以復其讐入北郭徙大内圍王宫而吴國以亡昔者晋有六將軍而智伯莫爲强焉計其土地之博人徒之衆欲以抗諸侯以爲英名攻戰之速故差論其分牙之士皆列舟車之衆以攻中行氏而有之以其謀爲既已足矣又攻兹范氏而大敗之并三家以爲一家而不止又圍趙襄子於晋陽及若此則韓魏亦相從而謀曰古者有語脣亡則齒寒趙氏朝亡我夕從之趙氏夕亡吾朝從之詩曰魚水不務陸將何及乎是以三主之君一心戮力辟門除道奉甲興士韓魏自外趙氏自内擊智伯大敗之是故子墨子言曰古者有語曰君子不鏡於水而鏡於人鏡於水見面之容鏡於人則知吉與凶今以攻戰爲利則蓋甞鑒之於智伯之事乎此其爲不吉而凶既可得而知矣非攻下第十九子墨子言曰今天下之所譽善者其說將何爲其上中天之利而中中鬼之利而下中人之利故譽之譽意亡非爲其上中天之利而中中鬼之利而下中人之利故譽之與雖使下之愚人必曰將爲其上中天之利而中中鬼之利而下中人之利故譽之今天下之所同養者聖王之法也今天下之諸侯將猶多皆免攻伐并兼則是有譽義之名而不察其實也此譬猶盲者之與人同命白黑之名而不能分其物也則豈謂有别哉是故古之知者之爲天下度也必順慮其義而後爲之行是以動則不疑速通成得其所欲而順天鬼百姓之利則知者之道也是故古之仁人有天下者必反大國之說一天下之和總四海之内焉率天下之百姓以農臣事上帝山川鬼神利人多功故又大是以天賞之愚富之人譽之使貴爲天子富有天下名參乎天地至今不廢此則知者之道也先王之所以有天下者也今王公大人天下之諸侯則不然將必皆差論其分牙之士皆列其舟車之卒伍於此爲堅甲利兵以往攻伐無罪之國入其國家邊境芟刈其禾稼斬其樹木墮其城郭以湮其溝池攘殺其牲牷燔潰其祖廟勁殺其萬民覆其老弱遷其重器卒進而柱乎闘曰死命爲上多殺次之身傷者爲下又況先列北橈乎哉罪死無殺以譂其衆夫無兼國覆軍賊虐萬民以亂聖人之緒意將以爲利天乎夫取天之人以攻天之邑此刺殺天民剥振神之位傾覆社稷攘殺其犧牲則此上不中天之利矣意將以爲利鬼乎夫殺之神滅鬼神之主廢滅先王賊虐萬民百姓離散則此中不中鬼之利矣意將以爲利人乎夫殺之人爲利人也博矣又計其費此爲周生之本竭天下百姓之財用不可勝數也則此下不中人之利矣今夫師者之相爲不利者也曰將不勇士不分兵不利教不習師不衆卒不利和威不圉害之不久争之不疾孫之不强植心不堅與國諸侯疑與國諸侯疑則敵生慮而意嬴矣偏具此物而致從事焉則是國家失卒而百姓易務也今不嘗觀其說好攻伐之國若使中興師君子庶人也必且數千徒倍十萬然後足以師而動矣乆者數歲速者數月是上不暇聽治士不暇治其官府農夫不暇稼穡婦人不暇紡績織絍則是國家失卒而百姓易務也然而又與其車馬之罷弊也幔幕帷蓋三軍之用甲兵之備五分而得其一則猶爲序疏矣然而又與其散亡道路道路遼遠粮食不繼傺食飲之時厠役以此飢寒凍餒疾病而轉死溝壑中者不可勝計也此其爲不利於人也天下之害厚矣而王公大人樂而行之則此樂賊滅天下之萬民也豈不悖哉今天下好戰之國齊晋楚越若使此四國者得意於天下此皆十倍其國之衆而未能食其地也是人不足而地有餘也今又以争地之故而反相賊也然則是虧不足而重有餘也今還夫好攻伐之君又飾其說以非子墨子曰以攻罰之爲不義非利物與昔者禹征有苗湯伐桀武王伐紂此皆立爲聖王是何故也子墨子曰子未察吾言之類未明其故者也彼非所謂攻謂誅也昔者有三苗大亂天命殛之日妖𡨽出雨血三朝龍生廟大哭乎巿夏水地坼及泉五穀變化民乃大振高陽乃命玄宫禹親把天之瑞令以征有苗四電誘祗有神人面鳥身若瑾以侍搤矢有苗之祥苗師大亂后乃遂幾禹既已克有三苗焉磨爲山川别物上下卿制大極而神民不違天下乃静則此禹之所以征有苗也還至乎夏至桀天有𨌒命日月不時寒暑雜至五穀焦死鬼呼國鶴鳴十夕餘乃命湯於鑣宫用受夏之大命夏德大亂予既卒其命於天矣徃而誅之必使汝堪之湯焉敢奉率其衆是以鄕有夏之境帝乃使陰暴毁有夏之城少少有神來告曰夏德大亂往攻之予必使汝大堪之予既受命於天天命融隆火于夏之城間西北之隅湯奉桀衆以克有屬諸侯於薄薦章天命通于四方而天下諸侯莫敢不賓服則此湯之所以誅桀也還至乎商王紂天不序其德祀用失時兼夜中十日雨王于薄九鼎遷止婦妖𡨽出有鬼宵吟有女爲男天雨肉棘生乎國道王兄自縱也赤烏銜珪降周之岐社曰天命周文王伐殷有國泰顛來賓河出緣圖地出乘黄武王踐功夢見三神予既沉漬殷紂于酒德矣往攻之予必使汝大堪之武王乃攻狂夫反商之周天賜武王黄鳥之旗王既已克殷成帝之來分主諸神祀紂先王通維四夷而天下莫不賓焉襲湯之緒此即武王之所以誅紂也若以此三聖王者觀之則非所謂攻也所謂誅也則夫好攻伐之君又飾其說以非子墨子曰子以攻伐爲不義非利物與昔者楚熊麗始討此睢山之間越王緊虧出自有遽始邦於越唐叔與吕尚邦齊晋此皆地方數百里今以并國之故四分天下而有之是故何也子墨子曰子未察吾言之類未明其故者也古者天子之始封諸侯也萬有餘今以并國之故萬國有餘皆滅而四國獨立此譬猶醫之藥萬有餘人而四人愈也則不可謂良醫矣則夫好攻伐之君又飾其說曰我非以金玉子女壤地爲不足也我欲以義名立於天下以德求諸侯也子墨子曰今若有能以義名立於天下以德來諸侯者天下之服可立而待也夫天下處攻伐久矣譬若傅子之爲馬然今若有能信效先利天下諸侯者大國之不義也則同憂之大國之攻小國也則同救之小國城郭之不全也必使修之布粟之絶則委之幣帛不足則共之以此効大國則小國之君說人勞我逸則我甲兵强寬以惠緩易急民必移易攻伐以治我國攻必倍量我師舉之費以諍諸侯之斃則必可得而序利焉督以正義其名必務寬吾衆信吾師以此授諸侯之師則天下無敵矣其爲下不可勝數也此天下之利而王公大人不知而用則此可謂不知利天下之臣務矣是故子墨子曰今且天下之王公大人士君子中情將欲求興天下之利除天下之害當若繁爲攻伐此實天下之巨害也今欲爲仁義求爲上士尚欲中聖王之道下欲中國家百姓之利故當若非攻之爲説而將不可察者此也墨子卷之五
