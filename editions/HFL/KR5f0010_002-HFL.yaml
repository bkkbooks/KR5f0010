front:
  text: 墨子卷之二沛二
  hash: sha256:37a2ee0060e7707a2951a2af88ab5dbf7184c62351de940fff94a6e56e6a393b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_HFL_002-001a, image: hfl/0843/0843-034.png}
body:
  text: 尚賢上第八子墨子言曰古者王公大人爲政於國家者皆欲國家之富人民之衆刑政之治然而不得富而得貧不得衆而得寡不得治而得亂則是本失其所欲得其所惡是其故何也子墨子言曰是在王公大人爲政於國家者不能以尚賢事能爲政也是故國有賢良之士衆則國家之治厚賢良之士寡則國家之治薄故大人之務將在於衆賢而已曰然則衆賢之術將奈何哉子墨子言曰譬若欲衆其國之善射御之士者必將富之貴之敬之譽之然后國之善射御之士將可得而衆也況又有賢良之士厚乎德行辯乎言談博乎道術者乎此固國家之珍而社稷之佐也亦必且富之貴之敬之譽之然後國之良士亦將可得而衆也是故古者聖王之爲政言曰不義不富不義不貴不義不親不義不近是以國之富貴人聞之皆退而謀曰始我所恃者富貴也今上舉義不辟貧賤然則我不可不爲義親者聞之亦退而謀曰始我所恃者親也今上舉義不辟親踈然則我不可不爲義近者聞之亦退而謀曰始我所恃者近也今上舉義不辟近然則我不可不爲義遠者聞之亦退而謀曰我始以遠爲無恃今上舉義不辟遠然則我不可不爲義逮至遠鄙郊外之臣門庭庶子國中之衆四鄙之萌人聞之皆競爲義是其故何也曰上之所以使下者一物也下之所以事上者一術也譬之異者有高墻深宫墻立既謹上爲鑿一門有盜人入闔其自入而求之盜其無自出是其故何也則上得要也故古者聖王之爲政列德而尚賢雖在農與工肆之人有能則舉之高予之爵重予之禄任之以事斷予之令曰爵位不高則民弗敬蓄禄不厚則民不信政令不斷則民不畏舉三者授之賢者非爲賢賜也欲其事之成故當是時以德就列以官服事以勞殿賞量功而分禄故官無常貴而民無終賤有能則舉之無能則下之舉公義辟私怨此若言之謂也故古者堯舉舜於服澤之陽授之政天下平禹舉益於陰方之中授之政九州成湯舉伊尹於庖厨之中授之政其謀得文王舉閎夭泰顛於罝罔之中授之政西土服故當是時雖在於厚禄尊位之臣莫不敬懼而施雖在農與工肆之人莫不競勸而尚意故士者所以爲輔相承嗣也故得士則謀不困體不勞名立而功業彰而惡不生則由得士也是故子墨子言曰得意賢士不可不舉不得意賢士不可不舉尚欲祖述堯舜禹湯之道將不可不以尚賢夫尚賢者政之本也尙賢中第九子墨子言曰今王公大人之君人民主社稷治國家欲脩保而勿失故不察尚賢爲政之本也何以知尚賢之爲政本也曰自貴且智者爲政乎愚且賤者則治自愚且賤者爲政乎貴且智者則亂是以知尚賢之爲政本也故古者聖王甚尊尚賢而任使能不黨父兄不偏貴富不嬖顔色賢者舉而上之富而貴之以爲官長不肖者抑而廢之貧而賤之以爲徒役是以民皆勸其賞畏其罰相率而爲賢者以賢者衆而不肖者寡此謂進賢然後聖人聽其言迹其行察其所能而慎予官此謂事能故可使治國者使治國可使長官者使長官可使治邑者使治邑凡所使治國家官府邑里此皆國之賢者也賢者之治國者也蚤朝晏退聽獄治政是以國家治而刑法正賢者之長官也夜寢夙興收歛關市山林澤梁之利以實官府是以官府實而財不散賢者之治邑也蚤出莫入耕稼樹藝聚菽粟是以菽粟多而民足乎食故國家治則刑法正官府實則萬民富上有以絜爲酒醴粢盛以祭祀天鬼外有以爲皮幣與四鄰諸侯交接内有以食飢息勞將養其萬民外有以懷天下之賢人是故上者天鬼富之外者諸侯與之内者萬民親之賢人歸之以此謀事則得舉事則成入守則固出誅則彊故唯昔三代聖王堯舜禹湯文武之所以王天下正諸侯者此亦其法已既曰若法未知所以行之術則事猶若未成是以必爲置三本何謂三本曰爵位不高則民不敬矣蓄禄不厚則民不信也政令不斷則民不畏也故古聖王高予之爵重予之禄任之以事斷予之令夫豈爲其臣賜哉欲其事之成也詩曰告女憂䘏誨女予鬱孰能執熱鮮不用濯則此語古者國君諸侯之不可以不執善承嗣輔佐也譬之猶執熱之有濯也將休其手焉古者聖王唯毋得賢人而使之般爵以貴之裂地以封之終身不厭賢人唯毋得明君而事之竭四肢之力以任君之事終身不倦若有美善則歸之上是以美善在上而所怨謗在下寧樂在君憂慼在臣故古者聖王之爲政若此今王公大人亦欲效人以尚賢使能爲政高予之爵而禄不從也夫高爵而無禄民不信也曰此非中實愛我也假藉而用我也夫假藉之民將豈能親其上哉故先王言曰食於政者不能分人以事厚於貨者不能分人以禄事則不與禄則不分請問天下之賢人將何自至乎王公大人之側哉若苟賢者不至乎王公大人之側則此不肖者在左右也不肖者在左右則其所譽不當賢而所罰不當暴王公大人尊此以爲政乎國家則賞亦必不當賢而罰亦必不當暴若苟賞不當賢而罰不當暴則是爲賢者不勸而爲暴者不沮矣是以入則不慈孝父母出則不長弟鄉里居處無節出入無度男女無别使治官府則盜竊守城則倍畔君有難則不死出亡則不從使斷獄則不中分財則不均與謀事不得舉事不成入守不固出誅不彊故雖昔者三代暴王桀紂幽厲之所以失措其國家傾覆其社稷者已此故也何則皆以明小物而不明大物也今王公大人有一衣裳不能制也必籍良工有一牛羊不能殺也必藉良宰故當若之二物者王公大人未知以尚賢使能爲政也逮至其國家之亂社稷之危則不知使能以治之親戚則使之無故富貴面目佼好則使之夫無故富貴面目佼好則使之豈必智且有慧哉若使之治國家則此使不智慧者治國家也國家之亂既可得而知已旦夫王公大人有所愛其色而使其心不察其知而與其愛是故不能治百人者使處乎千人之官不能治千人者使處乎萬人之官此其故何也曰若處官者爵高而禄厚故愛其色而使之焉夫不能治千人者使處乎萬人之官則此官什倍也夫治之法將日至者也日以治之日不什脩知以治之知不什益而予官什倍則此治一而棄其九矣雖日夜相接以治若官官猶若不治此其故何也則王公大人不明乎以尚賢使能爲政也故以尚賢使能爲政而治者夫若言之謂也以下賢爲政而亂者若吾言之謂也今王公大人中實將欲治其國家欲脩保而勿失胡不察尚賢爲政之本也且以尚賢爲政之本者亦豈獨子墨子之言哉此聖王之道先王之書歫年之言也傳曰求聖君哲人以禆輔而身湯誓曰聿求元聖與之戮力同心以治天下則此言聖之不失以尚賢使能爲政也故古者聖王唯能審以尚賢使能爲政無異物雜焉天下皆得其列古者舜耕歷山陶河瀕漁雷澤堯得之服澤之陽舉以爲天子與接天下之政治天下之民伊摯有莘氏女之私臣親爲庖人湯得之舉以爲已相與接天下之政治天下之民傅說被褐帶索庸築乎傅巖武丁得之舉以爲三公與接天下之政治天下之民此何故始賤卒而貴始貧卒而富則王公大人明乎以尚賢使能爲政是以民無飢而不得食寒而不得衣勞而不得息亂而不得治者故古聖王以審以尚賢使能爲政而取法於天雖天亦不辯貧富貴賤遠邇親疏賢者舉而尚之不肖者抑而廢之然則富貴爲賢以得其賞者誰也曰若昔者三代聖王堯舜禹湯文武者是也以所得其賞何也曰其爲政乎天下也兼而愛之從而利之又率天下之萬民以尚尊天事鬼愛利萬民是故天鬼賞之立爲天子以爲民父母萬民從而譽之曰聖王至今不已則此富貴爲賢以得其賞者也然則富貴爲暴以得其罰者誰也曰若昔者三代暴王桀紂幽厲者是也何以知其然也曰其爲政乎天下也兼而憎之從而賤之又率天下之民以詬天侮鬼賤傲萬民是故天鬼罰之使身死而爲刑戮子孫離散室家喪滅絶無後嗣萬民從而非之曰暴王至今不已則此富貴爲暴而以得其罰者也然則親而不善以得其罰者誰也曰若昔者伯鯀帝之元子廢帝之德庸既乃刑之于羽之郊乃熱照無有及也帝亦不愛則此親而不善以得其罰者也然則天之所使能者誰也曰若昔者禹稷臯陶是也何以知其然也先王之書吕刑道之曰皇帝清問下民有辭有苗曰羣后之肆在下明明不常鰥寡不蓋德威維威德明維明乃名三后恤功於民伯夷降典哲民維刑禹平水土主名山川稷隆播種農殖嘉穀三后成功維假於民則此言三聖人者謹其言慎其行精其思慮索天下之隱事遺利以上事天則天鄉其德下施之萬民萬民被其利終身無已故先王之言曰此道也大用之天下則不究小用之則不困脩用之則萬民被其利終身無已周頌道之曰聖人之德若天之高若地之普其有昭於天下也若地之固若山之承不坼不崩若日之光若月之明與天地同常則此言聖人之德章明博大埴固以脩久也故聖人之德蓋總乎天地者也今王公大人欲王天下正諸侯夫無德義將何以哉其說將必挾震威彊今王公大人將焉取挾震威彊哉傾者民之死也民生爲甚欲死爲甚憎所欲不得而所憎屢至自古及今未嘗能有以此王天下正諸侯者也今大人欲王天下正諸侯將欲使意得乎天下名成乎後世故不察尚賢政之本也此聖人之厚行也尚賢下第十子墨子言曰天下之王公大人皆欲其國家之富也人民之衆也刑法之治也然而不識以尚賢爲政其國家百姓王公大人本失尚賢爲政之本也若苟王公大人本失尚賢爲政之本也則不能毋舉物示之乎今若有一諸侯於此爲政其國家也曰凡我國能射御之士我將賞貴之不能射御之士我將罪賤之問於若國之士孰善孰懼我以爲必能射御之士喜不能射御之士懼我賞因而誘之矣曰凡我國之忠信之士我將賞貴之不忠信之士我將罪賤之問於若國之士孰喜孰懼我以爲必忠信之士喜不忠不信之士懼今唯毋以尚賢爲政其國家百姓使國爲善者勸爲暴者沮大以爲政於天下使天下之爲善者勸爲暴者沮然昔吾所以貴堯舜禹湯文武之道者何故以哉以其唯毋臨衆發政而治民使天下之爲善者可而勸也爲暴者可而沮也然則此尚賢者也與堯舜禹湯文武之道同矣而今天下之士君子居處言語皆尚賢逮至其臨衆發政而治民莫知尚賢而使能我以此知天下之士君子明小而不明於大也何以知其然乎今王公大人有一牛羊之財不能殺必索良宰有一衣裳之財不能制必索良工當王公大人之於此也唯有骨肉之親無故富貴面目美好者實知其不能也不使之也是何故恐其敗財也當王公大人之於此也則不失尚賢而使能王公大人有一罷馬不能治必索良醫有一危弓不能張必索良工當王公大人之於此也雖有骨肉之親無故富貴面目美好者實知其不能也必不使是何故恐其敗財也當王公大人之於此也則不失尚賢而使能逮至其國家則不然王公大人骨肉之親無故富貴面目美好者則舉之則王公大人之親其國家也不若其親一危弓罷馬衣裳牛羊之財與我以此知天下之士君子皆明於小而不明於大也此譬猶瘖者而使爲行人聾者而使爲樂師是故古之聖王之治天下也其所富其所貴未必王公大人骨肉之親無故富貴面目美好者也是故昔者舜耕於歷山陶於河瀕漁於雷澤灰於常陽堯得之服澤之陽立爲天子使接天下之政而治天下之民昔伊尹爲莘氏女師僕使爲庖人湯得而舉之立爲三公使接天下之政治天下之民昔者傅說居北海之洲圜土之上衣褐帶索庸築於傅巖之城武丁得而舉之立爲三公使之接天下之政而治天下之民是故昔者堯之舉舜也湯之舉伊尹也武丁之舉傅説也豈以爲骨肉之親無故富貴面目美好者哉唯法其言用其謀行其道上可而利天中可而利鬼下可而利人是故推而上之古者聖王既審尚賢欲以爲政故書之竹帛琢之槃盂傳以遺後世子孫於先王之書吕刑之書然王曰於來有國有土告女訟刑在今而安百姓女何擇言人何敬不刑何度不及能擇人而敬爲刑堯舜禹湯文武之道可及也是何也則以尚賢及之於先王之書竪年之言然曰晞夫聖武知人以屏輔而身此言先王之治天下也必選擇賢者以爲其羣屬輔佐曰今也天下言士君子皆欲富貴而惡貧賤曰然女何爲而得富貴而辟貧賤莫若爲賢爲賢之道將奈何曰有力者疾以助人有財者勉以分人有道者勸以教人若此則飢者得食寒者得衣亂者得治若飢則得食寒則得衣亂則得治此安生生今王公大人其所富其所貴皆王公大人骨肉之親無故富貴面目美好者也今王公大人骨肉之親無故富貴面目美好者焉故必知哉若不知使治其國家則其國家之亂可得而知也今天下之士君子皆欲富貴而惡貧賤然女何爲而得富貴而辟貧賤哉曰莫若爲王公大人骨肉之親無王公大人骨肉之親無故富貴面目美好者此非可學能者也使不知辯德行之厚若禹湯文武不加得也王公大人骨肉之親躄瘖聾暴爲桀紂不加失也是故以賞不當賢罰不當暴其所賞者已無故矣其所罰者亦無罪是以使百姓皆攸心解體沮以爲善垂其股肱之力而不相勞來也腐臭餘財而不相分資也隱慝良道而不相教誨也若此則飢者不推而上之以是故昔者堯有舜舜有禹禹有臯陶湯有小臣武王有閎夭泰顛南宫括散宜生得此不勸譽且今天下之王公大人士君子中實將欲爲仁義求爲士上欲中聖王之道下欲中國家百姓之利而天下和庶民阜是以近者安之遠者歸之日月之所照舟車之所及雨露之所漸粒食之所養故尚賢之爲説而不可不察此者也尚賢者天鬼百姓之利而政事之本也墨子卷之二
