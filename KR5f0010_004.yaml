front:
  text: 墨子卷之四沛四
  hash: sha256:4c35b06a6eb74cdbce7afcb220c398863919ba1637a6cc05334edfa23ac59da2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0010_HFL_004-001a, image: hfl/0843/0843-094.png}
body:
  text: 兼愛上第十四聖人以治天下為事者也必知亂之所自起焉能治之不知亂之所自起則不能治譬之如醫之攻人之疾者然必知疾之所自起焉能攻之不知疾之所自起則弗能攻治亂者何獨不然必知亂之所自起焉能治之不知亂之所自起則弗能治聖人以治天下為事者也不可不察亂之所自起當察亂何自起起不相愛臣子之不孝君父所謂亂也子自愛不愛父故虧父而自利弟自愛不愛兄故虧兄而自利臣自愛不愛君故虧君而自利此所謂亂也雖父之不慈子兄之不慈弟君之不慈臣此亦天下之所謂亂也父自愛也不愛子故虧子而自利兄自愛也不愛弟故虧弟而自利君自愛也不愛臣故虧臣而自利是何也皆起不相愛雖至天下之為盜賊者亦然盜愛其室不愛其異室故竊異室以利其室賊愛其身不愛人故賊人以利其身此何也皆遂不相愛雖至大夫之相亂家諸侯之相攻國者亦然大夫各愛家不愛異家故亂異家以利家諸侯各愛其國不愛異國故攻異國以利其國天下之亂物具此而已矣察此何自起皆起不相愛若使天下兼相愛人若愛其身惡施不孝猶有不慈者乎視子弟與臣若其身惡施不慈不孝亡猶有盜賊乎故視人之室若其室誰竊視人身若其身誰賊故盜賊有亡猶有大夫之相亂家諸侯之相攻國者乎視人家若其家誰亂視人國若其國誰攻故大夫之相亂家諸侯之相攻國者有亡若使天下兼相愛國與國不相攻家與家不相亂盜賊無有君臣父子皆能孝慈若此則天下治故聖人以治天下為事者惡得不禁惡而勸愛故天下兼相愛則治相惡則亂故子墨子曰不可以不勸愛人者此也兼愛中第十五子墨子言曰仁人之所以為事者必興天下之利除去天下之害以此為事者也然則天下之利何也天下之害何也子墨子言曰今若國之與國之相攻家之與家之相篡人之與人之相賊君臣不惠忠父子不慈孝兄弟不和調則此天下之害也然則崇此害亦何用生哉以不相愛生耶子墨子言以不相愛生今諸侯獨知愛其國不愛人之國是以不憚舉其國以攻人之國今家主獨知愛其家而不愛人之家是以不憚舉其家以篡人之家今人獨知愛其身不愛人之身是以不憚舉其身以賊人之身是故諸侯不相愛則必野戰家主不相愛則必相篡人與人不相愛則必相賊君臣不相愛則不惠忠父子不相愛則不慈孝兄弟不相愛則不和調天下之人皆不相愛强必執弱富必侮貧貴必敖賤詐必欺愚凡天下禍篡怨恨其所以起者以不相愛生也是以仁者非之既以非之何以易之子墨子言曰以兼相愛交相利之法易之然則兼相愛交相利之法將奈何哉子墨子言視人之國若視其國視人之家若視其家視人之身若視其身是故諸侯相愛則不野戰家主相愛則不相篡人與人相愛則不相賊貴不敖賤詐不欺愚凡天下禍篡怨恨可使毋起者以仁者譽之然而今天下之士君臣相愛則惠忠父子相愛則慈孝兄弟相愛則和調天下之人皆相愛强不執弱衆不劫寡富不侮貧子墨子曰然乃若兼則善矣雖然天下之難物于故也子墨子言曰天下之士君子特不識其利辨其故也今若夫政城野戰殺身為名此天下百姓之所皆難也苟君說之則士衆能為之況於兼相愛交相利則與此異夫愛人者人必從而愛之利人者人必從而利之惡人者人必從而惡之害人者人必從而害之此何難之有特上弗以為政士不以為行故也昔者晋文公好士之惡衣故文公之臣皆牂羊之裘韋以帶錢練帛之冠入以見於君出以踐朝是其故何也君說之故臣為之也昔者楚靈王好士細腰故靈王之臣皆以一飯為節肱息然後帶扶墻然後起比期年朝有黧黑之危是其故何也君說之故臣能之也昔越王勾踐好士之勇教馴其臣和合之焚舟失火試其士曰越國之寶盡在此越王親自鼓其士而進之曰士聞鼓音破碎亂行蹈火而死者左右百人有餘越王擊金而退之是故子墨子言曰乃若夫少食惡衣殺身而為名此天下百姓之所皆難也若苟君說之則衆能為之況兼相愛交相利與此異矣夫愛人者人亦從而愛之利人者人亦從而利之惡人者人亦從而惡之害人者人亦從而害之此何難之有焉特上不以為政而士不以為行故也然而今天下之士君子曰然乃若兼則善矣雖然不可行之物也譬若挈太山越河濟也子墨子言是非其譬也夫挈太山而越河濟可謂畢劫有力矣自古及今未有能行之者也況乎兼相愛交相利則與此異古者聖王行之何以知其然古者禹治天下西為西河漁竇以泄渠孫皇之水北為防原泒注后之邸呼池之竇灑為底柱鑿為龍門以利燕代胡貉與西河之民東方漏之陸防蓋諸之澤灑為九澮以揵東土之水以利冀州之民南為江漢淮汝東流之注五湖之處以利楚荆越與南夷之民此言禹之事吾今行兼矣昔者文王之治西土若日若月乍光于四方于西土不為大國侮小國不為衆庶侮鰥寡不為暴勢奪穡人黍稷狗天屑臨文王慈是以老而無子者有所得終其壽連獨無兄弟者有所雜於生人之間少失其父母者有所放依而長此文王之事則吾今行兼矣昔者武王將事泰山隧傳曰泰山有道曾孫周王有事大事既獲仁人尚作以祇商夏蠻夷醜貉雖有周親不若仁人萬方有罪維豫一人此言武王之事吾今行兼矣是故子墨子言曰今天下之君子忠實欲天下之士富而惡其貧欲天下之治而惡其亂當兼相愛交相利此聖王之法天下之治道也不可不務為也兼愛下第十六子墨子言曰仁人之事者必務求與天下之利除天下之害然當今之時天下之害孰為大曰若大國之攻小國也大家之亂小家也强之劫弱衆之暴寡詐之謀愚貴之敖賤此天下之害也人與為人君者之不惠也臣者之不忠也父者之不慈也子者之不孝也此又天下之害也又與今人之賤人執其兵刃毒藥水火以交相虧賊此又天下之害也姑嘗本原若衆害之所自此胡自生此自愛人利人生與即必曰非然也必曰從惡人賊人生分名乎天下惡人而賊人者兼與别與即必别也然即之交别者果生天下之大害者與是故别非也子墨子曰非人者必有以易之若非人而無以易之譬之猶以水救火也其說將必無可焉是故子墨子曰兼以易别然即兼之可以易别之故何也曰藉為人之國若為其國夫誰獨舉其國以攻人之國者哉為彼者由為巳也為人之都若為其都夫誰獨舉其都以伐人之都者哉為彼猶為已也為人之家若為其家夫誰獨舉其家以亂人之家者哉為彼猶為巳也然即國都不相攻伐人家不相亂賊此天下之害與天下之利與即必曰天下之利也姑嘗本原若衆利之所自生此胡自生此自惡人賊人生與即必曰非然也必曰從愛人利人生分名乎天下愛人而利人者别與兼與即必曰兼也然即之交兼者果生天下之大利者與是故子墨子曰兼是也且鄉吾本言曰仁人之事者必務求興天下之利除天下之害今吾本原兼之所生天下之大利者也吾本原别之所生天下之大害者也是故子墨子曰别非而兼是者出平若方也今吾將正求與天下之利而取之以兼為正是以聰耳明目相為視聽乎是以股肱畢强相為動為宰乎而有道肆相教誨是以老而無妻子者有所侍養以終其壽幼弱孤童之無父母者有所放依以長其身今唯毋以兼為正即若其利也不識天下之事所以皆聞兼而非者其故何也然而天下之士非兼者之言猶未止也曰即善矣雖然豈可用哉子墨子曰用而不可難哉亦將非之且焉有善而不可用者姑嘗兩而進之誰以為二士使其一士者執别使其一士者執兼是故別士之言曰吾豈能為吾友之身若為吾身為吾友之親若為吾親是故退睹其友飢即不食寒即不衣疾病不侍養死喪不葬埋别士之言若此行若此兼士之言不然行亦不然曰吾聞為高士於天下者必為其友之身若為其身為其友之親若為其親然後可以為高士天下是故退睹其友飢則食之寒則衣之疾病侍養之死喪葬埋之兼士之言若此行若此若之二者言相非而行相反與當使若二士者言必信行必果使言行之合猶合符節也無言而不行也然即敢問今有平原廣野於此被甲嬰胄將往識死生之權未可識也又有君大夫之遠使於巴越齊荆往來及否未及否未可識也然即敢問不識將惡也家室奉承親戚提挈妻子而寄託之不識於兼之有是乎於別之有是乎哉以為當其於此也天下無愚夫愚婦雖非兼之人必寄託之於兼之有是也此言而非兼擇即取兼即此言兼費也不識天下之士所以皆聞兼而非之者其故何也然而天下之士非兼者之言猶未止也曰意可以擇士而不可以擇君子姑嘗兩而進之誰以為二君使其一君者執兼使其一君者執别是故别君之言曰吾惡能為吾萬民之身若為吾身此泰非天下之情也人之生乎地上之無幾何也譬之猶駟馳而過隙也是故退睹其萬民飢即不食寒即不衣疾病不侍養死喪不葬埋别君之言若此行若此兼君之言不然行亦不然曰吾聞為明君於天下者必萬萬民之身後為其身然後可以為明君於天下是故退睹萬民飢即食之寒即衣之疾病侍養之死喪葬埋之兼君之言若此行若此然即交若之二君者言相非而行相反與常使若二君者言必信行必果使言行之合猶合符節也無言而不行也然即敢問今歲有癘疫萬民多有勤苦凍餒轉死溝壑中者既已衆矣不識將擇之二君者將何從也我以為當其於此也天下無愚夫愚婦雖非兼君必從兼君是也言而非兼擇即此言行拂也不識天下所以皆聞兼而非之者其故何也然而天下之士非兼者之言也獨未止也曰兼即仁矣義矣雖然豈可為哉吾譬兼之不可為也猶挈泰山以超江河也故兼者直願之也夫豈可為之物哉子墨子曰夫挈泰山以超江河自古之及今生民而來未嘗有也今若夫兼相愛交相利此自先聖六王者親行之何知先聖六王之親行之也子墨子曰吾非與之並世同時親聞其聲見其色也以其所書於竹帛鏤於金石琢於槃盂傳遺後世子孫者知之泰誓曰文王若曰若月乍照光于四方于西土即此言文王之兼愛天下之博大也譬之日月兼照天下之無有私也即此文王兼也雖子墨子之所謂兼者於文王取法焉且不唯泰誓為然雖禹誓即亦猶是也禹曰濟濟有衆咸聽朕言非惟小子敢行稱亂蠢兹有苗用天之罰若豫既率爾羣對諸羣以征有苗禹之征有苗也非以求以重富貴干福祿樂耳目也以求興天下之利除天下之害即此禹兼也雖子墨子之所謂兼者於禹求焉且不唯禹誓為然雖湯說即亦猶是也湯曰惟豫小子履敢用玄牡告于上天后曰今天大旱即當朕身履未知得罪于上下有善不敢蔽有罪不敢赦簡在帝心萬方有罪即當朕身朕身有罪無及萬方即此言湯貴為天子富有天下然且不憚以身為犧牲以祠說于上帝鬼神即此湯兼也雖子墨子之所謂兼者於湯取法焉且不唯誓命與湯說為然周詩即亦猶是也周詩曰王道蕩蕩不偏不黨王道平平不黨不偏其直若矢其易若底君子之所履小人之所視若吾言非語道之謂也古者文武為正均分賞賢罰暴勿有親戚弟兄之所阿即此文武兼也雖子墨子之所謂兼者於文武取法焉不識天下之人所以皆聞兼而非之者其故何也然而天下之非兼者之言猶未止曰意不忠親之利而害為孝乎子墨子曰姑嘗本原之孝子之為親度者吾不識孝子之為親度者亦欲人愛利其親與意欲人之惡賊其親與以說觀之即欲人之愛利其親也然即吾惡先從事即得此若我先從事乎愛利人之親然後人報我愛利吾親乎意我先從事乎惡人之親然後人報我以愛利吾親乎即必吾先從事乎愛利人之親然後人報我以愛利吾親也然即之交孝子者果不得已乎毋先從事愛利人之親者與意以天下之孝子為遇而不足以為正乎姑嘗本原之先王之所書大雅之所道曰無言而不讎無德而不報投我以桃報之以李即此言愛人者必見愛也而惡人者必見惡也不識天下之士所以皆聞兼而非之者其故何也意以為難而不可為邪嘗有難此而可為者昔荆靈王好小腰當靈王之身荆國之士飯不踰乎一固據而後興扶垣而後行故約食為其難為也然後為而靈王說之未踰於世而民可移也即求以鄉其上也昔者越王句踐好勇教其士臣三年以其知為未足以知之也焚舟失火鼓而進之其士偃前列伏水火而死有不可勝數也當此之時不鼓而退也越國之士可謂顫矣故焚身為其難為也然後為之越王說之未踰於世而民可移也即求以鄉上也昔者晋文公好苴服當文公之時晋國之士大布之衣牂羊之裘練帛之冠且苴之履入見文公出以踐之朝故苴服為其難為也然後為而文公說之未踰於世而民可移也即求以鄉其上也是故約食焚舟苴服此天下之至難為也然後為而上說之未踰於世而民可移也何故也即求以鄉其上也今若夫兼相利此其有利且易為也不可勝計也我以為則無有上說之者而已矣苟有上說之者勸之以賞譽威之以刑罰我以為人之於就兼相愛交相利也譬之猶火之就上水之就下也不可防止於天下故兼者聖王之道也王公大人之所以安也萬民衣食之所以足也故君子莫若審兼而務行之為人君必惠為人臣必忠為人父必慈為人子必孝為人兄必友為人弟必悌故君子莫若欲為惠君忠臣慈父孝子友兄悌弟當若兼之不可不行也此聖王之道而萬民之大利也墨子卷之四
