body:
  text: 明鬼上第二十九闕明鬼中第三十闕明鬼下第三十一子墨子言曰逮至昔三代聖王既沒天下失義諸侯力正是以存夫為人君臣上下者之不惠忠也父子弟兄之不慈孝弟長貞良也正長之不强於聽治賤人之不强於從事也民之為淫暴寇盜賊以兵刃毒藥水火退無罪人乎道路率徑奪人車馬衣裘以自利者並作由此始是以天下亂此其故何以然也則皆以疑惑鬼神之有與無之别不眀乎鬼神之能賞賢而罰暴也今若使天下之人借若信鬼神之能賞賢而罰暴也則夫天下豈亂哉今執無鬼者曰鬼神者固無有旦暮以為教誨乎天下之疑天下之衆使天下之衆皆疑惑乎鬼神有無之别是以天下亂是故子墨子曰今天下之王公大人士君子實將欲求興天下之利除天下之害故當鬼神之有與無之别以為將不可以明察此者也既以鬼神有無之别以為不可不察已然則吾為明察此其說將奈何而可子墨子曰是與天下之所以察知有與無之道者必以衆之耳目之實知有與亡為儀者也請惑聞之見之則必以為無若是何不嘗入一鄉一里而問之自古以及今生民以來者亦有嘗見鬼神之物聞鬼神之聲則鬼神何謂無乎若莫聞莫見則鬼神可謂有乎今執無鬼者言曰夫天下之為聞見鬼神之物者不可勝計也亦孰為聞見神鬼有無之物哉子墨子曰若以衆之所同見與衆之所同聞則若昔者杜伯是也周宣王殺其臣杜伯而不辜杜伯曰吾君殺我而不辜若以死者為無知則止矣若死而有知不出三年必使吾君知之其三年周宣王合諸侯而用於圃田車數百乘從數千人滿野日中杜伯乘白馬素車朱衣冠執朱弓挾朱矢追周宣王射入車上中心折脊殪車中伏㢭而死當是之時周人從者莫不見遠者莫不聞著在周之春秋為君者以教其臣為父者以其子曰戒之慎之凡殺不辜者其得不祥鬼神之謀若此之憯遫以若書之說觀之則鬼神之有豈可疑哉非惟若書之說為然昔者鄭穆公當晝日中處乎廟有神入門而左鳥身素服三絶面狀正方鄭穆公見之乃恐懼奔帝享女眀德使子錫女壽十年有九使若國家蕃昌子孫茂毋失鄭穆公再拜稽首曰敢問神曰豫為句芒若以鄭穆公之所身見為儀則鬼神之有豈可疑哉非惟若書之說為然也昔者燕簡公殺其臣莊子儀而不辜莊子儀曰吾君王殺我而不辜死人毋知亦已死人有知不出三年必使吾君知之期年燕將馳祖燕之有祖當齊之社稷宋之有桑林楚之有雲夢也此男女之所屬而觀也日中燕簡公方將馳於祖塗莊子儀荷朱杖而擊之殪之車上當是時燕人從者莫不見遠者莫不聞著在燕之春秋諸侯傳而言之曰凡殺不辜者其得不祥鬼神之誅若此其憯遫也以若書之說觀之則鬼神之有豈可疑哉非惟若書之說為然也昔者宋文君鮑之時有臣曰𥙐觀辜固嘗從事於厲株子杖揖出與言曰觀辜是何陸璧之不滿度量酒醴粢盛之不淨潔也犧牲之不全肥春秋冬夏選失時豈女為之與意鮑為之與觀辜曰鮑幼弱在荷繦之中鮑何與識焉官臣觀辜特為之株子舉揖而槀之殪之壇上當是宋人從者莫不見遠者莫不聞著在宋之春秋諸侯傳而語之曰諸不敬慎祭祀者鬼神之誅至若此其憯遫以若書之說觀之鬼神之有豈可疑哉非惟若書之說為然也昔者齊莊君之有所謂王里國中里徼者此二子者訟三年而獄不斷齊君由謙殺之恐不辜猶謙釋之恐失有罪乃使之人共一羊盟齊之神社二子許諾於是泏洫𢵣羊而漉其血讀王里國之辭既已終矣讀中里徼之辭未半也羊起而觸之折其腳祧神之而槀之殪之盟所當是時齊人從者莫不見遠者莫不聞著在齊之春秋諸侯傳而語之曰請品先不以其請者鬼神之誅至若此其憯遫也以若書之說觀之鬼神之有豈可疑哉是故子墨子言曰雖有深溪博林幽澗毋人之所施行不可以不董見有鬼神視之今執無鬼者曰夫衆人耳目之請豈足以斷疑哉奈何其欲為高君子於天下而有復信衆之耳目之請哉子曰若以衆之耳目之請以為不足信也不以斷疑不識若昔者三代聖王堯舜禹湯文武者足以為法乎故於此乎自中人以上皆曰若昔者三代聖王足以為法矣若苟昔者三代聖王足以為法然則姑嘗上觀聖王之事昔者武王之攻殷誅紂也使諸侯分其祭曰使親者受內祀疏者受外祀故武王必以鬼神為有是故攻殷誅紂使諸侯分其祭若鬼神無有則武王何祭分哉非為武王之事為然也故聖王其賞也必於祖其僇也必於社賞於祖者何也告分之均也僇於社者何也告聽之中也非惟若書之說為然也且惟昔者虞夏商周三代之聖王其始建國營都日必擇國之正壇置以為宗廟必擇木之修茂者立以為菆位必擇國之父兄慈孝貞良者以為祝宗必擇六畜之勝腯肥倅毛以為犧牲圭璧璜璜稱財為度必擇五穀之芳黃以為酒醴粢盛故酒醴粢盛與歲上下也故古聖王治天下也故必先鬼神而後人者此也故曰官府選效必先祭器祭服畢藏於府祝宗有司畢立於朝犧牲不與昔聚群故古者聖王之為政若此古者聖王必以鬼神為其務鬼神厚矣又恐後世子孫不能知也故書之竹帛傳遺後世子孫咸恐其腐蠹絶滅後世子孫不得而記故琢之盤盂鏤之金石以重之有恐後世子孫不能敬莙以取羊故先王之書聖人一尺之帛一篇之書語數鬼神之有也重有重之此其故何則聖王務之今執無鬼者曰鬼神者固無有則此反聖王之務反聖王之務則非所以為君子之道也今執無鬼者之言曰先王之書慎無一尺之帛一篇之書語數鬼神之有重有重亦何書之亦何書有之哉子墨子曰周書大雅有之大雅曰文王在上於昭于天周雖舊邦其命維新有周不顯帝命不時文王陟降在帝左右穆穆文王令問不已若鬼神無有則文王既死彼豈能在帝之左右哉此吾所以知周書之鬼也且周書獨鬼而商書不鬼則未足以為法也然則姑嘗止觀乎商書曰嗚呼古者有夏方未有禍之時百獸貞蟲允及飛鳥莫不比方矧住人面胡敢異心山川鬼神亦莫敢不寧若能共允住天下之合下土之葆察山川鬼神之所以莫敢不寧者以佐謀禹也此吾所以知商周之鬼也且禹書獨鬼而夏書不鬼則未足以為法也然則姑嘗止觀乎夏書禹誓曰大戰于甘王乃命左右六人下聽誓于中軍曰有扈氏威侮五行怠棄三正天用勦絶其命有曰日中今豫與有扈氏爭一日之命且爾卿大夫庶人豫非爾田野葆士之欲也豫共行天之罰也左不共于左右不共于右若不共命御非藏馬之政若不共命是以賞於祖而僇於社賞於祖者何也言分命之均也僇於社者何也言聽獄之事也故古聖王必以鬼神為賞賢而罰暴是故賞必於祖而僇必於社此吾所以知夏書之鬼也故尚書夏書其次商周之書語數鬼神之有也重有重之此其故何也則聖王務之以若書之說觀之則鬼神之有豈可疑哉於古曰吉日丁卯周代祝社方歲于社考以延年壽若無鬼神彼豈有所延年壽哉是故子墨子曰嘗若鬼神之能賞賢如罰暴也蓋本施之國家施之萬民實所以治國家利萬民之道也若以為不然是以吏治官府之不潔廉男女之為無别者鬼神見之民之為淫暴寇亂盜賊以兵刃毒藥水火退無罪人乎道路奪人車馬衣裘以自利者有鬼神現之是以吏治官府不敢不潔廉見善不敢不賞見暴不敢不罪民之為淫暴寇亂盜賊以兵刃毒藥水火退無罪人乎道路奪車馬衣裘以自利者由此止是以莫放幽間擬乎鬼神之明顯明有一人畏上誅罰是以天下治故鬼神之明不可為幽間廣澤山林深谷鬼神之明必知之鬼神之罰不可富貴衆强勇力强武堅甲利兵鬼神之罰必勝之若以為不然昔者夏王桀貴為天子富有天下上詬天侮鬼下殃傲天下之萬民祥上帝伐元山帝行故於此乎天乃使湯至明罰焉湯以車九兩鳥陳鴈行湯乘大贊犯遂下衆人之𧎸遂王乎禽推哆大戲故昔夏王桀貴為天子富有天下有勇之推哆大戲主别凶虎指畫殺人人民之衆兆億侯盈厥澤陵然不能以此圉鬼神之誅此吾所謂鬼神之罰不可為富貴衆强勇力强武堅甲利兵者此也且不惟此為然昔者殷王紂貴為天子富有天下上詬天侮鬼下殃傲天下之萬民播棄黎老賊誅孩子椘毒無罪刳剔孕婦庶舊鰥寡號咷無告也故於此乎天乃使武王至明罰焉武王以擇車百兩虎賁之卒四百人先庶國節窺戎與殷人戰乎牧之野王乎禽費中惡來衆畔百走武王逐奔入宫萬年梓株折紂而繫之赤環載之白旗以為天下諸侯僇故昔者殷王紂貴為天子富有天下有勇力之人費中惡來崇侯虎指寡殺人人民之衆兆億侯盈厥澤陵然不能以此圉鬼神之誅此吾所謂鬼神之罰不可為富貴衆强力勇强武堅甲利兵者此也且禽艾之道之曰得璣無小滅宗無大則此言鬼神之所賞無小必賞之鬼神以所罰無大必罰之今執無鬼者曰意不忠親之利而害為孝子乎子墨子曰古之今之為鬼非他也有天鬼亦有山水鬼神者亦有人死而為鬼者今有子先其父死弟先其兄死者矣意雖使然然而天下之陳物曰先生者先死若是則先死者非父則毋非兄而姒也今潔為酒醴粢盛以敬慎祭祀若使鬼神請有是得其父母姒兄而飲食之也豈非厚利哉若使鬼神請亡是乃費其所為酒醴粢盛之財耳自夫費之特注之汙壑而棄之也內者宗族外者鄉里皆得如具飲食之雖使鬼神請亡此猶可以合歡聚衆取親於鄉里今執無鬼者言曰鬼神者固請無有是以不共其酒醴粢盛犧牲之財吾非乃今愛其酒醴粢盛犧牲之財乎其所得者臣將何哉此上逆聖王之書內逆民人孝子之行而為上士於天下此非所以為上士道是故子墨子曰今吾為禁祀也非直注之汙壑而棄之也上以交鬼之福下以合歡聚衆取親乎鄉里若神有則是得吾父母弟兄而食之也則此豈非天下利事也哉是故子墨子曰今天下之王公大人士君子中實將欲求興天下之利除天下之害當若鬼神之有也將不可不尊明也聖王之道也非樂上第三十二子墨子言曰仁之事者必務求興天下之利除天下之害將以為法乎天下利人乎即為不利人乎即止且夫仁者之為天下度也非為其目之所美耳之所樂口之所甘身體之所安以此虧奪民衣食之財仁者弗為也是故子墨子之所以非樂者非以大鍾鳴鼓琴瑟竽笙之聲以為不樂也非以刻鏤華文章之色以為不美也非以犓豢煎炙之味以為不甘也非以高臺厚榭邃野之居以為不安也雖身知其安也口知其甘也目知其美也耳知其樂也然上考之不中聖王之事下度之不中萬民之利是故子墨子曰為樂非也今王公大人雖無造為樂器以為事乎國家非直掊潦水折壤坦而為之也將必厚措斂乎萬民以為大鍾鳴鼓琴瑟竽笙之聲譬之若聖王之為舟車也即我弗敢非也古者聖王亦嘗厚措斂乎萬民以為舟車既已成矣曰吾將惡許用之曰舟用之水車用之陸君子息其足焉小人休其肩背焉故萬民出財齎而豫之不敢以為戚恨者何也以其反中民之利也然則樂器反中民之利亦若此即我弗敢非也然則當用樂器民有三患飢者不得食寒者不得衣勞者不得息三者民之巨患也然即當為之撞巨鍾擊鳴鼓彈琴瑟吹竽笙而揚干戚民衣食之財將安可得乎即我以為未必然也意舍此今有大國即攻小國有大家即伐小家强劫弱衆暴寡詐欺愚貴傲賤寇亂盜賊並興不可禁止也然即當為之撞巨鍾擊鳴鼓彈琴瑟吹竽笙而揚干戚天下之亂也將安可得而治與即我未必然也是故子墨子曰姑嘗厚措斂乎萬民以為大鍾鳴鼓琴瑟竽笙之聲以求興天下之利除天下之害而無補也是故子墨子曰為樂非也今王公大人惟毋處高臺厚榭之上而視之鍾猶是延鼎也弗撞擊將何樂得焉哉其說將必撞擊之惟勿撞擊將必不使老與遲者老與遲者耳目不聰眀股肱不畢强聲不和調明不轉朴將必使當年因其耳目之聰明股肱之畢强聲之和調眉之轉朴使丈夫為之廢大夫耕稼樹藝之時使婦人為之廢婦人紡績織絍之事今王公大人惟毋為樂虧奪民衣食之時以拊樂如此多也是故子墨子曰為樂非也今大鍾鳴鼓琴瑟竽笙之聲既已具矣大人鏽然奏而獨聽之將何樂得焉哉其說將必與賤人不與君子聽之廢君子聽治與賤人聽之廢賤人之從事今王公大人惟毋為樂虧奪民之衣食之財以拊樂如此多也是故子墨子曰為樂非也昔者齊康公興樂萬萬人不可衣短褐不可食糠糟曰食飲不美面目顔色不足視也衣服不美身體從容醜羸不足觀也是以食必粱肉衣必文繡此掌不從事乎衣食之財而掌食乎人者也是故子墨子曰今王公大人惟無為虧奪民衣食之財以拊樂如此多也是故子墨子曰為樂非也今人固與禽獸麋鹿蜚鳥貞蟲異者也今之禽獸麋鹿蜚鳥貞蟲因其羽毛以為衣裘因其蹄蚤以為褲屨因其水草以為飲食故唯使雄不耕稼樹藝雌亦不紡績織絍衣食之財固已具矣今人與此異者也賴其力者主不賴其力者不主君子不强聽治即刑政亂賤人不强從事即財用不足今天下之士君子以吾言不然然即姑嘗數天下分事而觀樂之害王公大人蚤朝晏退聽獄治政此其分事也士君子竭股肱之力亶其思慮之智內治官府外收斂關巿山林澤梁之利以實倉廪府庫此其分事也農夫蚤出暮入耕稼樹藝多聚升粟此其分事也婦人夙興夜寐紡綪織絍多治麻絲葛緒細布縿此其分事也今惟毋在乎王公大人說樂而聽之即必不能蚤朝晏退聽獄治政是故國家亂而社稷危矣今惟毋在乎士君子就樂而聽之即必不能竭股肱之力亶其思慮之智內治官府外收斂關巿山林澤梁之利以實倉廪府庫是故倉廪府庫不實今惟毋在乎農夫說樂而聽之即必不能蚤出暮入耕稼樹藝多聚升粟不足今惟毋在乎婦人說樂而聽之即不必夙興夜寐紡績織絍多治麻絲葛緒細布縿是故布縿不興曰孰為大人之聽治而廢國家之從事曰樂也是故子墨子曰為樂非也何以知其然也曰先王之書湯之官刑有之曰其桓舞于宫是謂巫風其刑君子出絲二衛小人否似二伯黃徑乃言曰嗚呼舞佯佯黃言孔章上帝弗常九有以亡上帝不順降之曰𦍙其家必懷喪察九有之所以亡者徒從飾樂也於武觀曰啓乃淫溢康樂野于飲食將將銘莧磬以力湛濁于酒渝食于野萬舞翼翼章聞于大天用弗式故上者天鬼弗戒下者萬民弗利是故子墨子曰今天下士君子請將欲求興天下之利除天下之害當在樂之為物將不可不禁而止也墨子卷之八
