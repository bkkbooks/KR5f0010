body:
  text: 貴義第四十七子墨子曰萬事莫貴於義今謂人曰豫子冠履而斷子之手足子為之乎必不為何故則冠履不若手足之貴也又曰豫子天下而殺子之身子為之乎必不為何故則天下不若身之貴也爭一言以相殺是貴義於其身也故曰萬事莫貴於義也子墨子自魯齊即過故人謂子墨子曰今天下莫為義子獨自苦而為義子不若已子墨子曰今有人於此有子十人一人耕而九人處則耕者不可以不益急矣何故則食者衆而耕者寡也今天下莫為義則子如勸我者也何故止我子墨子南游於楚見楚獻惠王獻惠王以老辭使穆賀見子墨子子墨子說穆賀穆賀大說謂子墨子曰子之言則成善矣而君王天下之大王也毋乃曰賤人之所為而不用乎子墨子曰唯其可行譬若藥然草之本天子食之以順其疾豈曰一草之本而不食哉今農夫入其稅於大人大人為酒醴粢盛以祭上帝鬼神豈曰賤人之所為而不享哉故雖賤人也上比之農下比之藥曾不若一草之本乎且主君亦嘗聞湯之說乎昔者湯將往見伊尹令彭氏之子御彭氏之子半道而問曰君將何之湯曰將往見伊尹彭氏之子曰伊尹天下之賤人也君若欲見之亦令召問焉彼受賜矣湯曰非女所知也今有藥此食之則耳加聰目加明則吾必說而强食之今夫伊尹之於我國也譬之良醫善藥也而子不欲我見伊尹是子不欲吾善也因下彭氏之子不使御彼苟然然後可也子墨子曰凡言凡動利於天鬼百姓者為之凡言凡動害於天鬼百姓者舍之凡言凡動合於三代聖王堯舜禹湯文武者為之凡言凡動合於三代暴王桀紂幽厲者舍之子墨子曰言足以遷行者常之不足以遷行者勿常以遷行而常之是蕩口也子墨子曰必去六辟默則思言則誨動則事使者三代御必為聖人必去喜去怒去樂去悲去愛而用仁義手足口鼻耳從事於義必為聖人子墨子謂二三子曰為義而不能必無排其道譬若匠人之斫而不能無排其繩子墨子曰世之君子使之為一之宰不能則辭之使為一國之相不能而為之豈不悖哉子墨子曰今瞽曰巨者白也黔者墨也雖明目者無以易之兼白黑使瞽取焉不能知也故我曰瞽不知白墨者非以其名也以其取也今天下之君子之名仁也雖禹湯無以易之兼仁與不仁而使天下之君子取焉不能知也故我曰天下之君子不知仁者非以其名也亦以其取也子墨子曰今事之用身不若商人之用一布之慎也商人用一布布不敢繼苟而讐焉必擇良者今士之用身則不然意之所欲則為之厚者入刑罰薄者被毁醜則士之用身不若商人之用一布之慎也子墨子曰世之君子欲其義之成而助之修其身則愠是猶欲其墻之成而人助之築則愠也豈不悖哉子墨子曰古之聖王欲傳其道於後世是故書之竹帛鏤之金石傳遺後世子孫欲後世子孫法之也今聞先王之遺而不為是廢先王之傳也子墨子南遊使衛關中載書甚多弦唐子見而怪之曰吾夫子教公尚過曰揣曲直而已今夫子載書甚多何有也子墨子曰昔者周公旦朝讀書百篇夕見漆十士故周公旦佐相天子其修至於今翟上無君上之事下無耕農之難吾安敢廢此翟聞之同歸之物信有誤者然而民聽不鈞是以書多也今若過之心者數逆於精微同歸之物既已知其要矣是以不教以書也而子何怪焉子墨子謂公良桓子曰衛小國也處於齊晋之間猶貧家之處於富家之間也貧家而學富家之衣食多用則速亡必矣今簡子之家飾車數百乘馬食菽粟者數百匹婦人衣文繡者數百人吾取飾車食馬之費與繡衣之財以畜士必千人有餘若有患難則使百人處於前數百於後與婦人數百人處前後孰安吾以為不若畜士之安也子墨子仕於衛所仕者至而反子墨子曰何故反對曰與我言而不當曰待女以千盆授我五百盆故去之也子墨子曰授子過千盆則子去之乎對曰不去子墨子曰然則非為其不審也為其寡也子墨子曰世俗之君子視義士不若負粟者今有人於此負粟息於路側欲起而不能君子見之無長少貴賤必起之何故也曰義也今為義也君子奉承先王之道以語之縱不說而行又從而非毁之則是世俗之君子之視義士也不若視負粟者之子墨子曰商人之四方市賈信徙雖有關梁之難盜賊之危必為之今士坐而言義無關梁之難盜賊之危此為信徙不可勝計然而不為財士之計利不若商人之察也子墨子北之齊遇日者日者曰帝以今日殺黑龍於北方而先生之色黑不可以北子墨子不聽遂北而反為日者曰我謂先生不可以北子墨子曰南之人不得北北之人不得南其色有黑者有白者何故皆不遂也且帝以甲乙殺青龍於東方以丙丁殺赤龍於南方以庚辛殺白龍於西方以壬癸殺黑龍於北方若用子之言則是禁下行者也是圍心而虛天下也子之言不可用也子墨子曰吾言足用矣舍言革思者是猶舍穫而粟也以其言非吾言者是猶以卵投石也盡天下之卵其石猶是也不可毁也公孟第四十八公孟子謂子墨子曰君子共已以待問焉則言不問焉則止譬若鍾然扣則鳴不扣則不鳴子墨子曰是言有三物焉子乃今知其一身也又未知其所謂也若大人行淫暴於國家進而諫則謂之不遜因左右而獻諫則謂之言議此君子之所疑惑也若大人為政將因於國家之難譬若機之將發也然君子之必以諫然而大人之利若此者雖不扣必鳴者也若大人舉不義之異行雖得大巧之經可行於軍旅之事欲攻伐無罪之國有之也君得之則必用之矣以廣辟土地著稅僞材出必見辱所攻者不利而攻者亦不利是兩不利也若此者雖不扣必鳴者也且子曰君子共已待問焉則言不問焉則止譬若鍾然扣則鳴不扣則不鳴今未有扣子而言是子之謂不扣而鳴邪是子之所謂非君子邪公孟子謂子墨子曰實為善人孰不知譬若良玉處而不出有餘精譬若美女處而不出人爭求之行而自衒人莫知取也今子遍從人而說之何其勞也子墨子曰今夫世亂求美女者衆美女雖不出人多求之今求善者寡不强說人人莫之知也且有二生於此善星一行為人筮者與處而不出者其精孰多公孟子曰行為人筮者其精多子墨子曰仁義鈞行說人者其功善亦多何故不行說人也公孟子義章甫搢儒服而以見子墨子曰君子服然後行乎其行然後服乎子墨子曰行不在服公孟子曰何以知其然也子墨子曰昔者齊桓公高冠博帶金劔木盾以治其國其國治昔者晋文公大布之衣牂羊之裘韋以帶劔以治其國其國治昔者楚莊王鮮冠組纓絳衣慱袍以治其國其國治昔者越王句踐剪髮文身以治其國其國治此四君者其服不同其行猶一也翟以是知行之不在服也公孟子曰善吾聞之曰宿善者不祥請舍易章甫復見夫子可乎子墨子曰請因以相見也若不將舍易章甫而後相見然則行果在服也公孟子曰君子必古言服然後仁子墨子曰昔者商王紂卿士費仲為天下之暴人箕子微子為天下之聖人此同言而或仁不仁也周公旦為天下之聖人關叔為天下之暴人此同服或仁或不仁然則不在古服與古言矣且子法周而未法夏也子之古非古也公孟子謂子墨子曰昔者聖王之列也上聖立為天子其次立為卿大夫今孔子慱於詩書察於禮樂詳於萬物若使孔子當聖王則豈不以孔子為天子哉子墨子曰夫知者必尊天事鬼愛人用節合焉為知矣今子曰孔子慱於詩書察於禮樂詳於萬物而曰可以為天子是數人之齒而以為富公孟子曰貧富壽夭然在天不可損益又曰君子必學子墨子曰教人學而執有命是猶命人葆而去亦冠也公孟子謂子墨子曰有義不義無祥不祥子墨子曰古者聖王皆以鬼神為神眀而為禍福執有祥不祥是以政治而國安也自桀紂以下皆以鬼神為不神明不能為禍福執無祥不祥是以政亂而國危也故先王之書子亦有之曰亦傲也出於子不祥此言為不善之有罰為善之有賞子墨子謂公孟子曰喪禮君與父母妻後子死三年喪服伯父叔父兄弟期族人五月姑姊舅甥皆有數月之喪或以不喪之間誦詩三百弦詩三百歌詩三百舞詩三百若用子之言則君子何曰以聽治庶人何日以從事公孟子曰國亂則治之治則為禮樂國治則從事國富則為禮樂子墨子曰國之治治之廢則國之治亦廢國之富也從事故富也從事廢則國之富亦廢故雖治國勸之無饜然後可也今子曰國治則為禮樂亂則治之是譬猶噎而穿井也死而求醫也古者三代暴王桀紂幽厲薾為聲樂不顧其民是以身為刑僇國為戾虛者皆從此道也公孟子曰無鬼神又曰君子必學祭祀子墨子曰執無鬼而學祭禮是猶無客而學客禮也是猶無魚而為魚罟也公孟子謂子墨子曰子以三年之喪為非子之三日之喪亦非也子墨子曰子以三年之喪非三日之喪是猶倮謂橛者不恭也公孟子謂子墨子曰知有賢於人則可謂知乎子墨子曰愚之知有以賢於人而愚豈可謂知矣哉公孟子曰三年之喪學吾之慕父母子墨子曰夫嬰兒子之知獨慕父母而已父母不可得也然號而不止此亦故何也即愚之至也然則儒者之知豈有以賢於嬰兒子哉子墨子曰問於儒者何故為樂曰樂以為樂也子墨子曰子未我應也今我問曰何故為室曰冬避寒焉夏避暑焉室以為男女之别也則子告我為室之故矣今我問曰何故為樂曰樂以樂也是猶曰何故為室曰室以為室也子墨子謂程子曰儒之道足以喪天下者四政焉儒以為不明以鬼為不神天鬼不說此足以喪天下又厚葬久喪重為棺槨多為衣衾送死若徙三年哭泣扶後起杖後行耳無聞目無見此足以喪天下又弦歌鼓舞習為聲樂此足以喪天下又以命為有貧富壽夭治亂安危有極矣不可損益也為上者行之必不聽治矣為下者行之必不從事矣此足以喪天下程子曰甚矣先生之毁儒也子墨子曰儒固無此各四政者而我言之則是毁也今儒固有此四政者而我言之則非毁也告聞也程子無辭而出子墨子曰迷之反後坐進復曰鄉者先生之言有可聞者焉若先生之言則是不譽禹不毁桀紂也子墨子曰不然夫應孰辭稱議而為之敏也厚攻則厚吾薄攻則薄吾應孰辭而稱議是猶荷轅而擊蛾也子墨子與程子辨稱於孔子程子曰非儒何故稱於孔子也子墨子曰是亦當而不可易者也今鳥聞熱旱之憂則高魚聞熱旱之憂則下當此雖禹湯為之謀必不能易矣鳥魚可謂愚矣禹湯猶云因焉今翟曾無稱於孔子乎有游於子墨子之門者謂子墨子曰先生以鬼為神明知能為禍人哉有游於子墨子之門者身體强良思慮徇通欲使隨而學子墨子曰姑學乎吾將仕子勸於善言而學其年而責仕於子墨子子曰不仕子子亦聞夫魯語乎魯有昆弟五人者亦父死亦長子嗜酒而不葬亦四弟曰子無我葬當為子沽酒勸於善言而葬已葬而責酒於其四弟四弟曰吾未豫子酒矣子葬子父我葬吾父豈獨吾父哉子不葬則人將笑子故勸子葬也今子為義我亦為義豈獨我義也哉子不學則人將笑子故勸子於學有游於子墨子之門者子墨子曰盍學乎對曰吾族人無學者子墨子曰不然夫好美者豈曰吾族人莫之好故不好哉夫欲富貴者故不欲哉好美欲富貴者不視人猶强為之福為善者富之暴者禍之今吾事先生久矣而福不至意者先生之言有不善乎鬼神不明乎我何故不得福也子墨子曰雖子不得福吾言何遽不善而鬼神何遽不明子亦聞乎匿徒之刑之有刑乎對曰未得之聞也子墨子曰今有人於此什子子能什譽之而一自譽乎對曰不能有人於此百子子能終身譽亦善而子無一乎對曰不能子墨子曰匿一人者猶有罪今子所匿者若此亦多將有厚罪者也何福之求子墨子有疾跌鼻進而問曰先生以鬼神為明能為禍福善者賞之為不善者罰之今先生聖人也何故有疾意者先生之言有不善乎鬼神不明知乎子墨子曰雖使我有病何遽不明人之所得於病者多方有得之寒暑有得之勞苦百門而一門焉則盜何遽無從夫義天下之大器也何以視人必强為之二三子有復於子墨子學射者子墨子曰不可夫知者必量亦力所能至而從事焉國士戰且扶人猶不可及也今子非國士也豈能成學又成射哉二三子復於子墨子曰告子曰言義而行甚惡請棄之子墨子曰不可稱我言以毁我行愈於亡有人於此翟甚不仁尊天事鬼愛人甚不仁猶愈於亡也今告子言談甚辨言仁義而不吾毁告毁子猶愈亡也二三子復於子墨子曰告子勝為仁子墨子曰未必然也告子為仁譬猶跛以為長隱以為廣不可久也告子謂子墨子曰我治國為政子墨子曰政者口言之身必行之今子口言之而身不行是子之身亂也子不能治子之身惡能治國政子姑亡子之身亂之矣墨子卷之十二
