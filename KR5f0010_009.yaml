body:
  text: 非樂中第三十三闕非樂下第三十四闕非命上第三十五子墨子言曰古者王公大人爲政國家者皆欲國家之富人民之衆刑政之治然而不得富而得貧不得衆而得寡不得治而得亂則是本失其所欲得其所惡是故何也子墨子言曰執有命者以雜於民間者衆執有命者之言曰命富則富命貧則貧命衆則衆命寡則寡命治則治命亂則亂命壽則壽命夭則夭命雖强勁何益哉上以說王公大人下以駔百姓之從事故執有命者不仁故當執有命者之言不可不明辯然則明辯此之說將奈何哉子墨子言曰必立儀言而毋儀譬猶運鈞之上而立朝夕者也是非利害之辯不可得而明知也故言必有三表何謂三表子墨子言曰有本之者有原之者有用之者於何本之上本之於古者聖王之事於何原之下原察百姓耳目之實於何用之廢以爲刑政觀其中國家百姓人民之利此所謂言有三表也然而今天下之士君子或以命爲有益蓋嘗尚觀於聖王之事古者桀之所亂湯受而治之紂之所亂武王受而治之此世未易民未渝於桀紂則天下亂在於湯武則天下治豈可謂有命哉然而今天下之士君子或以命爲有益嘗尚觀於先王之書先王之書所出國家布施百姓憲也先王之憲亦嘗有曰福不可請而禍不可諱敬無益暴無傷者乎所以聽獄制罪者刑也先王之刑亦甞有曰福不可請禍不可諱敬無益暴無傷者乎所以整設師旅進退師徒者誓也先王之誓亦甞有曰福不可請禍不可諱敬無益暴無傷者乎是故子墨子言曰吾當未鹽數天下之良書不可盡計數大方論數而五者是也今雖毋求執有命者之言不必得不亦可錯乎今用執有命者之言是覆天下之義覆天下之義者是立命者也百姓之誶也說百姓之誶者是滅天下之人也然則所爲欲義在上者何也曰義人在上天下必治上帝山川鬼神必有幹主萬民被其大利何以知之子墨子曰古者湯封於毫絶長繼短方地百里與其百姓兼相愛交相利移則分率其百姓以上尊天事鬼是以天鬼富之諸侯與之百姓親之賢士歸之未殁其世而王天下政諸侯昔者文王封於岐周絶長繼短方地百里與其百姓兼相愛交相利則是以近者安其政遠者歸其德聞文王者皆起而趨之罷不肖股肱不利者處而願之曰奈何乎使文王之地及我吾則吾利豈不亦猶文王之民也哉是以天鬼富之諸侯與之百姓親之賢士歸之未殁其世而王天下政諸侯鄕者言曰義人在上天下必治上帝山川鬼神必有幹王萬民被其大利吾用此知之是故古之聖王發憲出令設以爲賞罰以勸賢是以入則孝慈於親戚出則弟長於鄕里坐處有度出入有節男女有辨是故使治官府則不盜竊守城則不崩叛君有難則死出亡則送此上之所賞而百姓之所譽也執有命者之言曰上之所賞命固且賞非賢故賞也上之所罰命固且罰不暴故罰也是故入則不慈孝於親戚出則不弟長於鄉里坐處不度出入無節男女無辨是故治官府則盜竊守城則崩叛君有難則不死出亡則不送此上之所罰百姓之所非毁也執有命者言曰上之所罰命固且罰不暴故罰也上之所賞命固且賞非賢故賞也以此爲君則不義爲臣則不忠爲父則不慈爲子則不孝爲兄則不良爲弟則不弟而强執此者此持凶言之所自生而暴人之道昔然則何以知命之爲暴人之道昔上世之窮民貪於飲食惰於從事是以衣之財不足而飢寒凍餒之憂至不知曰我罷不肖從事不疾必曰我命固且貧苦上世暴王不忍其耳目之淫心涂之辟不順其親戚遂以亡失國家傾覆社稷不知曰我罷不肖爲政不善必曰吾命固失之於仲虺之告曰我聞于夏人矯天命布命于下帝伐之惡龔喪厥師此言湯之所以非桀之執有命也於太誓曰紂夷處不肯事上帝鬼神禍厥先神禔不祀乃曰吾民有命無廖排屚天亦縱之棄而弗葆此言武王所以非紂執有命也今用執有命者之言則上不聽治下不從事上不聽治則刑政亂下不從事則財用不足上無以共粢盛酒醴祭祀上帝鬼神降綏天下賢可之士外無以應待諸侯之賓客内無以食飢衣寒將養老弱故命上不利於天中不利於鬼下不利於人而强執此者此持凶言之所自生而暴人之道也是故子墨子言曰今天下之士君子忠實欲天下之富而惡其貧欲天下之治而惡其亂執有命者之言不可不非此天下之大害也非命中第三十六子墨子言曰凡出言談由文學之爲道也則不可而不先立義法若言而無義譬猶立朝夕於員鈞之上也則雖有巧工必不能得正焉然今天下之情僞未可得而識也故使言有三法三法者何也有本之者有原之者有用之者於其本之也考之天鬼之志聖王之事於其原之也徵以先王之書用之奈何發而爲刑此言之三法也今天下之士君子或以命爲亡我所以知命之有與亡者以衆人耳目之情知有與亡有聞之有見之謂之有莫之聞莫之見謂之亡然胡嘗考之百姓之情自古以及今生民以來者亦嘗見命之物聞命之聲者乎則未嘗有也若以百姓爲愚不肖耳目之情不足因而爲法然則胡不嘗考之諸侯之傳言流語乎自古以及今生民以來者亦嘗有聞命之聲見命之體者乎則未嘗有也然胡不嘗考之聖王之事古之聖王舉孝子而勸之事親尊賢良而勸之爲善發憲布命以教誨賞罰以勸沮若此則亂者可使治而危者可使安矣若以爲不然昔者桀之所亂湯治之紂之所亂武王治之此世不渝而民不改上變政而民易教其在湯武則治其在桀紂則亂安危治亂在上之發政也則豈可謂有命哉夫曰有命云者亦不然矣今夫有命者言曰我非作之後世也自昔三代有若言以傳流矣今故先生對之曰夫有命者不志昔也三代之聖善人與意亡昔三代之暴不肖人也何以知之初之列士桀大夫慎言知行此上有以規諫其君長下有以教順其百姓故上有以規諫其君長下有以教順其百姓故上得其君長之賞下得其百姓之譽列士桀大夫聲聞不廢傳流至今而天下皆曰其力也一不顧其國家百姓之政繁爲無用暴逆百姓使下不親其上是故國爲虛厲身在刑僇之中必不能曰我見命焉是故昔者三代之暴王不繆其耳目之淫不慎其心志之辟外之𢿛騁田獵畢弋内沈於酒樂而罷不肖我爲刑政不善必曰我命故且亡雖昔也三代之窮民亦由此也内之不能善事其親戚外不能善事其君長惡恭儉而好簡易貪飲食而惰從事衣食之財不足使身至有饑寒凍餒之憂心不能曰我罷不肖我從事不疾必曰我命固且窮雖昔也三代之僞民亦猶此也繁飾有命以教衆愚樸人久矣聖王之患此也故書之竹帛琢之金石於先王之書仲虺之告曰我聞有夏人矯天命布命于下帝式是惡用闕師此語夏王桀之執有命也湯與仲虺共非之先王之書太誓之言然曰紂夷之居而不肯事上帝棄闕其先神而不祀也曰我民有命毋僇其務天不亦棄縱而不葆此言紂之執有命也武王以太誓非之有於三代不國有之曰女毋崇天之有命也命三不國亦言命之無也於召公之執令於然且敬哉無天命惟予二人而無造言不自降天之哉得之在於商夏之詩書曰命者暴王作之且今天下之士君子將欲辯是非利害之故當天有命者不可不疾非也執有命者此天下之厚害也是故子墨子非也非命下第三十七子墨子言曰凡出言談則必可而不先立儀而言若不先立儀而言譬之猶運鈞之上而立朝夕焉也我以爲雖有朝夕之辯必將終未可得而從定也是故言有三法何謂三法曰有考之者原之者有用之者惡乎考之考先聖大王之事惡乎原之察衆之耳目之請惡乎用之發而爲政乎國察萬民而觀之此謂三法也故昔者三代聖王禹湯文武方爲政乎天下之時曰必務舉孝子而勸之事親尊賢良之人而教之爲善是故出政施教賞善罰暴且以爲若此則天下之亂也將屬可得而治也社稷之危也將屬可得而定也若以爲不然昔桀之所亂湯治之紂之所亂武王治之當此之時世不渝而民不易上變政而民改俗存乎桀紂而天下亂存乎湯武而天下治天下之治也湯武之力也天下之亂也桀紂之罪也若以此觀之夫安危治亂存乎上之爲政也則夫豈可謂有命哉故昔者禹湯文武方爲政乎天下之時曰必使飢者得食寒者得衣勞者得息亂者得治遂得光譽令問於天下夫豈可以爲命哉故以爲其力也今賢良之人尊賢而好功道術故上得其王公大人之賞下得其萬民之譽遂得光譽令問於天下亦豈以爲其命哉又以爲力也然今天有命者不識昔也三代之聖善人與意亡昔三代之暴不肖人與若以說觀之則必非昔三代聖善人也必暴不肖人也然今以命爲有者昔三代暴王桀紂幽厲貴爲天子富有天下於此乎不而矯其耳目之欲而從其心意之辟外之𢿛騁田獵畢弋内湛於酒樂而不顧其國家百姓之政繁爲無用暴逆百姓遂失其宗廟其言不曰吾罷不肖吾聽治不强必曰吾命固將失之雖昔也三代罷不肖之民亦猶此也不能善事親戚君長甚惡恭儉而好簡易貪飲食而惰從事衣食之財不足是以身有䧟乎饑寒凍餒之憂其言不曰吾罷不肖吾從事不强又曰吾命固將窮昔三代僞民亦猶此也昔者暴王作之窮術之此皆疑衆遲樸先聖王之患之也固在前矣是以書之竹帛鏤之金石琢之盤盂傳遺後世子孫曰何書焉存禹之總德有之曰允不著惟天民不而葆既防凶心天加之咎不慎厥德天命焉葆仲虺之告曰我聞有夏人矯天命于下帝式是增用爽厥師彼用無爲有故謂矯若有而謂有夫豈謂矯哉昔者桀執有命而行湯爲仲虺之吿以非之太誓之言也於去發曰惡乎君子天有顯德其行甚章爲鑑不遠在彼殷王謂人有命謂敬不可行謂祭無益謂暴無傷上帝不常九有以亡上帝不順祝降其喪惟我有周受之大帝昔者紂執有命而行武王爲太誓去發以非之曰子胡不尚考之乎商周虞夏之記從十簡之篇以尚皆無之將何若者也是故子墨子曰今天下之君子之爲文學出言談也非將勤勞其惟舌而利其脣呡也中實將欲爲其國家邑里萬民刑政者也今也王公大人之所以早朝晏退聽獄治政終朝均分而不敢息怠倦者何也曰彼以爲强必治不强必亂强必寧不强必危故不敢怠倦今也卿大夫之所以竭股肱之力殫其思慮之知内治官府外歛關巿山林澤梁之利以實官府而不敢怠倦者何也曰彼以爲强必貴不强必賤强必榮不强必辱故不敢怠倦今也農夫之所以蚤出暮入强乎耕稼樹藝多聚升粟而不敢怠倦者何也曰彼以爲强必富不强必貧强必飽不强必飢故不敢怠倦今也婦人之所夙興夜寐强乎紡績織絍多治麻𦀠葛緒㧢布縿而不敢怠倦者何也曰彼以爲强必富不强必貧强必煖不强必寒故不敢怠倦今雖毋在乎王公大人蕢若信有命而致行之則必怠乎聽獄治政矣卿大夫必怠乎治官府矣農夫必怠乎耕稼樹藝矣婦人必怠乎紡績織絍矣王公大夫怠乎聽獄治政卿大夫怠乎治官府則我以爲天下必亂矣農夫怠乎耕稼樹藝婦人怠乎紡績織絍則我以爲天下衣食之財將必不足矣若以爲政乎天下上以事天鬼天鬼不使下以待養百姓百姓不利必離散不可得用也是以入守則不固出誅則不勝故雖昔者三代暴王桀紂幽厲之所以共抎其國家傾覆其社稷者此也是故子墨子言曰今天下之士君子中實將欲求興天下之利除天下之害當若有命者言也曰命者暴王所作窮人所術非仁者之言也今之爲仁義者將不可不察而强非者此也非儒上第三十八闕非儒下第三十九儒者曰親親有術尊賢有等言親䟽尊卑之異也其禮曰喪父母三年其後子三年伯父叔父弟兄庶子其戚族人五月若以親䟽爲歲月之數則親者多而䟽者少矣是妻後子與父同也若以尊卑爲歲月數則是尊其妻子與父母同而親伯父宗兄而卑子也逆孰大焉其親死列户弗登屋窺井挑鼠穴探滌器而求其人焉以爲實在則戇愚甚矣如其亡也必求焉僞亦大矣取妻身迎祇𥚻爲僕秉轡授綏如仰嚴親昏禮威儀如承祭祀顛覆上下悖逆父母下則妻子妻子上侵事親若此可謂孝乎傳者迎妻妻之奉祭祀子將守宗廟故重之應之曰此誣言也其宗兄守其先宗廟數十年死喪之其兄弟之妻奉其先之祭祀弗散則喪妻子三年必非以守奉祭祀也夫憂妻子以大負絫有曰所以重親也爲欲厚所至和輕所至重豈非大姦也哉有强執有命以說議曰壽夭貧富安危治亂固有天命不可損益窮遠賞罰幸否有極人之知力不能爲焉群吏信之則怠於分職庶人信之則怠於從事不治則亂農事緩則貧貧且亂政之本而儒者以爲道教是賤天下之人者也且夫繁飾禮樂以淫人久喪僞哀以謾親立命緩貧而高浩居倍本棄事而安怠徹貪於飲食惰於作務䧟於飢寒危於凍餒無以違之是苦人氣鼠藏而羝羊視賁起君子笑之怒曰散人焉知良儒夫夏乞麥禾五穀既收大喪是隨子姓皆從得厭飲食畢治數喪足以至矣因人之家翠以爲恃人之野以爲尊富人有喪乃大說喜曰此衣食之端也儒者曰君子必服古言然後仁應之曰所謂古之者皆嘗新矣而古人服之則君子也然則必法非君子之服言非君子之言而後仁乎又曰君子循而不作應之曰古者羿作弓伃作甲奚仲作車巧垂作舟然則今之鮑函車匠皆君子也而羿伃奚仲巧垂皆小人邪且其所循人必或作之然則其所循皆小人道也人曰君子勝不逐奔揜函弗射强則助之胥車應之曰若皆仁人也則無說而相與仁人以其取舍是非之理相告無故從有故也弗知從有知也無辭必服見善必遷何故相若雨暴交爭其勝者欲不逐奔揜函弗射施則助之胥車雖盡能猶且不得爲君子也意暴殘之國也聖將爲世除害興師誅罰勝將因用傳術令士卒曰毋逐奔揜函勿射施則助之胥車暴亂之人也得活天下害不除是爲群殘父母而深賤世也不義莫大焉又曰吾子若鍾擊之則鳴弗擊不鳴應之曰夫仁人事上竭忠事親得孝務善則美有過則諫此爲人臣之道也今擊之則鳴弗擊不鳴隱知豫力恬漠待問而後對雖有君親之大利弗問不言若將有大㓂亂盗賊將作若機辟將發也他人不知已獨知之雖其君親皆在不問不言是夫大亂之賊也以是爲人臣不忠爲子不孝事兄不弟交遇人不貞良夫執後不言之朝物見利使已雖恐後言君若言而未有利焉則高拱下視會噎爲深曰惟其未之學也用誰急遺行遠矣夫一道術學業仁義也昔大以治人小以任官遠施用偏近以循身不義不處非理不行務興天下之利曲直周旋利則止此君子之道也以所聞孔丘之行則本與此相反謬也齊景公問晏子曰孔子爲人何如晏子不對公又復問不對景公曰以孔丘語寡人者衆矣俱以賢人也今寡人問之而子不對何也晏子對曰嬰不肖不足以知賢人雖然嬰聞所謂賢人者入人之國必務合其君臣之親而弭其上下之怨孔丘之荆知白公之謀而奉之以石乞君身幾滅而白公僇嬰聞賢人得上不虛得下不危言聽於君必利人教行下必於上是以言明而易知也行易而從也行義可明乎民謀慮可通乎君臣今孔丘深慮同謀以奉賊勞思盡知以行邪勸下亂上教臣殺君非賢人之行也入人之國而與人之賊非義之類也知人不忠趣之爲亂非仁義之也逃人而後謀避人而后言行義不可明於民謀慮不可通於君臣嬰不知孔丘之有異於白公也是以不對景公曰鳴呼貺寡人者衆矣非夫子則吾終身不知孔丘之與白公同也孔丘之齊見景公景公說欲封之以尼谿以告晏子晏子曰不可夫儒浩居而自順者也不可以教下好樂而淫人不可使親治立命而怠事不可使守職宗喪循哀不可使慈民機服勉容不可使導衆孔丘盛容脩飾以蠱世弦歌鼓舞以聚徒繁登降之禮以示儀務趨翔之節以觀衆儒學不可使議世勞思不可絫壽不能盡其學當年不能行其禮積財不能贍其樂繁飾邪術以營世君盛爲聲樂以淫遇民其道不可以期世其學不可以導衆今君封之以利齊俗非所以導國先衆善於是禮留其封敬見而不問其道孔丘乃志怒於景公與晏子乃樹鴟夷子及於田常之門告南郭惠子以所欲爲歸於魯有頃聞齊將伐魯告子貢曰賜乎舉大事於今之時矣乃遣子貢之齊因南郭惠子以見田常勸之伐吴以教高國鮑晏使毋得害田常之亂勸越伐吴三年之内齊吴破國之難伏尸以言術數孔丘之誅也孔丘爲魯司寇舍公家而於季孫季孫相魯君而走季孫與邑人争門關決植孔丘窮於蔡陳之間藜羹不糂十日子路爲享豚孔丘不問肉之所由來而食號人衣以酤酒孔丘不問酒之所由來而飲哀公迎孔丘席不端弗坐割不正弗食子路進請曰何其與陳蔡反也孔丘曰來吾語女曩與女爲苟義夫飢約則不辭妄取以活身嬴飽僞行以自飾汙邪詐僞孰大於此孔丘與其門弟子閒坐曰夫舜見瞽叟然就此時天下坡乎周公旦非其人也邪何爲舍亦家室而託寓也孔丘所行心術所至也其徒屬弟子皆效孔丘子貢季路輔孔悝乎衛陽虎亂乎齊佛肹以中牟叛求雕刑殘莫大焉夫爲弟子後生其師必脩其言法其行力不足知弗及而後已今孔丘之行如此儒士則可以疑矣墨子卷之九
